/* VV:U HUB — thème sombre & or (reconstruction fidèle v11) */
@import url("https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap");

:root {
  --bg: #0a0d12;
  --bg2: #0e1218;
  --card: #12161f;
  --card2: #161b26;
  --line: #232a38;
  --gold: #e8c15a;
  --gold-dim: #b8963f;
  --warn: #ff7a6b;
  --txt: #e7e4da;
  --muted: #9aa1ad;
  --serif: "Shippori Mincho", serif;
  --sans: "IBM Plex Sans", system-ui, sans-serif;
  --mono: "IBM Plex Mono", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: radial-gradient(1200px 600px at 80% -10%, #141b2a 0%, var(--bg) 55%); color: var(--txt); font-family: var(--sans); font-size: 15px; line-height: 1.55; min-height: 100vh; }
.wrap { max-width: 1120px; margin: 0 auto; padding: 0 18px 60px; }

/* ---- topbar ---- */
.topbar { position: sticky; top: 0; z-index: 50; background: rgba(10,13,18,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); margin: 0 -18px; padding: 0 18px; }
.topline { display: flex; align-items: center; gap: 14px; padding: 12px 0 8px; flex-wrap: wrap; }
.brand { font-family: var(--serif); font-weight: 800; font-size: 20px; letter-spacing: .04em; }
.brand em { font-style: normal; color: var(--gold); }
.tagline { font-family: var(--sans); font-weight: 400; font-size: 12.5px; letter-spacing: 0; }
.langs { display: flex; gap: 6px; margin-left: auto; }
.langbtn { background: none; border: 1px solid var(--line); color: var(--muted); font-family: var(--mono); font-size: 11px; padding: 4px 9px; border-radius: 6px; cursor: pointer; }
.langbtn.on { color: var(--bg); background: var(--gold); border-color: var(--gold); font-weight: 600; }
.socials { display: flex; gap: 8px; }
.socials a { display: inline-flex; width: 30px; height: 30px; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 8px; color: var(--muted); }
.socials a:hover { color: var(--gold); border-color: var(--gold-dim); }
.socials svg { width: 15px; height: 15px; fill: currentColor; }
.nav { display: flex; gap: 2px; overflow-x: auto; padding: 4px 0 0; }
.navbtn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: var(--sans); font-size: 13.5px; padding: 8px 12px 10px; cursor: pointer; white-space: nowrap; }
.navbtn:hover { color: var(--txt); }
.navbtn.on { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }

/* ---- typographie ---- */
.h1 { font-family: var(--serif); font-size: clamp(30px, 5vw, 44px); font-weight: 800; line-height: 1.15; }
.h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; margin: 26px 0 14px; }
.h3 { font-family: var(--serif); font-size: 17.5px; font-weight: 700; }
.h4 { font-family: var(--serif); font-size: 15.5px; font-weight: 700; }
.eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.lab { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
.mono { font-family: var(--mono); }
.goldc { color: var(--gold); }
.warnc { color: var(--warn); }
.text-sm { font-size: 13.8px; }
.text-xs { font-size: 12px; }
.opacity-60 { opacity: .6; } .opacity-70 { opacity: .7; } .opacity-80 { opacity: .8; } .opacity-90 { opacity: .9; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; } .mt-6 { margin-top: 24px; } .mb-2 { margin-bottom: 8px; } .mb-4 { margin-bottom: 16px; }
.max-w-2xl { max-width: 42rem; } .max-w-3xl { max-width: 48rem; }

/* ---- cartes & grilles ---- */
.card { background: linear-gradient(180deg, var(--card2), var(--card)); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; }
.card.clickable { cursor: pointer; transition: border-color .2s, transform .2s; }
.card.clickable:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
.gold-edge { border-color: rgba(232,193,90,.45); box-shadow: 0 0 0 1px rgba(232,193,90,.12) inset; }
.grid2 { display: grid; gap: 16px; } .grid3 { display: grid; gap: 16px; } .grid5 { display: grid; gap: 12px; }
@media (min-width: 768px) { .grid2 { grid-template-columns: 1fr 1fr; } .grid3 { grid-template-columns: 1fr 1fr 1fr; } .grid5 { grid-template-columns: repeat(5, 1fr); } }
.space-y > * + * { margin-top: 22px; }
.flexwrap { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.ml-auto { margin-left: auto; }

/* ---- hero ---- */
.hero { position: relative; overflow: hidden; padding: 44px 26px; }
.herokanji { position: absolute; right: 14px; top: -30px; font-size: 190px; font-family: var(--serif); color: rgba(232,193,90,.07); user-select: none; pointer-events: none; }
.rods { position: absolute; inset: 0; pointer-events: none; }
.rods i { position: absolute; top: -20%; width: 1px; height: 140%; background: linear-gradient(180deg, transparent, rgba(232,193,90,.16), transparent); animation: rod 7s ease-in-out infinite; }
.rods i:nth-child(1){left:8%} .rods i:nth-child(2){left:24%} .rods i:nth-child(3){left:41%} .rods i:nth-child(4){left:58%} .rods i:nth-child(5){left:74%} .rods i:nth-child(6){left:90%}
@keyframes rod { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
.kanji { font-family: var(--serif); font-size: 34px; color: rgba(232,193,90,.5); }

/* ---- tables ---- */
.tblwrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--line); background: rgba(0,0,0,.25); position: sticky; top: 0; }
.tbl td { padding: 8px 12px; border-bottom: 1px solid rgba(35,42,56,.55); vertical-align: top; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr.hl td { background: rgba(232,193,90,.06); }
.tbl tr.hl td:first-child { border-left: 2px solid var(--gold); }
.maxh { max-height: 300px; overflow-y: auto; }

/* ---- badges & chips ---- */
.badge { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: .06em; color: var(--gold); border: 1px solid rgba(232,193,90,.4); border-radius: 999px; padding: 2px 8px; vertical-align: 2px; }
.badge2 { display: inline-block; font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; vertical-align: 2px; }
.chipbtn { background: none; border: 1px solid var(--line); color: var(--muted); font-family: var(--mono); font-size: 11.5px; padding: 4px 11px; border-radius: 999px; cursor: pointer; }
.chipbtn.on { color: var(--bg); background: var(--gold); border-color: var(--gold); font-weight: 600; }
.chippas { display: inline-block; font-size: 11.5px; border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; color: var(--muted); }
.tabbtn { background: none; border: 1px solid var(--line); color: var(--muted); font-family: var(--serif); font-weight: 700; font-size: 14px; padding: 7px 16px; border-radius: 10px; cursor: pointer; }
.tabbtn.on { color: var(--gold); border-color: var(--gold-dim); background: rgba(232,193,90,.07); }
.btn { background: var(--gold); color: var(--bg); border: none; font-family: var(--sans); font-weight: 600; font-size: 13px; padding: 7px 14px; border-radius: 8px; cursor: pointer; }

.btn-ghost:hover { border-color: var(--gold-dim); }

/* ---- combos ---- */
.cstep { display: inline-block; background: var(--card2); border: 1px solid var(--line); border-radius: 999px; padding: 5px 13px; font-size: 12.8px; }
.cstep.gold { border-color: rgba(232,193,90,.55); color: var(--gold); background: rgba(232,193,90,.06); }
.arrow { color: var(--gold); font-family: var(--mono); }
.scorebar { height: 6px; background: rgba(255,255,255,.07); border-radius: 999px; overflow: hidden; margin-top: 4px; }
.scorefill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 999px; transition: width .7s ease; }
.bar { height: 8px; background: rgba(255,255,255,.07); border-radius: 999px; overflow: hidden; margin-top: 6px; }
.fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 999px; transition: width .9s ease; }
.mtch { border-left: 2px solid var(--line); padding-left: 12px; }

/* ---- listes ---- */
ul.plain, ol.plain { list-style: none; }
.liok { padding-left: 22px; position: relative; }
.liok::before { content: "✓"; position: absolute; left: 0; color: var(--gold); font-family: var(--mono); }
.liwarn { padding-left: 22px; position: relative; }
.liwarn::before { content: "✕"; position: absolute; left: 0; color: var(--warn); font-family: var(--mono); }
.startol { counter-reset: st; list-style: none; }
.startol li { counter-increment: st; padding-left: 30px; position: relative; margin-top: 8px; }
.startol li::before { content: counter(st); position: absolute; left: 0; top: 1px; width: 20px; height: 20px; border: 1px solid var(--gold-dim); border-radius: 50%; color: var(--gold); font-family: var(--mono); font-size: 11px; display: flex; align-items: center; justify-content: center; }
.disc { list-style: disc; padding-left: 1.2em; }
.disc li { margin-top: 4px; }

/* ---- raretés ---- */
.rar-leg { color: #f0b34c; } .rar-rare { color: #7db1f0; } .rar-unc { color: #8fd08f; } .rar-com { color: #b9bec9; } .rar-lim { color: #e58ee0; }

/* ---- simulateur ---- */
.ctl { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
.ctl input[type=number] { background: var(--bg2); border: 1px solid var(--line); color: var(--txt); font-family: var(--mono); font-size: 14px; padding: 6px 9px; border-radius: 8px; width: 92px; }
.attrgrid { display: grid; grid-template-columns: repeat(4, minmax(80px, 1fr)); gap: 10px; }

.counter { font-family: var(--mono); font-size: 13px; }
.counter b { color: var(--gold); }
.counter .over { color: var(--warn); }
details.branch { border: 1px solid var(--line); border-radius: 12px; background: var(--card); }
details.branch > summary { cursor: pointer; padding: 13px 17px; font-family: var(--serif); font-weight: 700; font-size: 15.5px; list-style: none; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
details.branch > summary::-webkit-details-marker { display: none; }
details.branch > summary::before { content: "▸"; color: var(--gold); transition: transform .2s; }
details.branch[open] > summary::before { transform: rotate(90deg); }
.nodelist { padding: 4px 14px 14px; display: grid; gap: 8px; }
@media (min-width: 900px) { .nodelist { grid-template-columns: 1fr 1fr; } }
.node { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: var(--bg2); }
.node.owned { border-color: rgba(232,193,90,.5); background: rgba(232,193,90,.05); }
.node.locked { opacity: .55; }
.node .nhead { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
.node .nname { font-weight: 600; font-size: 13.5px; }
.node .nmeta { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
.node .ndesc { font-size: 12px; color: var(--muted); margin-top: 4px; }
.node .nact { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.lvl { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11.5px; border: 1px solid var(--line); border-radius: 999px; padding: 2px 6px; }
.lvl button { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 13px; padding: 0 4px; }
.kmap { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: var(--bg2); }
.kmap circle { cursor: pointer; }
.exportbox { background: var(--bg2); border: 1px dashed var(--line); border-radius: 10px; padding: 10px 12px; font-family: var(--mono); font-size: 11px; white-space: pre-wrap; max-height: 210px; overflow-y: auto; }

/* ---- footer ---- */
.foot { border-top: 1px solid var(--line); margin-top: 48px; padding-top: 22px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; color: var(--muted); font-size: 12.5px; }
.foot .socials a { width: 36px; height: 36px; }
.foot .socials svg { width: 18px; height: 18px; }

/* ---- transitions de page ---- */
.page { animation: pagein .32s ease; }
@keyframes pagein { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

 contact), le Hollow gagne s’il colle — Wings recolle la distance, Hierro + Iron Skin (+35% régén posture) encaissent les punish moyens. L’over-commit Quincy dans l’hyperarmor est l’erreur décisive documentée.","en":"Speed race vs sustain: Quincy wins at spacing (volleys before contact), Hollow wins on top of you — Wings re-closes, Hierro + Iron Skin (+35% posture regen) soak average punishes. Quincy over-commit into hyperarmor is the documented decisive mistake.","es":"Velocidad contra aguante: el Quincy gana al espaciar, el Hollow si se pega — Wings recorta, Hierro + Iron Skin absorben. El exceso del Quincy contra hyperarmor es el error decisivo."}],"sv":{"shinigami":[{"k":"Vitesse d’exécution","v":2,"fr":"2 casts de setup avant les dégâts","en":"2 setup casts before damage","es":"2 casteos antes del daño"},{"k":"Dégâts","v":5,"fr":"HCS « extrêmes » + Goryū multi-charges","en":"“Extreme” HCS + multi-charge Goryū","es":"HCS extremo + Goryū"},{"k":"Efficience Reiatsu","v":2,"fr":"coûts très élevés vs base 55 → Reserves 200 obligatoires","en":"very high costs vs base 55 → Reserves 200 mandatory","es":"costes altísimos vs base 55"},{"k":"Facilité","v":4,"fr":"exécution simple, discipline de fenêtres","en":"simple execution, window discipline","es":"ejecución simple, disciplina"},{"k":"Ouvertures créées","v":5,"fr":"binds p≈1 + Geki = ouvertures garanties","en":"p≈1 binds + Geki = guaranteed openings","es":"ataduras p≈1 + Geki"}],"quincy":[{"k":"Vitesse d’exécution","v":5,"fr":"volée immédiate depuis Shunpo","en":"instant volley off Shunpo","es":"ráfaga inmediata"},{"k":"Dégâts","v":4,"fr":"« 2–3 volées tuent » (sourcé)","en":"“2–3 volleys kill” (sourced)","es":"«2–3 ráfagas matan»"},{"k":"Efficience Reiatsu","v":3,"fr":"coûts moyens, rotation dense","en":"medium costs, dense rotation","es":"costes medios"},{"k":"Facilité","v":3,"fr":"exige le parry-confirm systématique","en":"demands systematic parry-confirms","es":"exige parry-confirm"},{"k":"Ouvertures créées","v":4,"fr":"pression continue + slow (Standstill)","en":"constant pressure + Standstill slow","es":"presión continua + slow"}],"hollow":[{"k":"Vitesse d’exécution","v":4,"fr":"instantané… une fois au contact","en":"instant… once in range","es":"instantáneo… al contacto"},{"k":"Dégâts","v":5,"fr":"chaîne complète → Death Fist exécute","en":"full string → Death Fist executes","es":"cadena → ejecución"},{"k":"Efficience Reiatsu","v":4,"fr":"peu de Reiatsu, surtout stamina/posture","en":"low Reiatsu, mostly stamina/posture","es":"poco Reiatsu"},{"k":"Facilité","v":2,"fr":"qⁿ : chaque coup est parable","en":"qⁿ: every hit is parryable","es":"qⁿ: todo parable"},{"k":"Ouvertures créées","v":3,"fr":"oki saisie (Zero Clutch) + wall-carry, mais à mériter","en":"grab oki (Zero Clutch) + wall-carry, but earned","es":"oki de agarre (Zero Clutch), pero ganado"}]},"sy":[{"name":"Heavenly Restriction (charme)","fr":"« Désactive des capacités » sonne fort — mais te bride TOI aussi : buffé récemment et toujours jugé piège pour caster à haut niveau. Le texte séduisant ≠ la valeur.","en":"“Disables abilities” sounds strong — but it shackles YOU too: recently buffed and still judged a caster trap at high level. Seductive text ≠ value.","es":"«Desactiva capacidades» suena fuerte — pero TE limita a ti también: sigue siendo una trampa para casters."},{"name":"Hainawa (vol de Reiatsu)","fr":"Voler du Rei n’est pas ce qui le paie : 10 SP se justifient parce qu’il OUVRE la ligne vers Goryū et contrôle à distance. Pris seul pour « le vol », il serait surpayé.","en":"The Reiatsu steal isn’t what pays for it: 10 SP is justified because it OPENS the Goryū line and controls at range. Taken alone “for the steal”, it would be overpriced.","es":"El robo de Rei no es lo que lo paga: sus 10 SP se justifican porque ABRE la línea a Goryū."},{"name":"Sai — « faible contre plus fort »","fr":"Mention officielle du jeu : elle vise la DURÉE du bind vs cibles à stats supérieures, pas la probabilité de toucher. À stats égales (PvP nv.100), p≈1 tient.","en":"Official game note: it concerns bind DURATION vs higher-stat targets, not hit probability. At equal stats (lv.100 PvP), p≈1 holds.","es":"La nota oficial habla de la DURACIÓN contra stats superiores, no de la probabilidad. A stats iguales, p≈1 se mantiene."},{"name":"Waypoint (Shikai)","fr":"Zéro dégât, zéro combo — le reroll est mathématiquement gratuit en valeur. Ne pas s’attacher au 1er drop.","en":"Zero damage, zero combo — the reroll is mathematically free in value. Don’t get attached to the first drop.","es":"Cero daño, cero combo — el reroll sale gratis en valor."}],"sb":{"shinigami":{"used":8,"fr":"8/9 slots — Sai·Hōrin·Goryū·Sekienton·Rikujōkōrō·Shō·Hainawa·Byakurai ; slot 9 libre pour Fushibi (anti-Hakuda) ou Tsuzuri. Passifs hors barre : rien d’utile ne dort à l’inventaire.","en":"8/9 slots — slot 9 free for Fushibi (anti-Hakuda) or Tsuzuri. Passives are off-bar: nothing useful sleeps in the inventory.","es":"8/9 — ranura 9 libre para Fushibi. Nada útil duerme en el inventario."},"quincy":{"used":8,"fr":"8/9 slots (Clone Strike, Flash Surprise, Vortex Edge, False Cutter, Blade Flow, Flash Execute + Reishi Flash, Luftpfeile — débloqués par le K100 du build prouvé) — la forme passe par E, hors barre. 1 slot de marge.","en":"8/9 slots (the 6 Speed skills + Reishi Flash, Luftpfeile — unlocked by the proven build’s K100) — the form uses E, off-bar. 1 slot of headroom.","es":"8/9 — la forma va con E. 1 ranura de margen."},"hollow":{"used":8,"fr":"≈8/9 slots (Ripcord · Dragon Lash · Zero Clutch · Psycho Crash · Cero + actives du chemin : Bala Blaster · Finger Cero · Hollow Cutter) — traits et Hierro sont passifs, hors barre.","en":"≈8/9 slots (Ripcord · Dragon Lash · Zero Clutch · Psycho Crash · Cero + path actives: Bala Blaster · Finger Cero · Hollow Cutter) — traits and Hierro are off-bar passives.","es":"≈8/9 — rasgos y Hierro son pasivos."}},"sk":{"fr":"Équilibrage au 10/07/2026 : AUCUN des skills de ces combos n’a été nerfé depuis la sortie (binds/Kidō intacts ; seul nerf : hitbox du Giant Dragonfly, PvE). Update 2 ajoute des skills « Sincerity » non documentés : à réévaluer dès publication.","en":"Balance as of 2026-07-08: NONE of these combo skills has been nerfed since launch (binds/Kido intact; only nerf: Giant Dragonfly hitbox, PvE). Update 2 adds undocumented “Sincerity” skills: to re-evaluate once published.","es":"Balance al 10/07/2026: NINGUNO de estos skills ha sido nerfeado (solo la hitbox del Dragonfly, PvE). Los skills «Sincerity» del Update 2 quedan por evaluar."},"sx":{"Speed Quincy (méta actuelle)":{"fr":"Force MÉCANIQUE, transférable : le slow de Standstill fabrique des fenêtres garanties pour les volées. Casse chez qui ne parry-confirme pas — le combo n’excuse aucune impatience.","en":"MECHANICAL strength, transferable: the Standstill slow manufactures guaranteed volley windows. Breaks for players who don’t parry-confirm — the combo forgives no impatience.","es":"Fuerza MECÁNICA, transferible: el slow fabrica ventanas garantizadas. Se rompe sin parry-confirm."},"Stark / Superstar burst":{"fr":"La vraie force est la REVIVE (filet de sécurité), pas la séquence : dépend d’un drop ~1%. Transférable seulement si tu as le Schrift.","en":"The real strength is the REVIVE (safety net), not the sequence: depends on a ~1% drop. Transferable only if you own the Schrift.","es":"La fuerza real es la REANIMACIÓN, no la secuencia: depende de un drop ~1%."},"Byakuya — Senbonzakura Capitaine":{"fr":"Moitié mécanique (le stacking de pétales est réel), moitié maîtrise : exige Katana + gestion de jauge. Fort chez son auteur ; moyen sans discipline de stacks.","en":"Half mechanics (petal stacking is real), half mastery: demands Katana + gauge management. Strong for its author; average without stack discipline.","es":"Mitad mecánica, mitad maestría: exige Katana y gestión de acumulación."},"Hakuda glass-cannon 335/65":{"fr":"DPS brut maximal sur le papier — mais qⁿ fait que sa for d Haori · Monkey Head · Utility Backpack — Deadly modifier (Vibrant = max HP, not a weapon modifier — fixed in v11).","es":"Arma: The King’s Crown · Wraith Mask · Savior’s Cape · Monkey Head · Utility Backpack — Deadly."},"hakuda":{"fr":"Hakuda (Hollow Vasto) : War-Torn Bandana (tête) · Marsh Stalker Headwrap (visage) · Gravewood Warset (corps) · Demon’s Red Gauntlets + Pendant of Youth (misc) · Utility Backpack — modificateurs Menacing. Le Pendant de Youth alimente ta stamina de Shunpo pour recoller la distance.","en":"Hakuda (Vasto Hollow): War-Torn Bandana · Marsh Stalker Headwrap · Gravewood Warset · Demon’s Red Gauntlets + Pendant of Youth · Utility Backpack — Menacing modifiers.","es":"Hakuda (Hollow Vasto): War-Torn Bandana · Marsh Stalker Headwrap · Gravewood Warset · Demon’s Red Gauntlets + Pendant of Youth · Utility Backpack — Menacing."},"stones":{"fr":"\u003ch3 class=\"h3\">💎 Pierres de modification — la pierre à mettre sur CHAQUE pièce, par build \u003cspan class=\"mono text-xs goldc\">maths du 10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Mécanique : chaque pièce porte UN modificateur, re-rollé aux Tailors (Modifier Stones · 400–500 Soul Tokens le roll). Le roll est aléatoire : \u003cb>E[rolls pour toucher la cible] = 1/p\u003c/b>, et il faut \u003cb>n₉₀ = ln(0,1)/ln(1−p)\u003c/b> rolls pour 90 % de chances. Les 13 modificateurs :\u003c/p>\n\u003cdiv class=\"tblwrap mt-2\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Modificateur\u003c/th>\u003cth>Effet\u003c/th>\u003cth>Chance\u003c/th>\u003cth>E[rolls]\u003c/th>\u003cth>n₉₀ (90 %)\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr class=\"hl\">\u003ctd>\u003cb>Celestial\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Rei max · PV max · DÉF Kidō · DÉF mêlée · régén posture (multi-stat)\u003c/td>\u003ctd class=\"mono\">2 %\u003c/td>\u003ctd class=\"mono\">50\u003c/td>\u003ctd class=\"mono\">114\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Deadly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Dégâts d’arme\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Precise\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Dégâts Kidō\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Menacing\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Dégâts Hakuda\u003c/td>\u003ctd class=\"mono\">3 %\u003c/td>\u003ctd class=\"mono\">33\u003c/td>\u003ctd class=\"mono\">76\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Vibrant\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">PV max (PAS un modificateur d’arme — erreur corrigée en v10)\u003c/td>\u003ctd class=\"mono\">4 %\u003c/td>\u003ctd class=\"mono\">25\u003c/td>\u003ctd class=\"mono\">57\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Voluminous\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Reiatsu max\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Swift\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Vitesse de Shunpo\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Quick\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Régén de posture\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Tireless\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Stamina de Shunpo\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Sturdy\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">DÉF mêlée\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Steadfast\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Posture max\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Ghostly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">DÉF Kidō\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Spacious\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Equipment Load\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-xs opacity-70 mt-1\">E[rolls] ≈ coût moyen : Precise/Deadly ≈ 8 000–10 000 Soul Tokens par pièce ; Menacing ≈ 13 300–16 700 ; Celestial ≈ 20 000–25 000. Le n₉₀ dit le budget « sûr » (90 %) : ×2,25 le coût moyen.\u003c/p>\n\u003cp class=\"lab mt-4\">Shinigami — caster 360 Kidō / 40 Speed (combo prouvé)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>Chaos Halo\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3% Kidō · +7 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">dégâts 100 % Kidō : chaque pièce Precise multiplie TOUT le kit\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Arctic Explorer’s Goggles\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,5% Kidō)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">seul slot Visage avec bonus Kidō direct — même logique\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gunslinger’s Tunic\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2% Kidō · +4 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">les M1 Katana pèsent \u003c10 % des dégâts : Deadly ne multiplierait que cette part\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (repli : Voluminous)\u003c/td>\u003ctd class=\"text-xs\">Voluminous (Rei max, E[rolls]=14 : moitié prix) si la rotation HCS t’assèche malgré Reserves 200\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Electrified Arm Chains\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+4% Foudre)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">synergie foudre (Song of Fire and Thunder exige l’AP) — jamais Vibrant : piège à caster\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Preuve d'arbitrage : basculer 1 pièce en Deadly ne bat Precise que si part_arme × val_Deadly &gt; part_Kidō × val_Precise ; avec ~90 % des dégâts en Kidō, il faudrait un Deadly ~9× plus fort — inexistant. \u003cb class=\"goldc\">Precise ×5.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Quincy — Speed 300 / Kidō 100 (combo v10)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>The King’s Crown\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,1% arme · +2,1% Hakuda)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">volées Sword + skills d’épée = dégâts d’ARME : Deadly multiplie tout, et se cumule ×1,15 avec Blut Arterie\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Wraith Mask\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1,25% arme · +5 PV)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">même logique — l’opener ×2,5 est aussi un coup d’arme : 32,5 → encore plus haut\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Savior’s Cape\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,3% arme · +3 Rei · +10 PV)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">la meilleure pièce arme du jeu porte la même pierre que son bonus de base\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Swift (option : Deadly)\u003c/td>\u003ctd class=\"text-xs\">Swift (E[rolls]=14, moitié prix) nourrit l’identité tempo : Shunpo plus rapide = plus d’openers ; full Deadly ×5 si tu veux le burst pur\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Monkey Head\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1,5% arme · hybride)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">meilleur Misc hybride ; Vibrant N’EST PAS un modificateur d’arme (erreur v9 corrigée)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"lab mt-4\">Hollow — build A : Kidō 325 / Hakuda 56 / Speed 19 (combo v10)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>War-Torn Bandana\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,5% Hakuda · +3,5 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">K325 scale Bala Blaster, Ripcord, Cero (Ultra) et le Finger Cero de Zero Clutch : la part skills domine\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Marsh Stalker Headwrap\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1% Hakuda · +5 vit. Shunpo)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">même logique : Menacing multiplierait une base Hakuda construite sur 56 points seulement\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gravewood Warset\u003c/b> \u003cspan class=\"text-xs opacity-70\">(set Hakuda)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">idem — et Precise coûte 20 rolls vs 33 pour Menacing : le build A est aussi le moins cher à équiper\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (repli : Quick)\u003c/td>\u003ctd class=\"text-xs\">Quick (régén posture, E=14) si tu trades beaucoup en mêlée\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Demon’s Red Gauntlets\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3,6% Hakuda · +8 PV)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Menacing\u003c/td>\u003ctd class=\"text-xs\">l’exception : la pièce porte déjà +3,6 % Hakuda — Menacing y multiplie les M1 Deadly Claws (la moitié du volume de coups de la chaîne)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Variante B (Suplex, H115/S28/K182) : inverse la logique — \u003cb>Menacing ×4 + Quick ×1\u003c/b> : les dégâts redeviennent majoritairement des M1 Hakuda (c'est le set du build « glass-cannon 335/65 » sourcé, qui joue « accessoires Menacing complets »).\u003c/p>\n\u003cp class=\"text-xs warnc mt-2\">Anti-pièges : Vibrant = PV max, PAS l'arme (la v9 le rangeait côté arme — corrigé) · Celestial est fort mais E[rolls] = 50 (≈ 20 000–25 000 tokens PAR pièce) : luxe de fin de progression, à ne viser que sur l'Utility (la pièce sans bonus offensif de base) · les % de chance viennent des guides communautaires (grindnstrat, 07/2026) — le Trello ne publie pas les taux.\u003c/p>","en":"\u003ch3 class=\"h3\">💎 Modifier Stones — which stone on EACH piece, per build \u003cspan class=\"mono text-xs goldc\">math from Jul 10, 2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Mechanics: each piece carries ONE modifier, re-rolled at the Tailors (Modifier Stones · 400–500 Soul Tokens per roll). The roll is random: \u003cb>E[rolls to hit target] = 1/p\u003c/b>, and you need \u003cb>n₉₀ = ln(0.1)/ln(1−p)\u003c/b> rolls for a 90% chance. The 13 modifiers:\u003c/p>\n\u003cdiv class=\"tblwrap mt-2\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Modifier\u003c/th>\u003cth>Effect\u003c/th>\u003cth>Chance\u003c/th>\u003cth>E[rolls]\u003c/th>\u003cth>n₉₀ (90%)\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr class=\"hl\">\u003ctd>\u003cb>Celestial\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max Rei · max HP · Kido DEF · melee DEF · posture regen (multi-stat)\u003c/td>\u003ctd class=\"mono\">2 %\u003c/td>\u003ctd class=\"mono\">50\u003c/td>\u003ctd class=\"mono\">114\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Deadly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Weapon damage\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Precise\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Kido damage\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Menacing\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Hakuda damage\u003c/td>\u003ctd class=\"mono\">3 %\u003c/td>\u003ctd class=\"mono\">33\u003c/td>\u003ctd class=\"mono\">76\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Vibrant\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max HP (NOT a weapon modifier — error fixed in v10)\u003c/td>\u003ctd class=\"mono\">4 %\u003c/td>\u003ctd class=\"mono\">25\u003c/td>\u003ctd class=\"mono\">57\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Voluminous\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max Reiatsu\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Swift\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Shunpo speed\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Quick\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Posture regen\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Tireless\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Shunpo stamina\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Sturdy\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Melee DEF\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Steadfast\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max posture\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Ghostly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Kido DEF\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Spacious\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Equipment Load\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-xs opacity-70 mt-1\">E[rolls] ≈ average cost: Precise/Deadly ≈ 8,000–10,000 Soul Tokens per piece; Menacing ≈ 13,300–16,700; Celestial ≈ 20,000–25,000. n₉₀ is the “safe” budget (90%): ×2.25 the average.\u003c/p>\n\u003cp class=\"lab mt-4\">Shinigami — 360 Kido / 40 Speed caster (proven combo)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>Chaos Halo\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3% Kido · +7 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">100% Kido damage: every Precise piece multiplies the WHOLE kit\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Arctic Explorer’s Goggles\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.5% Kido)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">only Face slot with a direct Kido bonus — same logic\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gunslinger’s Tunic\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2% Kido · +4 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">Katana M1s are \u003c10% of damage: Deadly would only multiply that share\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (fallback: Voluminous)\u003c/td>\u003ctd class=\"text-xs\">Voluminous (max Rei, E=14: half price) if HCS rotations drain you despite Reserves 200\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Electrified Arm Chains\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+4% Lightning)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">lightning synergy (Song of Fire and Thunder needs AP) — never Vibrant: caster trap\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Arbitrage proof: switching 1 piece to Deadly only beats Precise if weapon_share × Deadly_value &gt; Kido_share × Precise_value; with ~90% of damage in Kido you'd need a ~9× stronger Deadly — doesn't exist. \u003cb class=\"goldc\">Precise ×5.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Quincy — Speed 300 / Kido 100 (v10 combo)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>The King’s Crown\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.1% weapon · +2.1% Hakuda)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">Sword volleys + blade skills = WEAPON damage: Deadly multiplies everything, and stacks with Blut Arterie ×1.15\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Wraith Mask\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1.25% weapon · +5 HP)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">same logic — the ×2.5 opener is a weapon hit too: 32.5 → higher still\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Savior’s Cape\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.3% weapon · +3 Rei · +10 HP)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">the game’s best weapon piece carries the same stone as its base bonus\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Swift (option: Deadly)\u003c/td>\u003ctd class=\"text-xs\">Swift (E=14, half price) feeds the tempo identity: faster Shunpo = more openers; full Deadly ×5 for pure burst\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Monkey Head\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1.5% weapon · hybrid)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">best hybrid Misc; Vibrant is NOT a weapon modifier (v9 error fixed)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"lab mt-4\">Hollow — build A: Kido 325 / Hakuda 56 / Speed 19 (v10 combo)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>War-Torn Bandana\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.5% Hakuda · +3.5 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">K325 scales Bala Blaster, Ripcord, Cero (Ultra) and Zero Clutch’s Finger Cero: the skill share dominates\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Marsh Stalker Headwrap\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1% Hakuda · +5 Shunpo spd)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">same logic: Menacing would multiply a Hakuda base built on only 56 points\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gravewood Warset\u003c/b> \u003cspan class=\"text-xs opacity-70\">(Hakuda set)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">ditto — and Precise costs 20 rolls vs 33 for Menacing: build A is also the cheapest to gear\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (fallback: Quick)\u003c/td>\u003ctd class=\"text-xs\">Quick (posture regen, E=14) if you trade a lot in melee\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Demon’s Red Gauntlets\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3.6% Hakuda · +8 HP)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Menacing\u003c/td>\u003ctd class=\"text-xs\">the exception: the piece already carries +3.6% Hakuda — Menacing multiplies the Deadly Claws M1s there (half the chain’s hit volume)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Variant B (Suplex, H115/S28/K182): inverts the logic — \u003cb>Menacing ×4 + Quick ×1\u003c/b>: damage becomes mostly Hakuda M1s (that's the sourced “335/65 glass-cannon” set, which runs “full Menacing accessories”).\u003c/p>\n\u003cp class=\"text-xs warnc mt-2\">Anti-traps: Vibrant = max HP, NOT weapon (v9 filed it under weapon — fixed) · Celestial is strong but E[rolls] = 50 (≈ 20,000–25,000 tokens PER piece): endgame luxury, only worth targeting on Utility (the piece with no offensive base stat) · roll chances come from community guides (grindnstrat, 07/2026) — the Trello doesn't publish rates.\u003c/p>","es":"\u003ch3 class=\"h3\">💎 Piedras de modificación — qué piedra en CADA pieza, por build \u003cspan class=\"mono text-xs goldc\">10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Cada pieza lleva UN modificador, re-rolleado en los Tailors (Modifier Stones · 400–500 Soul Tokens). \u003cb>E[rolls] = 1/p\u003c/b>; n₉₀ = rolls para 90% de acierto. Los 13 modificadores:\u003c/p>\n\u003cdiv class=\"tblwrap mt-2\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Modificador\u003c/th>\u003cth>Efecto\u003c/th>\u003cth>Prob.\u003c/th>\u003cth>E[rolls]\u003c/th>\u003cth>n₉₀\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr class=\"hl\">\u003ctd>\u003cb>Celestial\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Rei máx · PV máx · DEF Kido · DEF melé · regen postura (multi-stat)\u003c/td>\u003ctd class=\"mono\">2 %\u003c/td>\u003ctd class=\"mono\">50\u003c/td>\u003ctd class=\"mono\">114\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Deadly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Daño de arma\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Precise\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Daño Kido\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Menacing\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Daño Hakuda\u003c/td>\u003ctd class=\"mono\">3 %\u003c/td>\u003ctd class=\"mono\">33\u003c/td>\u003ctd class=\"mono\">76\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Vibrant\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">PV máx (NO es ,"en":"Step by step: Sai lv.7 removes block; the only out is a frame-perfect dodge on its startup — hence the point-blank Shunpo cast. Once bound: M1s, Goryū, Hōrin, Rikujōkōrō offer NO option (Hōrin lv.6 scoops ragdolls — no “stay down”; Hōgyoku wish #2 adds the lv.8 block-pierce). Geki auto-punishes any guardbreak attempt between windows; Soul Snatcher turns the final Byakurai into a guaranteed knock under 11% HP. Residual outs, named: (1) the frame-perfect dodge on the FIRST Sai; (2) one i-frame skill spent on ONE step; (3) outside help — Fushibi lv.3 in slot 9 cuts their dash.","es":"Paso a paso: Sai nv.7 elimina el bloqueo; la única salida es la esquiva perfecta en su arranque — por eso se lanza a quemarropa tras Shunpo. Una vez atado: M1, Goryū, Hōrin y Rikujōkōrō no dejan NINGUNA opción. Geki castiga cualquier rotura de guardia; Soul Snatcher convierte el Byakurai final en derribo garantizado bajo 11% PV. Salidas residuales: la esquiva perfecta al PRIMER Sai, un skill con i-frames en UNA etapa, o ayuda externa."},"risk":{"fr":"Charmes : A Song of Fire and Thunder (foudre) + Soul Snatcher + Frostwalker (un nuke → ton prochain M1 GÈLE : cinquième bind de secours si Sai est esquivé). Reiatsu : base 55 → Reserves 200 non négociables pour tenir HCS. Règle inchangée : aucun nuke sur cible libre.","en":"Charms: A Song of Fire and Thunder (lightning) + Soul Snatcher + Frostwalker (one nuke → your next M1 FREEZES: a backup fifth bind if Sai gets dodged). Reiatsu: base 55 → Reserves 200 non-negotiable for HCS. Unchanged rule: no nuke on a free target.","es":"Amuletos: A Song of Fire and Thunder + Soul Snatcher + Frostwalker (un nuke → tu siguiente M1 CONGELA). Reserves 200 innegociables para HCS. Regla: ningún nuke sobre objetivo libre."},"lab":{"fr":"\u003ch3 class=\"h3\">🧪 Labo — preuve mathématique &amp; mécanique \u003cspan class=\"mono text-xs goldc\">calculs du 10/07/2026 · données du hub (Trello/arbre)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Six tests recalculés depuis la base de données de ce site. Verdict : \u003cb class=\"goldc\">séquence CONFIRMÉE — le seul combo des trois races légal sans modification.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Légalité (plafond 400 pts d'attributs)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Seuils du combo : Byakurai K28 · Sai K56 · Shō K84 · Fushibi K116 · Sekienton K120 · Rikujōkōrō K140 · Geki K185 · Hōrin K220 · Hainawa K280 · Goryū K350 · \u003cb>HCS K360\u003c/b> (max utilisable). Besoin minimal = max des seuils : \u003cb class=\"mono\">K360 + Speed 40 = 400/400\u003c/b> — \u003cb class=\"goldc\">LÉGAL au point près\u003c/b>. Chaque point mis en Strength/Hakuda casse le combo (théorème du 360).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coût d'arbre (prérequis inclus)\u003c/p>\n\u003cp class=\"text-sm mt-1\">26 nodes · \u003cb class=\"mono goldc\">152 SP\u003c/b> = 87 SP (cœur : 8 binds + Geki) + 48 SP (branche HCS seule) + 17 SP (Fushibi). Si les SP manquent : couper HCS est la SEULE coupe qui ne touche pas au verrouillage (−48 SP : tu gardes 100 % du contrôle, tu perds le nuke).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Rotation &amp; Reiatsu (chiffres de l'arbre : Sai 40 s/−0,6 · 30 Rei/+1,4 — Byakurai 27,5 s/−0,4 · 24 Rei/+1,1)\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>Sai nv.7 : \u003cb class=\"mono\">CD 36,4 s · 38,4 Rei\u003c/b> — recoupe la fiche matchup « trades pendant le CD 35–40 s de Sai » ✓\u003c/li>\n\u003cli>Byakurai nv.4 : \u003cb class=\"mono\">CD 26,3 s · 27,3 Rei\u003c/b> &lt; 36,4 s → le finisher est prêt à CHAQUE rotation de Sai ✓\u003c/li>\n\u003cli>\u003cb class=\"warnc\">Sai nv.7 + Byakurai nv.4 = 65,7 Rei &gt; pool de base 55\u003c/b> : deux casts sur huit dépassent déjà le pool — Reserves 200 est une nécessité ARITHMÉTIQUE, pas un confort (HCS coûte en plus « très élevé »).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilités — pourquoi CET ordre est optimal\u003c/p>\n\u003cp class=\"text-sm mt-1\">ε = chance que l'adversaire saisisse UNE fenêtre de défense. Chaîne parable à 8 fenêtres : P = (1−ε)⁸. Ce combo compresse tout en UNE porte (l'esquive frame-parfaite sur le premier Sai) : P = 1−ε.\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>ε (défenseur)\u003c/th>\u003cth>chaîne naïve (1−ε)⁸\u003c/th>\u003cth>porte unique 1−ε\u003c/th>\u003cth>facteur\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono\">0,20 (faible / weak)\u003c/td>\u003ctd class=\"mono\">16,8 %\u003c/td>\u003ctd class=\"mono\">80 %\u003c/td>\u003ctd class=\"mono\">×4,8\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,35 (moyen / average)\u003c/td>\u003ctd class=\"mono\">3,2 %\u003c/td>\u003ctd class=\"mono\">65 %\u003c/td>\u003ctd class=\"mono\">×20\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,50 (bon / good)\u003c/td>\u003ctd class=\"mono\">0,4 %\u003c/td>\u003ctd class=\"mono\">50 %\u003c/td>\u003ctd class=\"mono\">×128\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,80 (expert)\u003c/td>\u003ctd class=\"mono\">≈0 %\u003c/td>\u003ctd class=\"mono\">20 %\u003c/td>\u003ctd class=\"mono\">×78 125\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Espérance des M1 (Katana 13 dmg/hit, table Trello) : liés = n×13 garantis ; libres = Σ 13·qᵏ. Pour 2 M1 à q = 0,7 : \u003cb class=\"mono\">26 vs 15,5 (+68 %)\u003c/b> — preuve chiffrée de la règle « aucun dégât sur cible libre » (E[dmg] = dmg×p, et p ≪ 1 sur cible libre). L'ordre place la porte unique AVANT tout investissement : un Sai esquivé coûte UN cast (36,4 s), jamais un nuke. Couverture d'états : debout-block → Sai nv.7 l'ignore · au sol → Hōrin ramasse les ragdolls · guardbreak tenté → Geki punit (CD 60 s) · &lt;11 % PV → Soul Snatcher knock.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Règle des niveaux : plafond nv.6, UN seul Hōgyoku\u003c/p>\n\u003cp class=\"text-sm mt-1\">Limite du jeu (modélisée par le simulateur de ce hub) : chaque skill plafonne à \u003cb>nv.6\u003c/b> ; SEUL le skill qui reçoit LE Hōgyoku monte à nv.7–8 — on ne peut donc PAS tout monter à fond. La séquence ci-dessus l'applique : \u003cb class=\"goldc\">Hōgyoku → Sai (nv.7 : l'ignore-block, LA porte du combo)\u003c/b> ; Hōrin est joué \u003cb>nv.6\u003c/b> — sa propriété de base (« tire la cible, fonctionne sur les ragdolls ») suffit, car la cible est déjà liée quand il part. Le vœu Hōgyoku n°2 (rare, long à farmer) ira sur Hōrin (nv.8 : traverse aussi le block).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Budget d'amélioration limité — l'ordre des niveaux\u003c/p>\n\u003cp class=\"text-sm mt-1\">Chaque palier coûte, et monter un skill augmente aussi son coût par cast (Sai : 30 → 38,4 Rei de nv.1 à 7 ; Byakurai : 24 → 27,3 à nv.4). Priorités dans l'ordre, avec le passif débloqué à chaque palier (données du hub) :\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → palier\u003c/th>\u003cth>Passif débloqué / pourquoi ce palier\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Sai → nv.7\u003c/b> (LE Hōgyoku)\u003c/td>\u003ctd>IGNORE LE BLOCK — sans ce palier, pas de combo\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">2\u003c/td>\u003ctd>Fushibi → nv.3 (slot 9)\u003c/td>\u003ctd>coupe le dash/flash-step des piégés — 3 niveaux SUFFISENT, ne monte pas plus\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Shō → nv.3\u003c/td>\u003ctd>« empêche de se relever » (nv.6 scelle le Reiatsu = luxe, seulement si le budget suit)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">4\u003c/td>\u003ctd>Byakurai → nv.4\u003c/td>\u003ctd>after-shock sur le finisher — CD 26,3 s : toujours prêt à chaque rotation\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">5\u003c/td>\u003ctd>Sekienton → nv.6\u003c/td>\u003ctd>rushdown derrière la fumée\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Hōrin · Rikujōkōrō · Goryū · HCS · Hainawa\u003c/td>\u003ctd>propriétés de combo NATIVES (traction ragdoll, bind, nuke, vol de Rei) : les laisser bas ne casse RIEN — chaque point économisé va aux lignes 1–5\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict :\u003c/b> séquence CONFIRMÉE par les 6 tests — 400 points exactement, 152 SP, rotation et budget Reiatsu cohérents, porte de sortie unique, et AUCUN skill au-dessus des limites de niveaux du jeu (un seul palier Hōgyoku, sur Sai).\u003c/p>","en":"\u003ch3 class=\"h3\">🧪 Lab — mathematical &amp; mechanical proof \u003cspan class=\"mono text-xs goldc\">computed Jul 10, 2026 · hub data (Trello/tree)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Six tests recomputed from this site's own database. Verdict: \u003cb class=\"goldc\">sequence CONFIRMED — the only combo of the three races that is legal without modification.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legality (400 attribute-point cap)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Combo gates: Byakurai K28 · Sai K56 · Shō K84 · Fushibi K116 · Sekienton K120 · Rikujōkōrō K140 · Geki K185 · Hōrin K220 · Hainawa K280 · Goryū K350 · \u003cb>HCS K360\u003c/b> (highest usable). Minimal need = max of gates: \u003cb class=\"mono\">K360 + Speed 40 = 400/400\u003c/b> — \u003cb class=\"goldc\">LEGAL to the exact point\u003c/b>. Any point in Strength/Hakuda breaks the combo (360 theorem).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Tree cost (prerequisites included)\u003c/p>\n\u003cp class=\"text-sm mt-1\">26 nodes · \u003cb class=\"mono goldc\">152 SP\u003c/b> = 87 SP (core: 8 binds + Geki) + 48 SP (HCS branch alone) + 17 SP (Fushibi). Short on SP? Cutting HCS is the ONLY cut that doesn't touch the lockdown (−48 SP: you keep 100% of control, you lose the nuke).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Rotation &amp; Reiatsu (tree data: Sai 40s/−0.6 · 30 Rei/+1.4 — Byakurai 27.5s/−0.4 · 24 Rei/+1.1)\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>Sai lv.7: \u003cb class=\"mono\">CD 36.4s · 38.4 Rei\u003c/b> — cross-checks the matchup note “trades during Sai's 35–40s CD” ✓\u003c/li>\n\u003cli>Byakurai lv.4: \u003cb class=\"mono\">CD 26.3s · 27.3 Rei\u003c/b> &lt; 36.4s → the finisher is ready EVERY Sai rotation ✓\u003c/li>\n\u003cli>\u003cb class=\"warnc\">Sai lv.7 + Byakurai lv.4 = 65.7 Rei &gt; base pool 55\u003c/b>: two of the eight casts already exceed the base pool — Reserves 200 is an ARITHMETIC necessity, not comfort (HCS also costs “very high”).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilities — why THIS order is optimal\u003c/p>\n\u003cp class=\"text-sm mt-1\">ε = chance the opponent seizes ONE defense window. A parryable 8-window chain: P = (1−ε)⁸. This combo compresses everything into ONE gate (the frame-perfect dodge on the first Sai): P = 1−ε.\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>ε (defender)\u003c/th>\u003cth>naive chain (1−ε)⁸\u003c/th>\u003cth>single gate 1−ε\u003c/th>\u003cth>factor\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono\">0,20 (faible / weak)\u003c/td>\u003ctd class=\"mono\">16,8 %\u003c/td>\u003ctd class=\"mono\">80 %\u003c/td>\u003ctd class=\"mono\">×4,8\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,35 (moyen / average)\u003c/td>\u003ctd class=\"mono\">3,2 %\u003c/td>\u003ctd class=\"mono\">65 %\u003c/td>\u003ctd class=\"mono\">×20\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,50 (bon / good)\u003c/td>\u003ctd class=\"mono\">0,4 %\u003c/td>\u003ctd class=\"mono\">50 %\u003c/td>\u003ctd class=\"mono\">×128\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,80 (expert)\u003c/td>\u003ctd class=\"mono\">≈0 %\u003c/td>\u003ctd class=\"mono\">20 %\u003c/td>\u003ctd class=\"mono\">×78 125\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">M1 expectation (Katana 13 dmg/hit, Trello table): bound = n×13 guaranteed; free = Σ 13·qᵏ. For 2 M1s at q = 0.7: \u003cb class=\"mono\">26 vs 15.5 (+68%)\u003c/b> — the numeric proof of “no damage on a free target” (E[dmg] = dmg×p, and p ≪ 1 on a free target). The order puts the single gate BEFORE any investment: a dodged Sai costs ONE cast (36.4s), never a nuke. State coverage: standing-block → Sai lv.7 ignores it · downed → Hōrin scoops ragdolls · attempted guardbreak → Geki punishes (60s CD) · &lt;11% HP → Soul Snatcher knock.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Level rule: lv.6 cap, ONE Hōgyoku only\u003c/p>\n\u003cp class=\"text-sm mt-1\">Game limit (modeled by this hub's simulator): every skill caps at \u003cb>lv.6\u003c/b>; ONLY the skill holding THE Hōgyoku reaches lv.7–8 — you can NOT max everything. The sequence above applies it: \u003cb class=\"goldc\">Hōgyoku → Sai (lv.7: the block-ignore, THE combo's gate)\u003c/b>; Hōrin is played \u003cb>lv.6\u003c/b> — its base property (“pulls the target, works on ragdolls”) is enough, since the target is already bound when it fires. Hōgyoku wish #2 (rare, slow to farm) goes on Hōrin (lv.8: also pierces block).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Limited upgrade budget — the level order\u003c/p>\n\u003cp class=\"text-sm mt-1\">Every tier costs, and leveling a skill also raises its per-cast cost (Sai: 30 → 38.4 Rei from lv.1 to 7; Byakurai: 24 → 27.3 at lv.4). Priorities in order, with the passive unlocked at each tier (hub data):\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → tier\u003c/th>\u003cth>Unlocked passive / why this tier\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Sai → lv.7\u003c/b> (THE Hōgyoku)\u003c/td>\u003ctd>IGNORES BLOCK — without this tier there is no combo\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">2\u003c/td>\u003ctd>Fushibi → lv.3 (slot 9)\u003c/td>\u003ctd>cuts the trapped target's dash/flash-step — 3 levels are ENOUGH, don't level further\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Shō → lv.3\u003c/td>\u003ctd>“prevents getting up” (lv.6 Reiatsu-seal = luxury, only if budget allows)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">4\u003c/td>\u003ctd>Byakurai → lv.4\u003c/td>\u003ctd>after-shock on the finisher — 26.3s CD: ready every rotation\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">5\u003c/td>\u003ctd>Sekienton → lv.6\u003c/td>\u003ctd>rushdown behind the smoke\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Hōrin · Rikujōkōrō · Goryū · HCS · Hainawa\u003c/td>\u003ctd>NATIVE combo properties (ragdoll pull, bind, nuke, Rei steal): keeping them low breaks NOTHING — every point saved goes to rows 1–5\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict:\u003c/b> sequence CONFIRMED by all 6 tests — exactly 400 points, 152 SP, coherent rotation and Reiatsu budget, single exit gate, and NO skill above the game's level limits (a single Hōgyoku tier, on Sai).\u003c/p>","es":"\u003ch3 class=\"h3\">🧪 Labo — prueba matemática y mecánica \u003cspan class=\"mono text-xs goldc\">calculado 10/07/2026 · datos del hub\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Seis tests recalculados desde la base de datos del sitio. Veredicto: \u003cb class=\"goldc\">secuencia CONFIRMADA — el único combo legal sin modificación.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legalidad (tope 400 puntos)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Umbral máximo del combo: \u003cb>HCS K360\u003c/b> → necesidad mínima \u003cb class=\"mono\">K360 + Speed 40 = 400/400\u003c/b> — \u003cb class=\"goldc\">LEGAL al punto exacto\u003c/b>. Cada punto en Strength/Hakuda rompe el combo (teorema del 360).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coste de árbol\u003c/p>\n\u003cp class=\"text-sm mt-1\">26 nodos · \u003cb class=\"mono goldc\">152 SP\u003c/b> = 87 (núcleo) + 48 (rama HCS) + 17 (Fushibi). Si faltan SP: corta HCS (−48 SP, conservas el 100% del control).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Rotación y Reiatsu\u003c/p>\n\u003cp class=\"text-sm mt-1\">Sai nv.7: \u003cb class=\"mono\">CD 36,4 s · 38,4 Rei\u003c/b> (coincide con «trades durante el CD 35–40 s» ✓) · Byakurai nv.4: \u003cb class=\"mono\">26,3 s · 27,3 Rei\u003c/b> → listo en cada rotación ✓ · \u003cb class=\"warnc\">38,4 + 27,3 = 65,7 &gt; pool base 55\u003c/b> → Reserves 200 es necesidad ARITMÉTICA.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilidades\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>ε (defensor)\u003c/th>\u003cth>cadena naíf (1−ε)⁸\u003c/th>\u003cth>puerta única 1−ε\u003c/th>\u003cth>factor\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono\">0,20 (faible / weak)\u003c/td>\u003ctd class=\"mono\">16,8 %\u003c/td>\u003ctd class=\"mono\">80 %\u003c/td>\u003ctd class=\"mono\">×4,8\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,35 (moyen / average)\u003c/td>\u003ctd class=\"mono\">3,2 %\u003c/td>\u003ctd class=\"mono\">65 %\u003c/td>\u003ctd class=\"mono\">×20\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,50 (bon / good)\u003c/td>\u003ctd class=\"mono\">0,4 %\u003c/td>\u003ctd class=\"mono\">50 %\u003c/td>\u003ctd class=\"mono\">×128\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,80 (expert)\u003c/td>\u003ctd class=\"mono\">≈0 %\u003c/td>\u003ctd class=\"mono\">20 %\u003c/td>\u003ctd class=\"mono\">×78 125\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Esperanza de M1 (Katana 13): atados = n×13; libres = Σ 13·qᵏ → 2 M1, q=0,7: \u003cb class=\"mono\">26 vs 15,5 (+68%)\u003c/b>. Cobertura de estados: bloqueo → Sai nv.7 lo ignora · suelo → Hōrin recoge ragdolls · guardbreak → Geki castiga · &lt;11% PV → Soul Snatcher.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Regla de niveles: tope nv.6, UN solo Hōgyoku\u003c/p>\n\u003cp class=\"text-sm mt-1\">Límite del juego: cada skill llega a \u003cb>nv.6\u003c/b>; SOLO el skill con EL Hōgyoku sube a nv.7–8 — no se puede maximizar todo. La secuencia lo aplica: \u003cb class=\"goldc\">Hōgyoku → Sai (nv.7)\u003c/b>; Hōrin se juega nv.6 (su propiedad base basta: el objetivo ya está atado).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Presupuesto de mejora limitado — orden de niveles\u003c/p>\n\u003cp class=\"text-sm mt-1\">Prioridades: \u003cb>1. Sai → nv.7 (EL Hōgyoku, sin él no hay combo)\u003c/b> · 2. Fushibi → nv.3 (corta el dash, con 3 basta) · 3. Shō → nv.3 (impide levantarse) · 4. Byakurai → nv.4 (after-shock) · 5. Sekienton → nv.6 (rushdown). Hōrin/Rikujōkōrō/Goryū/HCS/Hainawa: propiedades NATIVAS — dejarlos bajos no rompe nada.\u003c/p>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Veredicto:\u003c/b> secuencia CONFIRMADA por los 6 tests — 400 puntos exactos, 152 SP, puerta única, y NINGÚN skill por encima de los límites de nivel del juego.\u003c/p>"}},"quincy":{"steps":["Blut Arterie (K60) — l’offense du Blut (nv.8 = LE Hōgyoku : +15% arme SANS drain)","Perfect Flash (charme) + Flash Surprise — opener ×2,5 hors combat","Reishi Flash (K100) — aveugle la zone : la volée part sans lecture","M1 Sword string (rapide, fiable)","Vortex Edge / False Cutter","Splitting Standstill (Sp300) — le slow scelle la cible","Blade Flow → zone d’exécution","Flash Execute"],"counter":{"fr":"Étape par étape : l’opener ×2,5 (charme Perfect Flash, CD 60 s) frappe AVANT le combat — aucune réaction possible par définition. Reishi Flash aveugle la zone : la première volée part sans lecture possible. Le slow de Splitting Standstill rétrécit ensuite chaque fenêtre d’esquive entre deux volées — c’est lui qui scelle. Résiduel nommé : les M1 intermédiaires restent parables (qⁿ), et le gap entre volées si tu over-commit — Superstar (revive de James) efface UNE erreur par combat. Pourquoi Fallzwang et Stille Silber ont disparu : Fallzwang exige Kidō 300 et l’essence exige Speed 300 — 600 points pour un plafond de 400. L’ancienne séquence était mathématiquement impossible ; la preuve chiffrée est dans le Labo ci-dessous.","en":"Step by step: the ×2.5 opener (Perfect Flash charm, 60s CD) lands BEFORE combat — no reaction is possible by definition. Reishi Flash blinds the area: the first volley goes unread. Splitting Standstill’s slow then shrinks every dodge window between volleys — it is the sealer. Named residual: mid-string M1s remain parryable (qⁿ), and the inter-volley gap if you over-commit — Superstar (James’ revive) erases ONE mistake per fight. Why Fallzwang and Stille Silber are gone: Fallzwang requires Kido 300 and the essence requires Speed 300 — 600 points against a 400 cap. The old sequence was mathematically impossible; the numeric proof sits in the Lab below.","es":"Paso a paso: el opener ×2,5 (amuleto Perfect Flash, CD 60 s) golpea ANTES del combate. Reishi Flash ciega la zona: la primera ráfaga entra sin lectura. El slow de Splitting Standstill sella al rival entre ráfagas. Residual: los M1 intermedios siguen siendo parables (qⁿ) — Superstar borra UN error por combate. ¿Por qué ya no están Fallzwang y Stille Silber?: Fallzwang exige Kido 300 y la esencia Speed 300 — 600 puntos con un tope de 400. La secuencia antigua era matemáticamente imposible (prueba en el Labo)."},"risk":{"fr":"Répartition PROUVÉE : Speed 300 / Kidō 100 (= 400 pile) · Sword · clan Kurosaki · essence Splitting Standstill (4 SP · Speed 300) · charmes A Song of Fire and Thunder + Perfect Flash. LE Hōgyoku Quincy va sur Blut Arterie (nv.8 : +15% arme sans drain) — en attendant, joue-la nv.≤6 par fenêtres courtes. À K100 tu débloques aussi Blut Vene (K90, bascule défensive) et Reishi Gather (K100, +7,5% régén Reiatsu) — prends-les. Variante anti-transformation : Speed 276 / Kidō 124 pour Stille Silber nv.5 (désactive la transformation adverse) — mais tu PERDS l’essence (seuil Sp300). Blade Flow et Flash Execute sont profonds : fragments d’Ascension dessus en priorité. Jamais de cooldown dans l’hyperarmor adverse.","en":"PROVEN split: Speed 300 / Kido 100 (= exactly 400) · Sword · Kurosaki clan · Splitting Standstill essence (4 SP · Speed 300) · A Song of Fire and Thunder + Perfect Flash charms. THE Quincy Hōgyoku goes on Blut Arterie (lv.8: +15% weapon, no drain) — until then, run it lv.≤6 in short windows. K100 also unlocks Blut Vene (K90, defensive swap) and Reishi Gather (K100, +7.5% Reiatsu regen) — take them. Anti-transformation variant: Speed 276 / Kido 124 for Stille Silber lv.5 (disables the enemy transformation) — but you LOSE the essence (Sp300 gate). Blade Flow and Flash Execute sit deep: Ascension Fragments there first. Never commit cooldowns into enemy hyperarmor.","es":"Reparto PROBADO: Speed 300 / Kido 100 (= 400 exactos) · Sword · Kurosaki · esencia Splitting Standstill (Sp300) · amuletos Song of Fire and Thunder + Perfect Flash. EL Hōgyoku Quincy va en Blut Arterie (nv.8: +15% arma sin drenaje). K100 también da Blut Vene (K90) y Reishi Gather (+7,5% regen). Variante anti-transformación: Speed 276 / Kido 124 con Stille Silber nv.5 — pero PIERDES la esencia. Nunca contra hyperarmor."},"lab":{"fr":"\u003ch3 class=\"h3\">🧪 Labo — preuve mathématique &amp; mécanique \u003cspan class=\"mono text-xs goldc\">calculs du 10/07/2026 · données du hub (arbre/charmes/armes)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict : \u003cb class=\"warnc\">l'ancienne séquence (Fallzwang + Stille Silber + essence) était mathématiquement IMPOSSIBLE\u003c/b> — remplacée ci-dessus par la version prouvée 400/400.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Légalité (plafond 400 pts) — là où la v9 tombe\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Élément (v9)\u003c/th>\u003cth>Seuil\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr>\u003ctd>Essence Splitting Standstill\u003c/td>\u003ctd class=\"mono\">Speed 300\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd>Fallzwang nv.6\u003c/td>\u003ctd class=\"mono warnc\">Kidō 300\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Stille Silber nv.5\u003c/td>\u003ctd class=\"mono\">Kidō 124\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blut Arterie\u003c/td>\u003ctd class=\"mono\">Kidō 60\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Besoin minimal v9 : \u003cb class=\"mono warnc\">Sp300 + K300 = 600/400 — IMPOSSIBLE (dépassement 200)\u003c/b>. Fallzwang est injouable avec l'essence quel que soit l'arrangement (300+300). Pire : le « full Speed » littéral (Sp400 → K0) interdit même Blut Arterie (K60) que la v9 réclamait en étape 1 — l'incohérence était dans la v9, pas dans la correction. Deux builds légaux :\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>\u003cb class=\"goldc\">A (recommandé) : Speed 300 / Kidō 100 = 400\u003c/b> — garde l'essence, Blut Arterie (K60), Blut Vene (K90), Reishi Flash (K100), Reishi Gather (K100), Luftpfeile (K96). Perd Fallzwang et Stille Silber.\u003c/li>\n\u003cli>\u003cb>B (anti-transformation) : Speed 276 / Kidō 124 = 400\u003c/b> — garde Stille Silber nv.5 (coupe la transformation adverse), PERD l'essence (seuil Sp300). À prendre contre les kits dépendants de leur forme.\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 2 · Coût d'arbre\u003c/p>\n\u003cp class=\"text-sm mt-1\">Côté arbre Quincy : \u003cb class=\"mono goldc\">34 SP\u003c/b> (Blut Arterie · Reishi Flash · Reishi Gather · Luftpfeile + nodes, prérequis inclus). Arbre Speed : coûts non publiés (menu M). Hypothèse contrôlée : le build méta sourcé joue les 6 skills Speed avec l'essence Sp300 → leurs seuils sont ≤ 300, cohérent.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · L'opener est HORS plafond (mécanique charme)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Perfect Flash est un CHARME T2 : « 1ᵉʳ coup mêlée hors combat ×2,5 — même sur cible pleine vie (CD 60 s) » — aucun seuil d'attribut. Premier hit Sword (13, table Trello) : \u003cb class=\"mono\">13 → 32,5\u003c/b>. Blut Arterie (+15 % arme, sans drain) : volée de 4 M1 : \u003cb class=\"mono\">52 → 59,8\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilités\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>p(opener) = 1 par définition : « hors combat » = avant toute possibilité de réaction.\u003c/li>\n\u003cli>String de 4 M1 : E = Σ 13·qᵏ = \u003cb class=\"mono\">23,1 à q = 0,7\u003c/b>. Le slow de Standstill rétrécit les fenêtres d'esquive → q monte : à q = 0,85, E = \u003cb class=\"mono\">33,4 (+45 %)\u003c/b> — c'est le rôle mathématique exact de l'essence.\u003c/li>\n\u003cli>Superstar = un 2ᵉ essai : P(≥1 séquence complète) passe de 1−ε à \u003cb class=\"mono\">1−ε²\u003c/b> (ε = 0,5 : 50 % → 75 %).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 5 · Remplaçants fonctionnels (mécanique)\u003c/p>\n\u003cp class=\"text-sm mt-1\">La fenêtre « must-parry » de Fallzwang n'existe plus dans un build légal. Ses remplaçants dans la v10 : Reishi Flash (aveugle en zone : la volée part sans lecture) + le slow (fenêtres d'esquive rétrécies). Reishi Gather (+7,5 % régén Reiatsu) finance la cadence des volées.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Budget d'amélioration limité — l'ordre des niveaux\u003c/p>\n\u003cp class=\"text-sm mt-1\">Règle du jeu : plafond nv.6 par skill, UN seul Hōgyoku (nv.7–8) — on ne monte pas tout. Atout de cette séquence : AUCUNE étape n'exige un palier au-dessus du plafond (Reishi Flash aveugle dès ses premiers niveaux, le slow vient de l'essence, l'opener ×2,5 vient d'un charme). Priorités :\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → palier\u003c/th>\u003cth>Passif débloqué / pourquoi\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Blut Arterie → nv.8\u003c/b> (LE Hōgyoku)\u003c/td>\u003ctd>« +15 % arme SANS drain » — le palier qui porte tout le burst ; en attendant, joue-la nv.≤6 par fenêtres courtes et rebascule Blut Vene quand la jauge tire\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">2\u003c/td>\u003ctd>Blade Flow · Flash Execute\u003c/td>\u003ctd>tes finishers — fragments d'Ascension dessus en priorité (déjà dans la fiche)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Reishi Flash → paliers intermédiaires\u003c/td>\u003ctd>confort d'aveugle ; aucun palier obligatoire documenté\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Variante B : Stille Silber → nv.5 EXACTEMENT\u003c/td>\u003ctd>le palier « désactive la transformation » est nv.5 — chaque niveau au-delà est un point perdu ailleurs\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict :\u003c/b> la v10 est la plus forte séquence LÉGALE : opener garanti (charme, hors plafond), burst +15 % (Hōgyoku sur Blut Arterie), essence conservée, les deux skills impossibles remplacés par les deux meilleurs équivalents sous K100 — et AUCUN palier au-dessus des limites de niveaux du jeu. Variante B si l'adversaire dépend de sa transformation.\u003c/p>","en":"\u003ch3 class=\"h3\">🧪 Lab — mathematical &amp; mechanical proof \u003cspan class=\"mono text-xs goldc\">computed Jul 10, 2026 · hub data (tree/charms/weapons)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict: \u003cb class=\"warnc\">the old sequence (Fallzwang + Stille Silber + essence) was mathematically IMPOSSIBLE\u003c/b> — replaced above by the proven 400/400 version.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legality (400-point cap) — where v9 falls\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Element (v9)\u003c/th>\u003cth>Gate\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr>\u003ctd>Splitting Standstill essence\u003c/td>\u003ctd class=\"mono\">Speed 300\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd>Fallzwang lv.6\u003c/td>\u003ctd class=\"mono warnc\">Kido 300\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Stille Silber lv.5\u003c/td>\u003ctd class=\"mono\">Kido 124\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blut Arterie\u003c/td>\u003ctd class=\"mono\">Kido 60\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">v9 minimal need: \u003cb class=\"mono warnc\">Sp300 + K300 = 600/400 — IMPOSSIBLE (200 over)\u003c/b>. Fallzwang can never coexist with the essence (300+300). Worse: literal “full Speed” (Sp400 → K0) even forbids Blut Arterie (K60), which v9 required at step 1 — the inconsistency was in v9, not in the fix. Two legal builds:\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>\u003cb class=\"goldc\">A (recommended): Speed 300 / Kido 100 = 400\u003c/b> — keeps the essence, Blut Arterie (K60), Blut Vene (K90), Reishi Flash (K100), Reishi Gather (K100), Luftpfeile (K96). Loses Fallzwang and Stille Silber.\u003c/li>\n\u003cli>\u003cb>B (anti-transformation): Speed 276 / Kido 124 = 400\u003c/b> — keeps Stille Silber lv.5 (disables the enemy form), LOSES the essence (Sp300 gate). Pick vs form-reliant kits.\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 2 · Tree cost\u003c/p>\n\u003cp class=\"text-sm mt-1\">Quincy-tree side: \u003cb class=\"mono goldc\">34 SP\u003c/b> (Blut Arterie · Reishi Flash · Reishi Gather · Luftpfeile + nodes, prerequisites included). Speed tree: costs unpublished (M menu). Controlled hypothesis: the sourced meta runs the 6 Speed skills
