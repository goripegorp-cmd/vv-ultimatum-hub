    const bosses = '<div class="card"><h3 class="h3">' + tri('Boss & butin', 'Bosses & loot', 'Jefes y botín') + ' <span class="mono text-xs opacity-70">· ' + D.sA.length + ' ' + tri('recensés', 'tracked', 'registrados') + '</span></h3>'
      + '<div class="tblwrap mt-2"><table class="tbl"><thead><tr><th>Boss</th><th>' + tri('Lieu', 'Location', 'Lugar') + '</th><th>Drop</th><th>Note</th></tr></thead><tbody>'

  /* ---------- équipement ---------- */

      + '<div class="grid3">' + presets + '</div>'
      + stones
      + '<div class="card"><h3 class="h3">' + tri('Base de données — objets confirmés (Trello)', 'Database — confirmed items (Trello)', 'Base de datos — objetos confirmados') + '</h3>'
      + '<div class="flexwrap mt-3">' + slots + '<span class="mono text-xs opacity-60 ml-auto">' + items.length + ' / ' + D.sS.length + '</span></div>'
      + '<div class="tblwrap mt-3"><table class="tbl"><thead><tr><th>' + tri('Objet', 'Item', 'Objeto') + '</th><th>Slot</th><th>' + esc(T('th_rarity')) + '</th><th>Stats</th><th>Source</th></tr></thead><tbody>' + rows + '</tbody></table></div></div>'
      + '</div>';

  /* ---------- arbre & simulateur ---------- */
  function nodeCard(n) {
    const owned = SIM.owned.has(n.id);
    const buyable = canBuy(n);
    const gates = n.gate != null ? 'K ' + n.gate : ['H', 'K', 'S', 'V'].filter(a => n[a]).map(a => (a === 'V' ? 'Sp' : a) + ' ' + n[a]).join(' · ');
    const cost = n.sp != null ? n.sp + ' SP' : (n.cash != null ? n.cash + ' Cash' : '—');
    const lvl = SIM.levels[n.id] || 1;
    const lvlCtl = owned && isActive(n.id)
      ? '<span class="lvl">nv.<b class="goldc">' + lvl + '</b>/' + lvlMax(n.id) + ' <button data-act="lvldn" data-id="' + n.id + '">−</button><button data-act="lvlup" data-id="' + n.id + '">+</button></span>'
      + '<button class="chipbtn ' + (SIM.hogyoku === n.id ? 'on' : '') + '" data-act="hogy" data-id="' + n.id + '" title="Hōgyoku">宝</button>'
      + '<button class="chipbtn ' + (SIM.bar.includes(n.id) ? 'on' : '') + '" data-act="tobar" data-id="' + n.id + '">' + tri('Barre', 'Bar', 'Barra') + '</button>'
      : '';
    const btn = owned
      ? '<button class="btn-ghost" data-act="refund" data-id="' + n.id + '">' + tri('Rendre', 'Refund', 'Devolver') + '</button>'
      : buyable ? '<button class="btn" data-act="buy" data-id="' + n.id + '">+ ' + tri('Acheter', 'Buy', 'Comprar') + '</button>'
        : '<span class="mono text-xs opacity-60">🔒</span>';
    return '<div class="node ' + (owned ? 'owned' : (buyable ? '' : 'locked')) + '">'
      + '<div class="nhead"><span class="nname">' + esc(n.name || n.n || n.id) + '</span>' + badge2(kindLbl(n.kind)) + '<span class="nmeta">' + cost + (gates ? ' · ' + gates : '') + '</span></div>'
      + (n.d ? '<p class="ndesc">' + esc(typeof n.d === 'object' ? iX(n.d) : n.d) + '</p>' : '')
      + (n.lvlNotes ? '<p class="ndesc goldc">' + esc(n.lvlNotes.map(x => 'nv.' + x.lvl + ': ' + iX(x)).join(' · ')) + '</p>' : '')
      + '<div class="nact">' + btn + lvlCtl + '</div></div>';
  }

  /* ---------- carte RADIALE (positions réelles du jeu) ---------- */
  function treeSvg2() {
    const t = D.tree2;
    if (!SIM.view) SIM.view = { x: t.cx - 780, y: t.cy - 500, w: 1560, h: 1000 };
    const vis = t.nodes.filter(visible2);
    const q = SIM.search.trim().toLowerCase();
    let lines = '', dots = '';
    for (const n of vis) {
      if (!n.parent) {
        // 1er anneau : relié au noyau central
        lines += '<line x1="' + t.cx + '" y1="' + t.cy + '" x2="' + n.x + '" y2="' + n.y + '" stroke="rgba(' + nColor(n) + ',' + (SIM.owned.has(n.id) ? '.85' : '.28') + ')" stroke-width="' + (SIM.owned.has(n.id) ? 2.6 : 1.4) + '"/>';
        continue;
      }
      const p = T2.get(n.parent);
      if (!p || !visible2(p)) continue;
      const lit = SIM.owned.has(n.id) && SIM.owned.has(p.id);
      lines += '<line x1="' + p.x + '" y1="' + p.y + '" x2="' + n.x + '" y2="' + n.y + '" stroke="rgba(' + nColor(n) + ',' + (lit ? '.85' : '.28') + ')" stroke-width="' + (lit ? 2.6 : 1.4) + '"/>';
    }
    for (const n of vis) {
      const owned = SIM.owned.has(n.id), avail = canBuy(n), sel = SIM.sel === n.id;
      const col = nColor(n), r = n.passive ? 6 : 8.5;
      const fill = owned ? 'rgb(' + col + ')' : avail ? '#0d1119' : '#0d1119';
      const stroke = owned ? '#fff' : avail ? '#ffd75e' : 'rgba(' + col + ',.5)';
      const sw = avail || owned ? 2.4 : 1.4;
      const op = owned || avail ? 1 : 0.55;
      const hit = q && (n.name || '').toLowerCase().includes(q);
      dots += '<g data-act="knode" data-id="' + n.id + '" style="cursor:pointer" opacity="' + op + '">'
        + (sel ? '<circle cx="' + n.x + '" cy="' + n.y + '" r="' + (r + 6) + '" fill="none" stroke="#fff" stroke-width="1.4" stroke-dasharray="3 3"/>' : '')
        + (hit ? '<circle cx="' + n.x + '" cy="' + n.y + '" r="' + (r + 10) + '" fill="none" stroke="#fff" stroke-width="1.2"/>' : '')
        + (owned || avail ? '<circle cx="' + n.x + '" cy="' + n.y + '" r="' + (r + 3.5) + '" fill="rgba(' + col + ',.18)"/>' : '')
        + '<circle cx="' + n.x + '" cy="' + n.y + '" r="' + r + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + sw + '"/>'
        + (!owned && !avail ? '<text x="' + n.x + '" y="' + (n.y + 2.6) + '" font-size="7.5" text-anchor="middle" fill="rgba(' + col + ',.8)">🔒</text>' : '')
        + '<title>' + esc(n.name) + ' — ' + (n.sp ? n.sp + ' SP' : '') + (n.cash ? (n.sp ? ' + ' : '') + n.cash + ' Cash' : '') + (Object.keys(n.req || {}).length ? ' · ' + Object.entries(n.req).map(([k, v]) => k.toUpperCase() + ' ' + v).join(' · ') : '') + '</title></g>';
    }
    // noyau + labels de branches
    let core = '<circle cx="' + t.cx + '" cy="' + t.cy + '" r="150" fill="url(#coreglow)"/>'
      + '<circle cx="' + t.cx + '" cy="' + t.cy + '" r="52" fill="url(#core)"/>';
    let labels = '';
    for (const sp of t.spokes) {
      const rad = sp.angle * Math.PI / 180;
      const lx = t.cx + Math.cos(rad) * 185, ly = t.cy + Math.sin(rad) * 185;
      const col = SPOKE_COLOR[sp.id];
      const anchor = Math.cos(rad) > 0.35 ? 'start' : Math.cos(rad) < -0.35 ? 'end' : 'middle';
      const txt = sp.id === 'race' ? SIM.race.toUpperCase() : sp.label.toUpperCase();
      labels += '<text x="' + lx + '" y="' + ly + '" font-size="17" font-weight="700" letter-spacing="3" text-anchor="' + anchor + '" fill="rgb(' + col + ')" font-family="Shippori Mincho, serif" style="text-shadow:0 0 8px rgba(' + col + ',.6)">' + txt + '</text>';
    }
    const v = SIM.view;
    return '<svg id="t2map" class="t2map" viewBox="' + v.x + ' ' + v.y + ' ' + v.w + ' ' + v.h + '">'
      + '<defs><radialGradient id="core"><stop offset="0%" stop-color="#dff2ff"/><stop offset="45%" stop-color="#4db8ff"/><stop offset="100%" stop-color="rgba(30,120,220,0)"/></radialGradient>'
      + '<radialGradient id="coreglow"><stop offset="0%" stop-color="rgba(70,160,255,.28)"/><stop offset="100%" stop-color="rgba(70,160,255,0)"/></radialGradient></defs>'
      + lines + core + labels + dots + '</svg>';
  }

  function panel2(n) {
    const owned = SIM.owned.has(n.id), avail = canBuy(n);
    const col = nColor(n);
    const state = owned ? '<span class="mono goldc">' + tri('ACQUIS', 'UNLOCKED', 'ADQUIRIDO') + '</span>'
      : avail ? '<span class="mono" style="color:#4db8ff">' + tri('DISPONIBLE — clique Acheter', 'AVAILABLE — click Buy', 'DISPONIBLE') + '</span>'
        : '<span class="mono opacity-60">' + tri('VERROUILLÉ', 'NOT UNLOCKED', 'BLOQUEADO') + '</span>';

      const ok = (SIM.attrs[ATTR_KEY[k]] || 0) >= v;

    }).join(' ');
    const costChips = (n.sp ? '<span class="mono text-xs" style="border:1px solid rgba(77,210,255,.6);color:#4db8ff;border-radius:6px;padding:2px 8px">' + n.sp + ' SP</span> ' : '')
      + (n.cash ? '<span class="mono text-xs" style="border:1px solid rgba(232,193,90,.6);color:#e8c15a;border-radius:6px;padding:2px 8px">' + n.cash + ' Cash</span>' : '');
    const desc = LANG === 'fr' ? (n.fr || n.desc) : n.desc;
    const notes = n.note ? n.note.split('·').map(x => '<p class="text-xs mt-1" style="color:#ffd75e">' + esc(x.trim()) + '</p>').join('') : '';
    const st = n.stats && n.stats.cd ? '<p class="mono text-xs opacity-70 mt-2">CD ' + n.stats.cd + 's (' + n.stats.cdPerLv + '/nv) · ' + n.stats.reiCost + ' Rei (' + n.stats.reiCostPerLv + '/nv)</p>' : '';
    const lvl = SIM.levels[n.id] || 1;
    const lvlCtl = owned && !n.passive
      ? '<span class="lvl">nv.<b class="goldc">' + lvl + '</b>/' + lvlMax(n.id) + ' <button data-act="lvldn" data-id="' + n.id + '">−</button><button data-act="lvlup" data-id="' + n.id + '">+</button></span>'
      + '<button class="chipbtn ' + (SIM.hogyoku === n.id ? 'on' : '') + '" data-act="hogy" data-id="' + n.id + '" title="Hōgyoku">宝 Hōgyoku</button>'
      + '<button class="chipbtn ' + (SIM.bar.includes(n.id) ? 'on' : '') + '" data-act="tobar" data-id="' + n.id + '">' + tri('Barre', 'Bar', 'Barra') + '</button>'
      : '';
    const btn = owned ? '<button class="btn-ghost" data-act="refund" data-id="' + n.id + '">' + tri('Rendre', 'Refund', 'Devolver') + '</button>'
      : avail ? '<button class="btn" data-act="buy" data-id="' + n.id + '">+ ' + tri('Acheter', 'Buy', 'Comprar') + '</button>' : '';
    const mutexNote = n.mutex ? '<p class="text-xs warnc mt-1">' + tri('Exclusif avec', 'Mutually exclusive with', 'Excluyente con') + ' « ' + esc(t2Name(n.mutex)) + ' »</p>' : '';
    const zNote = n.zStep ? '<p class="text-xs opacity-60 mt-1">' + tri('Incompatible Z-step', 'Z-step incompatible', 'Incompatible con Z-step') + '</p>' : '';
    return '<div class="t2panel" style="border-color:rgba(' + col + ',.5)">'
      + '<div class="flexwrap"><h3 class="h3" style="color:rgb(' + col + ')">' + esc(n.name) + '</h3>' + state + '</div>'
      + '<p class="text-sm mt-2">' + esc(desc) + '</p>' + notes + st + mutexNote + zNote
      + '<div class="flexwrap mt-3"><span class="lab">' + tri('Coût', 'Cost', 'Coste') + '</span> ' + costChips
      + (reqChips ? ' <span class="lab" style="margin-left:10px">' + tri('Requiert', 'Requires', 'Requiere') + '</span> ' + reqChips : '') + '</div>'
      + '<div class="flexwrap mt-3">' + btn + lvlCtl + '</div></div>';
  }

  function pageTree() {

      + '<label class="ctl"><span>' + esc(T('sp_budget')) + '</span><input type="number" min="50" max="250" value="' + SIM.budget + '" data-input="budget"></label>'

        '<label class="ctl"><span>' + l + '</span><input type="number" min="0" max="400" value="' + a[k] + '" data-input="attr-' + k + '"></label>').join('') + '</div>'
      + '<div class="counter"><div>SP <b>' + sp + '</b> / ' + SIM.budget + (sp > SIM.budget ? ' <span class="over">▲</span>' : '') + ' · Cash <b>' + cashSpent() + '</b></div>'

      + '<button class="chipbtn ' + (SIM.radiant ? 'on' : '') + '" data-act="radiant">Radiant Edge 4 SP · K125</button>'
      + '<button class="btn-ghost" data-act="export">' + tri('Copier le build', 'Copy build', 'Copiar build') + '</button></div>'
      + '</div>'
      + (SIM.bar.length ? '<div class="card mt-3"><p class="lab">' + tri('Barre 1–9', 'Bar 1–9', 'Barra 1–9') + '</p><div class="flexwrap mt-2">' + SIM.bar.map((id, i) => '<span class="cstep gold">' + (i + 1) + ' · ' + esc(t2Name(id)) + '</span>').join('') + '</div></div>' : '');
    const raceTabs = ['Shinigami', 'Quincy', 'Hollow'].map(r => '<button class="tabbtn ' + (SIM.race === r ? 'on' : '') + '" data-act="trace" data-r="' + r + '">' + r + '</button>').join('');
    const legend = D.tree2.spokes.map(s2 => '<span class="mono text-xs" style="color:rgb(' + SPOKE_COLOR[s2.id] + ')">● ' + (s2.id === 'race' ? SIM.race + ' (Kidō)' : s2.label) + '</span>').join(' ');
    const selN = SIM.sel ? T2.get(SIM.sel) : null;
    const selPanel = selN && visible2(selN) ? '<div class="mt-3">' + panel2(selN) + '</div>'
      : '<p class="text-xs opacity-60 mt-2">' + tri('Clique une bulle pour la lire, l’acheter, monter son niveau, la mettre en barre ou lui donner le Hōgyoku. Molette = zoom · glisser = déplacer.', 'Click a node to read it, buy it, level it, slot it on the bar or give it the Hōgyoku. Wheel = zoom · drag = pan.', 'Haz clic en una burbuja para leerla y comprarla. Rueda = zoom · arrastrar = mover.') + '</p>';
    const stats = D.tree2.nodes.filter(visible2).length;

      + '<input type="text" placeholder="' + tri('Rechercher un skill…', 'Search a skill…', 'Buscar un skill…') + '" value="' + esc(SIM.search) + '" data-input="tsearch" style="background:var(--bg2);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:12px;padding:6px 10px;border-radius:8px;min-width:190px">'
      + '<span class="mono text-xs opacity-60 ml-auto">' + stats + ' nodes · ' + tri('positions réelles du jeu', 'real in-game positions', 'posiciones reales') + '</span></div>'
      + '<div class="flexwrap mt-2" style="gap:14px">' + legend + '</div>'

      + selPanel + '</div>';

      + '<div class="tblwrap mt-2"><table class="tbl"><thead><tr><th>Essence</th><th>SP</th><th>' + tri('Requiert', 'Requires', 'Requiere') + '</th></tr></thead><tbody>'

    return head + raceCard + essences;

  /* ---------- chrome ---------- */
  const NAVKEYS = [['home', 'nav_home'], ['start', 'nav_start'], ['shini', 'nav_shini'], ['quincy', 'nav_quincy'], ['hollow', 'nav_hollow'], ['tree', 'nav_tree'], ['combos', 'nav_combos'], ['db', 'nav_db'], ['gear', 'nav_gear']];
  const socialsHtml = big => '<div class="socials">' + D.sm.map(s => '<a href="' + esc(s.url) + '" target="_blank" rel="noopener" title="' + esc(s.label) + '"><svg viewBox="0 0 24 24"><path d="' + s.d + '"/></svg></a>').join('') + '</div>';

  function pageTitle() {
    switch (PAGE) {
      case 'shini': return T('shini_title'); case 'quincy': return T('quincy_title'); case 'hollow': return T('hollow_title');
      case 'tree': return T('tree_title'); case 'combos': return T('combos_title');
      case 'db': return tri('Base de données du jeu', 'Game database', 'Base de datos del juego');
      case 'gear': return tri('Équipement', 'Equipment', 'Equipamiento');
      case 'start': return T('nav_start'); default: return '';
    }
  }
  function pageSub() {
    if (PAGE === 'tree') return tri('Un tronc, 6 branches. Clique une branche et remonte-la du skill le plus proche au plus lointain : chaque node se lit, s’achète et se rend. Plus tu montes, plus les seuils et les coûts grimpent — le budget te force à choisir.', 'One trunk, 6 branches. Click a branch and climb it from the nearest skill to the farthest: every node can be read, bought and refunded. The higher you go, the steeper the gates and costs — the budget forces choices.', 'Un tronco, 6 ramas. El presupuesto obliga a elegir.');
    if (PAGE === 'combos') return T('combos_sub');
    return '';
  }

  function render() {
    const nav = NAVKEYS.map(([p, k]) => '<button class="navbtn ' + (PAGE === p ? 'on' : '') + '" data-act="nav" data-page="' + p + '">' + esc(T(k)) + '</button>').join('');
    const langs = ['fr', 'en', 'es'].map(l => '<button class="langbtn ' + (LANG === l ? 'on' : '') + '" data-act="lang" data-l="' + l + '">' + l.toUpperCase() + '</button>').join('');
    let body = '';
    try {
      body = { home: pageHome, start: pageStart, shini: pageShini, quincy: pageQuincy, hollow: pageHollow, tree: pageTree, combos: pageCombos, db: pageDb, gear: pageGear }[PAGE]();
    } catch (e) {
      body = '<div class="card"><h3 class="h3 warnc">Erreur de rendu</h3><p class="mono text-sm mt-2">' + esc(e.message) + '</p></div>';
      console.error(e);
    }
    const title = pageTitle(), sub = pageSub();
    document.getElementById('root').innerHTML =
      '<div class="wrap">'
      + '<header class="topbar"><div class="topline"><div class="brand"><em>VV:U</em> HUB <span class="opacity-60 tagline">· ' + esc(T('tagline')) + '</span></div><div class="langs">' + langs + '</div>' + socialsHtml() + '</div>'
      + '<nav class="nav">' + nav + '</nav></header>'
      + '<main class="page" id="main">'
      + (title ? '<h2 class="h2">' + esc(title) + '</h2>' : '')
      + (sub ? '<p class="opacity-80 max-w-3xl mb-4">' + esc(sub) + '</p>' : '')
      + body + '</main>'
      + '<footer class="foot"><span>' + esc(T('footer')) + ' · v13 — 10/07/2026</span>' + socialsHtml(true) + '</footer>'
      + '</div>';
    initMap();
  }

  /* ---------- événements ---------- */
  document.addEventListener('click', ev => {
    const el = ev.target.closest('[data-act]');
    if (!el) return;
    const act = el.dataset.act, id = el.dataset.id;
    const getNode = () => T2.get(id);
    switch (act) {
      case 'nav': PAGE = el.dataset.page; location.hash = PAGE; window.scrollTo(0, 0); break;
      case 'lang': LANG = el.dataset.l; localStorage.setItem('vvu-lang', LANG); break;
      case 'ctab': comboRace = el.dataset.r; break;
      case 'stab': startRace = el.dataset.r; break;
      case 'tier': charmTier = +el.dataset.t; break;
      case 'gslot': gearSlot = el.dataset.s; break;
      case 'trace': {
        SIM.race = el.dataset.r; SIM.sel = null;
        // un personnage = une race : on rend les nodes Kidō des autres races
        for (const oid of [...SIM.owned]) {
          const o = T2.get(oid);
          if (o && o.spoke === 'race' && o.race !== SIM.race) {
            SIM.owned.delete(oid); delete SIM.levels[oid];
            if (SIM.hogyoku === oid) SIM.hogyoku = null;
            SIM.bar = SIM.bar.filter(x => x !== oid);
          }
        }
        break;
      }
      case 'knode': {
        if (SIM._dragged) { SIM._dragged = false; return; }
        SIM.sel = id; break;
      }
      case 'buy': {
        const n = getNode(); if (!n || !canBuy(n)) break;
        if ((n.sp || 0) > 0 && spSpent() + (n.sp || 0) > SIM.budget) { alert(T('over')); break; }
        SIM.owned.add(n.id); break;
      }
      case 'refund': {
        const n = getNode(); if (!n) break;
        if (hasOwnedChild(n.id)) { alert(tri('Rends d’abord les skills qui en dépendent.', 'Refund dependent skills first.', 'Devuelve antes los skills dependientes.')); break; }
        SIM.owned.delete(n.id); delete SIM.levels[n.id];
        if (SIM.hogyoku === n.id) SIM.hogyoku = null;
        SIM.bar = SIM.bar.filter(x => x !== n.id);
        if (SIM.sel === n.id) SIM.sel = n.id; // garde la sélection
        break;
      }
      case 'lvlup': { const m = lvlMax(id); SIM.levels[id] = Math.min((SIM.levels[id] || 1) + 1, m); break; }
      case 'lvldn': SIM.levels[id] = Math.max((SIM.levels[id] || 1) - 1, 1); break;
      case 'hogy': {
        if (SIM.hogyoku === id) { SIM.hogyoku = null; if ((SIM.levels[id] || 1) > 6) SIM.levels[id] = 6; }
        else {
          if (SIM.hogyoku && (SIM.levels[SIM.hogyoku] || 1) > 6) SIM.levels[SIM.hogyoku] = 6;
          SIM.hogyoku = id;
        }
        break;
      }
      case 'tobar': {
        if (SIM.bar.includes(id)) SIM.bar = SIM.bar.filter(x => x !== id);
        else { if (SIM.bar.length >= 9) { alert(T('bar_full')); break; } SIM.bar.push(id); }
        break;
      }
      case 'kuro': SIM.kuro = !SIM.kuro; break;
      case 'radiant': SIM.radiant = !SIM.radiant; break;
      case 'export': {
        const txt = exportText();
        (navigator.clipboard ? navigator.clipboard.writeText(txt) : Promise.reject()).then(
          () => alert(tri('Build copié ✓', 'Build copied ✓', 'Build copiado ✓')),
          () => prompt(tri('Copie ce texte :', 'Copy this text:', 'Copia este texto:'), txt));
        break;
      }
      default: return;
    }
    render();
  });
  document.addEventListener('change', ev => {
    const el = ev.target.closest('[data-input]');
    if (!el) return;
    const k = el.dataset.input;
    if (k === 'budget') SIM.budget = Math.max(50, Math.min(250, +el.value || 100));
    else if (k.startsWith('attr-')) SIM.attrs[k.slice(5)] = Math.max(0, Math.min(400, +el.value || 0));
    else if (k === 'tsearch') SIM.search = el.value;
    render();
  });

  /* ---------- zoom / déplacement de la carte radiale ---------- */
  function initMap() {
    const svg = document.getElementById('t2map');
    if (!svg) return;
    const v = SIM.view;
    const apply = () => svg.setAttribute('viewBox', v.x + ' ' + v.y + ' ' + v.w + ' ' + v.h);
    svg.addEventListener('wheel', e => {
      e.preventDefault();
      const k = e.deltaY > 0 ? 1.15 : 0.87;
      const r = svg.getBoundingClientRect();
      const mx = v.x + (e.clientX - r.left) / r.width * v.w;
      const my = v.y + (e.clientY - r.top) / r.height * v.h;
      const nw = Math.max(340, Math.min(3400, v.w * k));
      const nh = nw * (v.h / v.w);
      v.x = mx - (mx - v.x) * (nw / v.w); v.y = my - (my - v.y) * (nh / v.h);
      v.w = nw; v.h = nh; apply();
    }, { passive: false });
    let drag = null;
    svg.addEventListener('pointerdown', e => { drag = { x: e.clientX, y: e.clientY, vx: v.x, vy: v.y, moved: false }; try { svg.setPointerCapture(e.pointerId); } catch (err) { } });
    svg.addEventListener('pointermove', e => {
      if (!drag) return;
      if (Math.abs(e.clientX - drag.x) + Math.abs(e.clientY - drag.y) > 5) drag.moved = true;
      const r = svg.getBoundingClientRect();
      v.x = drag.vx - (e.clientX - drag.x) / r.width * v.w;
      v.y = drag.vy - (e.clientY - drag.y) / r.height * v.h;
      apply();
    });
    svg.addEventListener('pointerup', () => { if (drag && drag.moved) SIM._dragged = true; drag = null; });
    svg.addEventListener('pointerleave', () => { drag = null; });
  }
  window.addEventListener('hashchange', () => {
    const p = location.hash.slice(1);
    if (VALID.includes(p) && p !== PAGE) { PAGE = p; render(); window.scrollTo(0, 0); }
  });

  render();
})();

</script>
