traverse-block nv.8). Geki punit automatiquement tout guardbreak tenté entre deux fenêtres ; le charme Soul Snatcher transforme le moindre Byakurai final en knock garanti sous 11% PV. Échappatoires résiduelles, nommées : (1) l’esquive frame-parfaite sur le PREMIER Sai ; (2) un skill à i-frames dépensé sur UNE étape ; (3) une aide extérieure — Fushibi nv.3 en slot 9 coupe son dash.","en":"Step by step: Sai lv.7 removes block; the only out is a frame-perfect dodge on its startup — hence the point-blank Shunpo cast. Once bound: M1s, Goryū, Hōrin, Rikujōkōrō offer NO option (Hōrin lv.6 scoops ragdolls — no “stay down”; Hōgyoku wish #2 adds the lv.8 block-pierce). Geki auto-punishes any guardbreak attempt between windows; Soul Snatcher turns the final Byakurai into a guaranteed knock under 11% HP. Residual outs, named: (1) the frame-perfect dodge on the FIRST Sai; (2) one i-frame skill spent on ONE step; (3) outside help — Fushibi lv.3 in slot 9 cuts their dash.","es":"Paso a paso: Sai nv.7 elimina el bloqueo; la única salida es la esquiva perfecta en su arranque — por eso se lanza a quemarropa tras Shunpo. Una vez atado: M1, Goryū, Hōrin y Rikujōkōrō no dejan NINGUNA opción. Geki castiga cualquier rotura de guardia; Soul Snatcher convierte el Byakurai final en derribo garantizado bajo 11% PV. Salidas residuales: la esquiva perfecta al PRIMER Sai, un skill con i-frames en UNA etapa, o ayuda externa."},"risk":{"fr":"Charmes : A Song of Fire and Thunder (foudre) + Soul Snatcher + Frostwalker (un nuke → ton prochain M1 GÈLE : cinquième bind de secours si Sai est esquivé). Reiatsu : base 55 → Reserves 200 non négociables pour tenir HCS. Règle inchangée : aucun nuke sur cible libre.","en":"Charms: A Song of Fire and Thunder (lightning) + Soul Snatcher + Frostwalker (one nuke → your next M1 FREEZES: a backup fifth bind if Sai gets dodged). Reiatsu: base 55 → Reserves 200 non-negotiable for HCS. Unchanged rule: no nuke on a free target.","es":"Amuletos: A Song of Fire and Thunder + Soul Snatcher + Frostwalker (un nuke → tu siguiente M1 CONGELA). Reserves 200 innegociables para HCS. Regla: ningún nuke sobre objetivo libre."},"lab":{"fr":"\u003ch3 class=\"h3\">🧪 Labo — preuve mathématique &amp; mécanique \u003cspan class=\"mono text-xs goldc\">calculs du 10/07/2026 · données du hub (Trello/arbre)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Six tests recalculés depuis la base de données de ce site. Verdict : \u003cb class=\"goldc\">séquence CONFIRMÉE — le seul combo des trois races légal sans modification.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Légalité (plafond 400 pts d'attributs)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Seuils du combo : Byakurai K28 · Sai K56 · Shō K84 · Fushibi K116 · Sekienton K120 · Rikujōkōrō K140 · Geki K185 · Hōrin K220 · Hainawa K280 · Goryū K350 · \u003cb>HCS K360\u003c/b> (max utilisable). Besoin minimal = max des seuils : \u003cb class=\"mono\">K360 + Speed 40 = 400/400\u003c/b> — \u003cb class=\"goldc\">LÉGAL au point près\u003c/b>. Chaque point mis en Strength/Hakuda casse le combo (théorème du 360).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coût d'arbre (prérequis inclus)\u003c/p>\n\u003cp class=\"text-sm mt-1\">25 nodes · \u003cb class=\"mono goldc\">150 SP\u003c/b> = 87 SP (cœur — le chiffre 87 est CONFIRMÉ par deux sources indépendantes) + 46 SP (branche HCS) + 17 SP (Fushibi). Si les SP manquent : couper HCS est la SEULE coupe qui ne touche pas au verrouillage (−48 SP : tu gardes 100 % du contrôle, tu perds le nuke).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Rotation &amp; Reiatsu (chiffres de l'arbre : Sai 40 s/−0,6 · 30 Rei/+1,4 — Byakurai 27,5 s/−0,4 · 24 Rei/+1,1)\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>Sai nv.7 : \u003cb class=\"mono\">CD 36,4 s · 38,4 Rei\u003c/b> — recoupe la fiche matchup « trades pendant le CD 35–40 s de Sai » ✓\u003c/li>\n\u003cli>Byakurai nv.4 : \u003cb class=\"mono\">CD 26,3 s · 27,3 Rei\u003c/b> &lt; 36,4 s → le finisher est prêt à CHAQUE rotation de Sai ✓\u003c/li>\n\u003cli>\u003cb class=\"warnc\">Sai nv.7 + Byakurai nv.4 = 65,7 Rei &gt; pool de base 55\u003c/b> : deux casts sur huit dépassent déjà le pool — Reserves 200 est une nécessité ARITHMÉTIQUE, pas un confort (HCS coûte en plus « très élevé »).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilités — pourquoi CET ordre est optimal\u003c/p>\n\u003cp class=\"text-sm mt-1\">ε = chance que l'adversaire saisisse UNE fenêtre de défense. Chaîne parable à 8 fenêtres : P = (1−ε)⁸. Ce combo compresse tout en UNE porte (l'esquive frame-parfaite sur le premier Sai) : P = 1−ε.\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>ε (défenseur)\u003c/th>\u003cth>chaîne naïve (1−ε)⁸\u003c/th>\u003cth>porte unique 1−ε\u003c/th>\u003cth>facteur\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono\">0,20 (faible / weak)\u003c/td>\u003ctd class=\"mono\">16,8 %\u003c/td>\u003ctd class=\"mono\">80 %\u003c/td>\u003ctd class=\"mono\">×4,8\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,35 (moyen / average)\u003c/td>\u003ctd class=\"mono\">3,2 %\u003c/td>\u003ctd class=\"mono\">65 %\u003c/td>\u003ctd class=\"mono\">×20\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,50 (bon / good)\u003c/td>\u003ctd class=\"mono\">0,4 %\u003c/td>\u003ctd class=\"mono\">50 %\u003c/td>\u003ctd class=\"mono\">×128\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,80 (expert)\u003c/td>\u003ctd class=\"mono\">≈0 %\u003c/td>\u003ctd class=\"mono\">20 %\u003c/td>\u003ctd class=\"mono\">×78 125\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Espérance des M1 (Katana 13 dmg/hit, table Trello) : liés = n×13 garantis ; libres = Σ 13·qᵏ. Pour 2 M1 à q = 0,7 : \u003cb class=\"mono\">26 vs 15,5 (+68 %)\u003c/b> — preuve chiffrée de la règle « aucun dégât sur cible libre » (E[dmg] = dmg×p, et p ≪ 1 sur cible libre). L'ordre place la porte unique AVANT tout investissement : un Sai esquivé coûte UN cast (36,4 s), jamais un nuke. Couverture d'états : debout-block → Sai nv.7 l'ignore · au sol → Hōrin ramasse les ragdolls · guardbreak tenté → Geki punit (CD 60 s) · &lt;11 % PV → Soul Snatcher knock.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Règle des niveaux : plafond nv.6, UN seul Hōgyoku\u003c/p>\n\u003cp class=\"text-sm mt-1\">Limite du jeu (modélisée par le simulateur de ce hub) : chaque skill plafonne à \u003cb>nv.6\u003c/b> ; SEUL le skill qui reçoit LE Hōgyoku monte à nv.7–8 — on ne peut donc PAS tout monter à fond. La séquence ci-dessus l'applique : \u003cb class=\"goldc\">Hōgyoku → Sai (nv.7 : l'ignore-block, LA porte du combo)\u003c/b> ; Hōrin est joué \u003cb>nv.6\u003c/b> — sa propriété de base (« tire la cible, fonctionne sur les ragdolls ») suffit, car la cible est déjà liée quand il part. Le vœu Hōgyoku n°2 (rare, long à farmer) ira sur Hōrin (nv.8 : traverse aussi le block).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Budget d'amélioration limité — l'ordre des niveaux\u003c/p>\n\u003cp class=\"text-sm mt-1\">Chaque palier coûte, et monter un skill augmente aussi son coût par cast (Sai : 30 → 38,4 Rei de nv.1 à 7 ; Byakurai : 24 → 27,3 à nv.4). Priorités dans l'ordre, avec le passif débloqué à chaque palier (données du hub) :\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → palier\u003c/th>\u003cth>Passif débloqué / pourquoi ce palier\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Sai → nv.7\u003c/b> (LE Hōgyoku)\u003c/td>\u003ctd>IGNORE LE BLOCK — sans ce palier, pas de combo\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">2\u003c/td>\u003ctd>Fushibi → nv.3 (slot 9)\u003c/td>\u003ctd>coupe le dash/flash-step des piégés — 3 niveaux SUFFISENT, ne monte pas plus\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Shō → nv.3\u003c/td>\u003ctd>« empêche de se relever » (nv.6 scelle le Reiatsu = luxe, seulement si le budget suit)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">4\u003c/td>\u003ctd>Byakurai → nv.4\u003c/td>\u003ctd>after-shock sur le finisher — CD 26,3 s : toujours prêt à chaque rotation\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">5\u003c/td>\u003ctd>Sekienton → nv.6\u003c/td>\u003ctd>rushdown derrière la fumée\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Hōrin · Rikujōkōrō · Goryū · HCS · Hainawa\u003c/td>\u003ctd>propriétés de combo NATIVES (traction ragdoll, bind, nuke, vol de Rei) : les laisser bas ne casse RIEN — chaque point économisé va aux lignes 1–5\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict :\u003c/b> séquence CONFIRMÉE par les 6 tests — 400 points exactement, 152 SP, rotation et budget Reiatsu cohérents, porte de sortie unique, et AUCUN skill au-dessus des limites de niveaux du jeu (un seul palier Hōgyoku, sur Sai).\u003c/p>","en":"\u003ch3 class=\"h3\">🧪 Lab — mathematical &amp; mechanical proof \u003cspan class=\"mono text-xs goldc\">computed Jul 10, 2026 · hub data (Trello/tree)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Six tests recomputed from this site's own database. Verdict: \u003cb class=\"goldc\">sequence CONFIRMED — the only combo of the three races that is legal without modification.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legality (400 attribute-point cap)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Combo gates: Byakurai K28 · Sai K56 · Shō K84 · Fushibi K116 · Sekienton K120 · Rikujōkōrō K140 · Geki K185 · Hōrin K220 · Hainawa K280 · Goryū K350 · \u003cb>HCS K360\u003c/b> (highest usable). Minimal need = max of gates: \u003cb class=\"mono\">K360 + Speed 40 = 400/400\u003c/b> — \u003cb class=\"goldc\">LEGAL to the exact point\u003c/b>. Any point in Strength/Hakuda breaks the combo (360 theorem).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Tree cost (prerequisites included)\u003c/p>\n\u003cp class=\"text-sm mt-1\">25 nodes · \u003cb class=\"mono goldc\">150 SP\u003c/b> = 87 SP (core — the 87 figure is CONFIRMED by two independent sources) + 46 SP (HCS branch) + 17 SP (Fushibi). Short on SP? Cutting HCS is the ONLY cut that doesn't touch the lockdown (−48 SP: you keep 100% of control, you lose the nuke).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Rotation &amp; Reiatsu (tree data: Sai 40s/−0.6 · 30 Rei/+1.4 — Byakurai 27.5s/−0.4 · 24 Rei/+1.1)\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>Sai lv.7: \u003cb class=\"mono\">CD 36.4s · 38.4 Rei\u003c/b> — cross-checks the matchup note “trades during Sai's 35–40s CD” ✓\u003c/li>\n\u003cli>Byakurai lv.4: \u003cb class=\"mono\">CD 26.3s · 27.3 Rei\u003c/b> &lt; 36.4s → the finisher is ready EVERY Sai rotation ✓\u003c/li>\n\u003cli>\u003cb class=\"warnc\">Sai lv.7 + Byakurai lv.4 = 65.7 Rei &gt; base pool 55\u003c/b>: two of the eight casts already exceed the base pool — Reserves 200 is an ARITHMETIC necessity, not comfort (HCS also costs “very high”).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilities — why THIS order is optimal\u003c/p>\n\u003cp class=\"text-sm mt-1\">ε = chance the opponent seizes ONE defense window. A parryable 8-window chain: P = (1−ε)⁸. This combo compresses everything into ONE gate (the frame-perfect dodge on the first Sai): P = 1−ε.\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>ε (defender)\u003c/th>\u003cth>naive chain (1−ε)⁸\u003c/th>\u003cth>single gate 1−ε\u003c/th>\u003cth>factor\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono\">0,20 (faible / weak)\u003c/td>\u003ctd class=\"mono\">16,8 %\u003c/td>\u003ctd class=\"mono\">80 %\u003c/td>\u003ctd class=\"mono\">×4,8\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,35 (moyen / average)\u003c/td>\u003ctd class=\"mono\">3,2 %\u003c/td>\u003ctd class=\"mono\">65 %\u003c/td>\u003ctd class=\"mono\">×20\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,50 (bon / good)\u003c/td>\u003ctd class=\"mono\">0,4 %\u003c/td>\u003ctd class=\"mono\">50 %\u003c/td>\u003ctd class=\"mono\">×128\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,80 (expert)\u003c/td>\u003ctd class=\"mono\">≈0 %\u003c/td>\u003ctd class=\"mono\">20 %\u003c/td>\u003ctd class=\"mono\">×78 125\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">M1 expectation (Katana 13 dmg/hit, Trello table): bound = n×13 guaranteed; free = Σ 13·qᵏ. For 2 M1s at q = 0.7: \u003cb class=\"mono\">26 vs 15.5 (+68%)\u003c/b> — the numeric proof of “no damage on a free target” (E[dmg] = dmg×p, and p ≪ 1 on a free target). The order puts the single gate BEFORE any investment: a dodged Sai costs ONE cast (36.4s), never a nuke. State coverage: standing-block → Sai lv.7 ignores it · downed → Hōrin scoops ragdolls · attempted guardbreak → Geki punishes (60s CD) · &lt;11% HP → Soul Snatcher knock.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Level rule: lv.6 cap, ONE Hōgyoku only\u003c/p>\n\u003cp class=\"text-sm mt-1\">Game limit (modeled by this hub's simulator): every skill caps at \u003cb>lv.6\u003c/b>; ONLY the skill holding THE Hōgyoku reaches lv.7–8 — you can NOT max everything. The sequence above applies it: \u003cb class=\"goldc\">Hōgyoku → Sai (lv.7: the block-ignore, THE combo's gate)\u003c/b>; Hōrin is played \u003cb>lv.6\u003c/b> — its base property (“pulls the target, works on ragdolls”) is enough, since the target is already bound when it fires. Hōgyoku wish #2 (rare, slow to farm) goes on Hōrin (lv.8: also pierces block).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Limited upgrade budget — the level order\u003c/p>\n\u003cp class=\"text-sm mt-1\">Every tier costs, and leveling a skill also raises its per-cast cost (Sai: 30 → 38.4 Rei from lv.1 to 7; Byakurai: 24 → 27.3 at lv.4). Priorities in order, with the passive unlocked at each tier (hub data):\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → tier\u003c/th>\u003cth>Unlocked passive / why this tier\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Sai → lv.7\u003c/b> (THE Hōgyoku)\u003c/td>\u003ctd>IGNORES BLOCK — without this tier there is no combo\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">2\u003c/td>\u003ctd>Fushibi → lv.3 (slot 9)\u003c/td>\u003ctd>cuts the trapped target's dash/flash-step — 3 levels are ENOUGH, don't level further\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Shō → lv.3\u003c/td>\u003ctd>“prevents getting up” (lv.6 Reiatsu-seal = luxury, only if budget allows)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">4\u003c/td>\u003ctd>Byakurai → lv.4\u003c/td>\u003ctd>after-shock on the finisher — 26.3s CD: ready every rotation\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">5\u003c/td>\u003ctd>Sekienton → lv.6\u003c/td>\u003ctd>rushdown behind the smoke\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Hōrin · Rikujōkōrō · Goryū · HCS · Hainawa\u003c/td>\u003ctd>NATIVE combo properties (ragdoll pull, bind, nuke, Rei steal): keeping them low breaks NOTHING — every point saved goes to rows 1–5\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict:\u003c/b> sequence CONFIRMED by all 6 tests — exactly 400 points, 152 SP, coherent rotation and Reiatsu budget, single exit gate, and NO skill above the game's level limits (a single Hōgyoku tier, on Sai).\u003c/p>","es":"\u003ch3 class=\"h3\">🧪 Labo — prueba matemática y mecánica \u003cspan class=\"mono text-xs goldc\">calculado 10/07/2026 · datos del hub\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Seis tests recalculados desde la base de datos del sitio. Veredicto: \u003cb class=\"goldc\">secuencia CONFIRMADA — el único combo legal sin modificación.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legalidad (tope 400 puntos)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Umbral máximo del combo: \u003cb>HCS K360\u003c/b> → necesidad mínima \u003cb class=\"mono\">K360 + Speed 40 = 400/400\u003c/b> — \u003cb class=\"goldc\">LEGAL al punto exacto\u003c/b>. Cada punto en Strength/Hakuda rompe el combo (teorema del 360).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coste de árbol\u003c/p>\n\u003cp class=\"text-sm mt-1\">25 nodos · \u003cb class=\"mono goldc\">150 SP\u003c/b> = 87 (núcleo) + 46 (rama HCS) + 17 (Fushibi). Si faltan SP: corta HCS (−48 SP, conservas el 100% del control).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Rotación y Reiatsu\u003c/p>\n\u003cp class=\"text-sm mt-1\">Sai nv.7: \u003cb class=\"mono\">CD 36,4 s · 38,4 Rei\u003c/b> (coincide con «trades durante el CD 35–40 s» ✓) · Byakurai nv.4: \u003cb class=\"mono\">26,3 s · 27,3 Rei\u003c/b> → listo en cada rotación ✓ · \u003cb class=\"warnc\">38,4 + 27,3 = 65,7 &gt; pool base 55\u003c/b> → Reserves 200 es necesidad ARITMÉTICA.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilidades\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>ε (defensor)\u003c/th>\u003cth>cadena naíf (1−ε)⁸\u003c/th>\u003cth>puerta única 1−ε\u003c/th>\u003cth>factor\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono\">0,20 (faible / weak)\u003c/td>\u003ctd class=\"mono\">16,8 %\u003c/td>\u003ctd class=\"mono\">80 %\u003c/td>\u003ctd class=\"mono\">×4,8\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,35 (moyen / average)\u003c/td>\u003ctd class=\"mono\">3,2 %\u003c/td>\u003ctd class=\"mono\">65 %\u003c/td>\u003ctd class=\"mono\">×20\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,50 (bon / good)\u003c/td>\u003ctd class=\"mono\">0,4 %\u003c/td>\u003ctd class=\"mono\">50 %\u003c/td>\u003ctd class=\"mono\">×128\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono\">0,80 (expert)\u003c/td>\u003ctd class=\"mono\">≈0 %\u003c/td>\u003ctd class=\"mono\">20 %\u003c/td>\u003ctd class=\"mono\">×78 125\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Esperanza de M1 (Katana 13): atados = n×13; libres = Σ 13·qᵏ → 2 M1, q=0,7: \u003cb class=\"mono\">26 vs 15,5 (+68%)\u003c/b>. Cobertura de estados: bloqueo → Sai nv.7 lo ignora · suelo → Hōrin recoge ragdolls · guardbreak → Geki castiga · &lt;11% PV → Soul Snatcher.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Regla de niveles: tope nv.6, UN solo Hōgyoku\u003c/p>\n\u003cp class=\"text-sm mt-1\">Límite del juego: cada skill llega a \u003cb>nv.6\u003c/b>; SOLO el skill con EL Hōgyoku sube a nv.7–8 — no se puede maximizar todo. La secuencia lo aplica: \u003cb class=\"goldc\">Hōgyoku → Sai (nv.7)\u003c/b>; Hōrin se juega nv.6 (su propiedad base basta: el objetivo ya está atado).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Presupuesto de mejora limitado — orden de niveles\u003c/p>\n\u003cp class=\"text-sm mt-1\">Prioridades: \u003cb>1. Sai → nv.7 (EL Hōgyoku, sin él no hay combo)\u003c/b> · 2. Fushibi → nv.3 (corta el dash, con 3 basta) · 3. Shō → nv.3 (impide levantarse) · 4. Byakurai → nv.4 (after-shock) · 5. Sekienton → nv.6 (rushdown). Hōrin/Rikujōkōrō/Goryū/HCS/Hainawa: propiedades NATIVAS — dejarlos bajos no rompe nada.\u003c/p>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Veredicto:\u003c/b> secuencia CONFIRMADA por los 6 tests — 400 puntos exactos, 152 SP, puerta única, y NINGÚN skill por encima de los límites de nivel del juego.\u003c/p>"}},"quincy":{"steps":["Blut Arterie (K60) — nv.4+ : sans drain (le vœu Hōgyoku → nv.8, bonus max)","Perfect Flash (charme) + Flash Surprise (Sp92) — opener ×2,5 hors combat","Fireworks (Sp205 · K60) — aveugle la zone : la volée part sans lecture","M1 Sword string (rapide, fiable)","Vortex Edge (Sp148) / False Cutter (Sp208)","Splitting Standstill (Sp300) — le slow scelle la cible","Flying Cyclone (Sp220 · K85) — le projectile qui déchire + refresh le rushdown","Flash Execute (Sp310) — le finisher"],"counter":{"fr":"Étape par étape : l'opener ×2,5 (charme Perfect Flash, CD 60 s) frappe AVANT le combat — aucune réaction possible par définition. Fireworks aveugle la zone : la première volée part sans lecture (nv.4 : annule même les ragdolls). Le slow de Splitting Standstill rétrécit chaque fenêtre d'esquive entre deux volées — c'est lui qui scelle ; Kumo Kiri (Sp100 · K32, posture qui counter TOUTE attaque) couvre le gap entre deux volées. Résiduel nommé : les M1 restent parables (qⁿ) — Superstar (revive de James) efface UNE erreur par combat. Pourquoi ni Blade Flow, ni Fallzwang, ni Stille Silber : seuils RÉELS (planner) — Blade Flow exige Speed 355, incompatible avec Blut Arterie (355+60 = 415 > 400) ; Fallzwang exige Kidō 300 (600 avec l'essence) ; Stille Silber (K124) coûterait Flash Execute. Preuves chiffrées au Labo.","en":"Step by step: the ×2.5 opener (Perfect Flash charm, 60s CD) lands BEFORE combat — no reaction is possible by definition. Fireworks blinds the area: the first volley goes unread (lv.4: even cancels ragdolls). Splitting Standstill's slow shrinks every dodge window between volleys — it is the sealer; Kumo Kiri (Sp100 · K32, a stance countering ANY attack) covers the inter-volley gap. Named residual: M1s remain parryable (qⁿ) — Superstar (James' revive) erases ONE mistake per fight. Why no Blade Flow, Fallzwang or Stille Silber: REAL gates (planner) — Blade Flow needs Speed 355, incompatible with Blut Arterie (355+60 = 415 > 400); Fallzwang needs Kido 300 (600 with the essence); Stille Silber (K124) would cost Flash Execute. Numeric proofs in the Lab.","es":"Paso a paso: el opener ×2,5 (amuleto Perfect Flash) golpea ANTES del combate. Fireworks ciega la zona (nv.4: anula ragdolls). El slow de Splitting Standstill sella entre ráfagas; Kumo Kiri (Sp100 · K32) countera CUALQUIER ataque en el hueco. Residual: los M1 siguen siendo parables (qⁿ) — Superstar borra UN error. ¿Por qué no Blade Flow/Fallzwang/Stille Silber?: umbrales REALES — Blade Flow pide Speed 355 (355+60 = 415 > 400); Fallzwang Kido 300; Stille Silber costaría Flash Execute. Pruebas en el Labo."},"risk":{"fr":"Répartition PROUVÉE sur les seuils réels : Speed 310 / Kidō 90 (= 400 pile — Flash Execute exige Sp310, Blut Vene K90) · Sword · clan Kurosaki · essence Splitting Standstill (Sp300 ✓) · charmes A Song of Fire and Thunder + Perfect Flash. Kit complet : 111 SP + 75 Cash (21 nodes, calcul sur l'arbre réel) — ajoute Kumo Kiri (counter), Rapid Recovery (régén Rei scalée Speed), Hyperspeed (Sp108), Afterimage Clones (Sp255 : échappe les stuns). LE Hōgyoku va sur Blut Arterie (nv.8). Variante anti-transformation : Sp276 / K124 (Stille Silber nv.5) — perd l'essence ET Flash Execute : à réserver aux adversaires 100 % dépendants de leur forme. Jamais de cooldown dans l'hyperarmor adverse.","en":"PROVEN split on the real gates: Speed 310 / Kido 90 (= exactly 400 — Flash Execute needs Sp310, Blut Vene K90) · Sword · Kurosaki clan · Splitting Standstill essence (Sp300 ✓) · A Song of Fire and Thunder + Perfect Flash charms. Full kit: 111 SP + 75 Cash (21 nodes, computed on the real tree) — adds Kumo Kiri (counter), Rapid Recovery (Speed-scaled Rei regen), Hyperspeed (Sp108), Afterimage Clones (Sp255: escapes stuns). THE Hōgyoku goes on Blut Arterie (lv.8). Anti-transformation variant: Sp276 / K124 (Stille Silber lv.5) — loses the essence AND Flash Execute: only vs fully form-reliant kits. Never commit cooldowns into enemy hyperarmor.","es":"Reparto PROBADO sobre umbrales reales: Speed 310 / Kido 90 (= 400 exactos) · Sword · Kurosaki · esencia Splitting Standstill (Sp300 ✓). Kit completo: 111 SP + 75 Cash (21 nodos). EL Hōgyoku va en Blut Arterie (nv.8). Variante: Sp276/K124 (Stille Silber nv.5) — pierde esencia Y Flash Execute. Nunca contra hyperarmor."},"lab":{"fr":"\u003ch3 class=\"h3\">🧪 Labo — preuve mathématique &amp; mécanique \u003cspan class=\"mono text-xs goldc\">seuils RÉELS de l'arbre (planner) · 10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict : \u003cb class=\"goldc\">Speed 310 / Kidō 90 = 400 pile — le seul build qui garde le finisher, l'essence ET le Blut.\u003c/b> L'historique des corrections est chiffré ci-dessous.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Légalité (plafond 400) — sur les seuils réels\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Élément\u003c/th>\u003cth>Seuil réel\u003c/th>\u003cth>Verdict\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd>\u003cb>Flash Execute\u003c/b> (finisher)\u003c/td>\u003ctd class=\"mono\">Speed 310\u003c/td>\u003ctd class=\"mono goldc\">✓ l'ancre du build\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Essence Splitting Standstill\u003c/td>\u003ctd class=\"mono\">Speed 300\u003c/td>\u003ctd class=\"mono goldc\">✓ (310 ≥ 300)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blut Vene\u003c/td>\u003ctd class=\"mono\">Kidō 90\u003c/td>\u003ctd class=\"mono goldc\">✓ la 2ᵉ ancre\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blut Arterie\u003c/td>\u003ctd class=\"mono\">Kidō 60\u003c/td>\u003ctd class=\"mono goldc\">✓\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Fireworks (aveugle)\u003c/td>\u003ctd class=\"mono\">Sp205 + K60\u003c/td>\u003ctd class=\"mono goldc\">✓\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Flying Cyclone · Kumo Kiri\u003c/td>\u003ctd class=\"mono\">Sp220+K85 · Sp100+K32\u003c/td>\u003ctd class=\"mono goldc\">✓ sous-branche hybride Speed/Kidō entière\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blade Flow\u003c/td>\u003ctd class=\"mono warnc\">Speed 355\u003c/td>\u003ctd class=\"text-xs warnc\">✗ 355+60 (Blut) = 415 &gt; 400 — incompatible\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Fallzwang\u003c/td>\u003ctd class=\"mono warnc\">Kidō 300\u003c/td>\u003ctd class=\"text-xs warnc\">✗ 600 avec l'essence\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Stille Silber\u003c/td>\u003ctd class=\"mono warnc\">Kidō 124\u003c/td>\u003ctd class=\"text-xs warnc\">✗ coûterait Flash Execute (310+124 = 434)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Besoin minimal = max des seuils : \u003cb class=\"mono\">Speed 310 + Kidō 90 = 400/400\u003c/b> — \u003cb class=\"goldc\">LÉGAL au point près\u003c/b>. Historique : v9 (Fallzwang + essence) = 600/400 ✗ · v10-12 (Sp300/K100) perdait les DEUX finishers — les seuils Speed n'étaient pas publiés, ils le sont désormais.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coût d'arbre — calculé sur le graphe réel\u003c/p>\n\u003cp class=\"text-sm mt-1\">Kit complet (13 skills + chemins de prérequis) : \u003cb class=\"mono goldc\">111 SP + 75 Cash · 21 nodes\u003c/b> — vérification automatique : AUCUN prérequis de chemin ne dépasse Sp310/K90 ✓. Plus aucune hypothèse « menu M » : chaque seuil est publié.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · L'opener est HORS plafond (mécanique charme)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Perfect Flash est un CHARME T2 : « 1ᵉʳ coup mêlée hors combat ×2,5 — même sur cible pleine vie (CD 60 s) » — aucun seuil d'attribut. Premier hit Sword (13, table Trello) : \u003cb class=\"mono\">13 → 32,5\u003c/b>. Blut Arterie nv.4+ (sans drain) booste la volée en continu.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilités\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>p(opener) = 1 par définition : « hors combat » = avant toute possibilité de réaction.\u003c/li>\n\u003cli>String de 4 M1 : E = Σ 13·qᵏ = \u003cb class=\"mono\">23,1 à q = 0,7\u003c/b> ; le slow de Standstill rétrécit les esquives → à q = 0,85 : \u003cb class=\"mono\">33,4 (+45 %)\u003c/b> — le rôle mathématique de l'essence.\u003c/li>\n\u003cli>Superstar = un 2ᵉ essai : P(≥1 séquence complète) passe de 1−ε à \u003cb class=\"mono\">1−ε²\u003c/b> (ε = 0,5 : 50 % → 75 %).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 5 · Remplaçants fonctionnels (mécanique)\u003c/p>\n\u003cp class=\"text-sm mt-1\">L'aveugle de zone : \u003cb>Fireworks\u003c/b> (nv.4 : annule les ragdolls adverses). Le counter entre deux volées : \u003cb>Kumo Kiri\u003c/b> (posture qui counter TOUTE attaque entrante). L'anti-stun : \u003cb>Afterimage Clones\u003c/b> (Sp255). La régén : \u003cb>Rapid Recovery\u003c/b> (scalée sur Speed — parfaite à 310).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Budget d'amélioration limité — l'ordre des niveaux\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → palier\u003c/th>\u003cth>Passif débloqué (données réelles)\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Blut Arterie → nv.4\u003c/b>\u003c/td>\u003ctd>« ne vide plus la jauge de Blut + augmente les dégâts d'arme » — le palier sans-drain est nv.4, PAS nv.8\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">2\u003c/td>\u003ctd>\u003cb>Blut Arterie → nv.8\u003c/b> (LE Hōgyoku)\u003c/td>\u003ctd>bonus d'arme maximal — après le vœu seulement\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Flash Execute → 6 fragments\u003c/td>\u003ctd>nv.5 : seuil de kill fortement accru sur cible guardbreak — ton finisher\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">4\u003c/td>\u003ctd>Fireworks → nv.4\u003c/td>\u003ctd>annule les ragdolls adverses — l'aveugle devient un outil de relance\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">5\u003c/td>\u003ctd>Flash Surprise → nv.3\u003c/td>\u003ctd>frames de riposte après le startup\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Kumo Kiri · Vortex Edge · False Cutter · Flying Cyclone · Clone Strike\u003c/td>\u003ctd>propriétés natives — nv.1 (Kumo Kiri nv.7 = luxe de fin de progression)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Variante B : Stille Silber → nv.5 EXACTEMENT\u003c/td>\u003ctd>nv.3 coupe la régén de Reiatsu · nv.5 désactive les transformations (données réelles)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict :\u003c/b> Sp310/K90 est LE build — 400 points au point près, 111 SP calculés sur le graphe réel, finisher + essence + Blut réunis, et AUCUN palier au-dessus des limites de niveaux du jeu (un seul vœu Hōgyoku, sur Blut Arterie).\u003c/p>","en":"\u003ch3 class=\"h3\">🧪 Lab — mathematical &amp; mechanical proof \u003cspan class=\"mono text-xs goldc\">REAL tree gates (planner) · Jul 10, 2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict: \u003cb class=\"goldc\">Speed 310 / Kido 90 = exactly 400 — the only build keeping the finisher, the essence AND the Blut.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legality (400 cap) — on the real gates\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Element\u003c/th>\u003cth>Real gate\u003c/th>\u003cth>Verdict\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd>\u003cb>Flash Execute\u003c/b> (finisher)\u003c/td>\u003ctd class=\"mono\">Speed 310\u003c/td>\u003ctd class=\"mono goldc\">✓ the build's anchor\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Splitting Standstill essence\u003c/td>\u003ctd class=\"mono\">Speed 300\u003c/td>\u003ctd class=\"mono goldc\">✓ (310 ≥ 300)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blut Vene\u003c/td>\u003ctd class=\"mono\">Kido 90\u003c/td>\u003ctd class=\"mono goldc\">✓ the 2nd anchor\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blut Arterie · Fireworks · Flying Cyclone · Kumo Kiri\u003c/td>\u003ctd class=\"mono\">K60 · Sp205+K60 · Sp220+K85 · Sp100+K32\u003c/td>\u003ctd class=\"mono goldc\">✓ whole Speed/Kido hybrid sub-branch\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Blade Flow\u003c/td>\u003ctd class=\"mono warnc\">Speed 355\u003c/td>\u003ctd class=\"text-xs warnc\">✗ 355+60 (Blut) = 415 &gt; 400 — incompatible\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Fallzwang\u003c/td>\u003ctd class=\"mono warnc\">Kido 300\u003c/td>\u003ctd class=\"text-xs warnc\">✗ 600 with the essence\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Stille Silber\u003c/td>\u003ctd class=\"mono warnc\">Kido 124\u003c/td>\u003ctd class=\"text-xs warnc\">✗ would cost Flash Execute (310+124 = 434)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Minimal need = max of gates: \u003cb class=\"mono\">Speed 310 + Kido 90 = 400/400\u003c/b> — \u003cb class=\"goldc\">LEGAL to the exact point\u003c/b>. History: v9 (Fallzwang + essence) = 600/400 ✗ · v10-12 (Sp300/K100) lost BOTH finishers — Speed gates were unpublished, now they are.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Tree cost — computed on the real graph\u003c/p>\n\u003cp class=\"text-sm mt-1\">Full kit (13 skills + prerequisite paths): \u003cb class=\"mono goldc\">111 SP + 75 Cash · 21 nodes\u003c/b> — automated check: NO path prerequisite exceeds Sp310/K90 ✓. No more \"M menu\" hypothesis: every gate is published.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · The opener sits OUTSIDE the cap\u003c/p>\n\u003cp class=\"text-sm mt-1\">Perfect Flash is a T2 CHARM: \"1st melee hit out of combat ×2.5 (60s CD)\" — no attribute gate. First Sword hit: \u003cb class=\"mono\">13 → 32.5\u003c/b>. Blut Arterie lv.4+ (no drain) boosts the volley continuously.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilities\u003c/p>\n\u003cp class=\"text-sm mt-1\">p(opener) = 1 by definition · 4-M1 string: E = 23.1 (q = 0.7); with the slow (q = 0.85): \u003cb class=\"mono\">33.4 (+45%)\u003c/b> · Superstar: P goes from 1−ε to \u003cb class=\"mono\">1−ε²\u003c/b> (ε = 0.5: 50% → 75%).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Functional replacements\u003c/p>\n\u003cp class=\"text-sm mt-1\">Area blind: \u003cb>Fireworks\u003c/b> (lv.4: cancels enemy ragdolls). Inter-volley counter: \u003cb>Kumo Kiri\u003c/b> (stance countering ANY attack). Anti-stun: \u003cb>Afterimage Clones\u003c/b> (Sp255). Regen: \u003cb>Rapid Recovery\u003c/b> (Speed-scaled — perfect at 310).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Limited upgrade budget — the level order\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → tier\u003c/th>\u003cth>Unlocked passive (real data)\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Blut Arterie → lv.4\u003c/b>\u003c/td>\u003ctd>\"no longer saps the Blut bar + increases weapon dmg\" — the no-drain tier is lv.4, NOT lv.8\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">2\u003c/td>\u003ctd>\u003cb>Blut Arterie → lv.8\u003c/b> (THE Hōgyoku)\u003c/td>\u003ctd>maximum weapon bonus — after the wish only\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Flash Execute → 6 fragments\u003c/td>\u003ctd>lv.5: much higher kill threshold on guardbroken targets — your finisher\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">4\u003c/td>\u003ctd>Fireworks → lv.4\u003c/td>\u003ctd>cancels enemy ragdolls — the blind becomes a pickup tool\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">5\u003c/td>\u003ctd>Flash Surprise → lv.3\u003c/td>\u003ctd>riposte frames after startup\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Kumo Kiri · Vortex Edge · False Cutter · Flying Cyclone · Clone Strike\u003c/td>\u003ctd>native properties — lv.1 (Kumo Kiri lv.7 = endgame luxury)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Variant B: Stille Silber → lv.5 EXACTLY\u003c/td>\u003ctd>lv.3 cuts Rei regen · lv.5 disables transformations (real data)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict:\u003c/b> Sp310/K90 is THE build — exactly 400 points, 111 SP computed on the real graph, finisher + essence + Blut together, and NO tier above the game's level limits (a single Hōgyoku wish, on Blut Arterie).\u003c/p>","es":"\u003ch3 class=\"h3\">🧪 Labo — prueba matemática y mecánica \u003cspan class=\"mono text-xs goldc\">umbrales REALES del árbol · 10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Veredicto: \u003cb class=\"goldc\">Speed 310 / Kido 90 = 400 exactos — el único build que conserva el finisher, la esencia Y el Blut.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legalidad (tope 400) — umbrales reales\u003c/p>\n\u003cp class=\"text-sm mt-1\">\u003cb>Flash Execute = Speed 310\u003c/b> (ancla) · esencia = Sp300 ✓ · Blut Vene = K90 (2.ª ancla) · Fireworks Sp205+K60 ✓ · Flying Cyclone Sp220+K85 ✓ · Kumo Kiri Sp100+K32 ✓. Rechazados: \u003cb class=\"warnc\">Blade Flow (Sp355: 355+60 = 415 &gt; 400)\u003c/b> · Fallzwang (K300) · Stille Silber (K124: costaría Flash Execute). Necesidad mínima: \u003cb class=\"mono\">310 + 90 = 400/400 — LEGAL al punto exacto\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coste del árbol (grafo real)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Kit completo: \u003cb class=\"mono goldc\">111 SP + 75 Cash · 21 nodos\u003c/b> — ningún prerrequisito supera Sp310/K90 ✓.\u003c/p>\n\u003cp class=\"lab mt-4\">Tests 3-5 · Opener, probabilidades, sustitutos\u003c/p>\n\u003cp class=\"text-sm mt-1\">Perfect Flash = AMULETO (×2,5, sin umbral): 13 → \u003cb class=\"mono\">32,5\u003c/b> · slow: E de la ráfaga \u003cb class=\"mono\">23,1 → 33,4 (+45%)\u003c/b> · Superstar: 1−ε → \u003cb class=\"mono\">1−ε²\u003c/b>. El ciego: Fireworks (nv.4 anula ragdolls) · counter: Kumo Kiri · anti-stun: Afterimage Clones.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Niveles\u003c/p>\n\u003cp class=\"text-sm mt-1\">\u003cb>1. Blut Arterie → nv.4\u003c/b> (sin drenaje — el palier real es nv.4, NO nv.8) · \u003cb>2. Blut Arterie → nv.8\u003c/b> (EL Hōgyoku) · 3. Flash Execute → 6 fragmentos (nv.5: umbral de kill en guardbreak) · 4. Fireworks → nv.4 · 5. Flash Surprise → nv.3 · resto nv.1 · Variante B: Stille Silber → nv.5 EXACTO.\u003c/p>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Veredicto:\u003c/b> Sp310/K90 es EL build — 400 exactos, 111 SP en el grafo real, sin ningún nivel por encima de los límites del juego.\u003c/p>"}},"hollow":{"steps":["Wings — recolle la distance","Bala Ripcord nv.6 — TRAVERSE le block et TIRE la cible à toi","M1 Deadly Claws (cadence maximale)","Dragon Lash (H56) — re-stun : la string repart de zéro","Zero Clutch nv.6 — saisie → auto-exécution à bas PV","Sinon : Cero (exécute à distance) / Psycho Crash (ignore les i-frames de ragdoll)"],"counter":{"fr":"Étape par étape : l’opener n’est PAS un M1 parable — Bala Ripcord nv.6 traverse le block et supprime l’out « reculer/bloquer » en ramenant la cible au corps-à-corps. Dragon Lash re-stun au milieu de la string : le compteur de parade repart de zéro (+49% d’espérance de dégâts, calcul au Labo). La sortie est triple et sans réponse à bas PV : Zero Clutch saisit (les saisies ne se parent pas) et auto-exécute, Cero exécute à distance, Psycho Crash ferme l’out « i-frames de ragdoll » — debout, loin ou au sol : AUCUN état n’est sûr. Résiduel nommé : l’esquive latérale sur le trajet du Ripcord (projectile) et les M1 intermédiaires parables — qⁿ est contourné aux deux bouts. Pourquoi Suplex a disparu : Suplex (H115 + S28) + Zero Clutch (K260) = 403 points, et avec Psycho Crash (K325) 468 — pour un plafond de 400. L’ancienne séquence était impossible ; les deux builds légaux sont au Labo.","en":"Step by step: the opener is NOT a parryable M1 — Bala Ripcord lv.6 pierces block and deletes the “back off/block” out by yanking the target into melee. Dragon Lash re-stuns mid-string: the parry counter resets (+49% expected damage, math in the Lab). The exit is triple and answerless at low HP: Zero Clutch grabs (grabs can’t be parried) and auto-executes, Cero executes at range, Psycho Crash closes the “ragdoll i-frames” out — standing, far or downed: NO state is safe. Named residual: the sideways dodge on the Ripcord’s travel (projectile), and the mid-string M1s that remain parryable — qⁿ is bypassed at both ends. Why Suplex is gone: Suplex (H115 + S28) + Zero Clutch (K260) = 403 points, and 468 with Psycho Crash (K325) — against a 400 cap. The old sequence was impossible; both legal builds are in the Lab.","es":"Paso a paso: el opener NO es un M1 parable — Bala Ripcord nv.6 atraviesa el bloqueo y arrastra al rival al cuerpo a cuerpo. Dragon Lash re-aturde a mitad de cadena: el contador de parada vuelve a cero (+49% de daño esperado, cálculo en el Labo). La salida es triple a bajos PV: Zero Clutch agarra (imparable) y auto-ejecuta, Cero ejecuta a distancia, Psycho Crash cierra los i-frames de ragdoll — de pie, lejos o en el suelo: NINGÚN estado es seguro. ¿Por qué ya no está Suplex?: Suplex (H115+S28) + Zero Clutch (K260) = 403 puntos, y 468 con Psycho Crash — tope 400. La secuencia antigua era imposible (Labo)."},"risk":{"fr":"Répartition PROUVÉE : Kidō 325 / Hakuda 56 / Speed 19 (= 400) · 92 SP d’arbres (calcul sur le graphe réel). Vasto Lorde obligatoire (4 traits : Iron Skin · Deadly Claws · Wings · Dense Muscles) · clan Cifer · Resurrección Shark · charmes Raid Boss (solo) + Adrenaline Junkie. Variante pression : Hakuda 115 / Strength 28 / Kidō 182 (garde Suplex : heal first-frame + coupe le thème adverse ; marge 75 → Speed) — mais elle abandonne Zero Clutch ET Psycho Crash. Hierro + Iron Skin absorbent le chip pendant l’approche.","en":"PROVEN split: Kido 325 / Hakuda 56 / Speed 19 (= 400) · 92 tree SP (computed on the real graph). Vasto Lorde mandatory (4 traits: Iron Skin · Deadly Claws · Wings · Dense Muscles) · Cifer clan · Shark Resurrección · Raid Boss (solo) + Adrenaline Junkie charms. Pressure variant: Hakuda 115 / Strength 28 / Kido 182 (keeps Suplex: first-frame heal + theme shutdown; 75 spare → Speed) — but it gives up BOTH Zero Clutch and Psycho Crash. Hierro + Iron Skin soak chip damage on approach.","es":"Reparto PROBADO: Kido 325 / Hakuda 56 / Speed 19 (= 400) · 92 SP (grafo real). Vasto Lorde obligatorio (4 rasgos) · clan Cifer · Shark · Raid Boss + Adrenaline Junkie. Variante presión: Hakuda 115 / Strength 28 / Kido 182 (conserva Suplex) — pero renuncia a Zero Clutch Y Psycho Crash. Hierro absorbe el daño de aproximación."},"lab":{"fr":"\u003ch3 class=\"h3\">🧪 Labo — preuve mathématique &amp; mécanique \u003cspan class=\"mono text-xs goldc\">calculs du 10/07/2026 · données du hub (arbres/traits)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict : \u003cb class=\"warnc\">l'ancienne séquence (avec Suplex) était mathématiquement IMPOSSIBLE\u003c/b> — remplacée ci-dessus par la version prouvée 400/400.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Légalité (plafond 400 pts) — là où la v9 tombe\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Skill (v9)\u003c/th>\u003cth>Seuils\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr>\u003ctd>Psycho Crash\u003c/td>\u003ctd class=\"mono\">Kidō 325\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Zero Clutch\u003c/td>\u003ctd class=\"mono\">Kidō 260\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Bala Ripcord\u003c/td>\u003ctd class=\"mono\">Kidō 182\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd>Suplex\u003c/td>\u003ctd class=\"mono warnc\">Hakuda 115 + Strength 28\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Dragon Lash\u003c/td>\u003ctd class=\"mono\">Hakuda 56\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Besoin minimal v9 : \u003cb class=\"mono warnc\">K325 + H115 + S28 = 468/400 — IMPOSSIBLE (dépassement 68)\u003c/b>. Même en sacrifiant Psycho Crash : 403/400, raté à 3 points. Deux builds légaux :\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>\u003cb class=\"goldc\">A (recommandé, exécution) : Kidō 325 / Hakuda 56 / Speed 19 = 400\u003c/b> — Ripcord · Dragon Lash · Zero Clutch · Cero · Psycho Crash. Perd Suplex (heal + coupe-thème). Détail qui montre la finesse du plafond : ajouter Hard Pressure (H76) donnerait 401 — raté à UN point.\u003c/li>\n\u003cli>\u003cb>B (pression Hakuda) : Hakuda 115 / Strength 28 / Kidō 182 = 325 (marge 75 → Speed)\u003c/b> — Ripcord · Suplex · Dragon Lash · Cero. Perd Zero Clutch ET Psycho Crash : les DEUX exécutions.\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 2 · Coût d'arbre (prérequis inclus)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Build A : \u003cb class=\"mono goldc\">92 SP\u003c/b> (17 nodes — calcul sur le graphe réel : chaîne Kidō-race + chemin Hakuda jusqu’à Dragon Lash) — le combo le moins cher des trois races en SP.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Économie\u003c/p>\n\u003cp class=\"text-sm mt-1\">La chaîne vit sur la stamina/posture (fiche du hub : « peu de Reiatsu ») ; Bala Blaster, Ripcord, Cero et le Finger Cero de Zero Clutch scalent tous sur K325 — l'attribut du build EST l'attribut des dégâts skills. Cero : Ultra Power (K225 ✓) disponible pour le burst si tu assumes le startup.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Le théorème du re-stun (pourquoi Dragon Lash est au milieu)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Une string de 6 M1 parables (q = 0,7 par hit) : E = Σ w·qᵏ = \u003cb class=\"mono\">2,06·w\u003c/b>, et P(6 d'affilée) = q⁶ = 11,8 %. Coupée en 3+3 par le stun garanti de Dragon Lash (le compteur de parade repart de zéro) : E = 2×Σ₁³ w·qᵏ = \u003cb class=\"mono\">3,07·w → +49 % d'espérance de dégâts\u003c/b> — w = dégâts par coup de griffe (stats des poings non publiées sur le Trello : le RATIO est indépendant de w). Couverture d'états à bas PV : debout → Zero Clutch (saisie, imparable) · à distance → Cero (exécute) · ragdoll → Psycho Crash (ignore les i-frames) : \u003cb>aucun état n'est sûr\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Règle des niveaux : plafond nv.6 — pas de Hōgyoku nécessaire\u003c/p>\n\u003cp class=\"text-sm mt-1\">Limite du jeu : chaque skill plafonne à nv.6, seul LE skill Hōgyoku monte à nv.7–8. Les deux paliers fondateurs de cette séquence (Ripcord nv.6, Zero Clutch nv.6) restent SOUS le plafond : contrairement au Shinigami, AUCUN Hōgyoku n'est requis ✓.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Budget d'amélioration limité — l'ordre des niveaux\u003c/p>\n\u003cp class=\"text-sm mt-1\">On ne monte pas tout : seuls DEUX investissements sont obligatoires, le reste est natif. Priorités :\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → palier\u003c/th>\u003cth>Passif débloqué / pourquoi\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Bala Ripcord → nv.6\u003c/b>\u003c/td>\u003ctd>TRAVERSE le block + tire la cible à toi — l'opener imparable N'EXISTE qu'à ce palier\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">2\u003c/td>\u003ctd>\u003cb>Zero Clutch → nv.6\u003c/b>\u003c/td>\u003ctd>l'auto-exécution en saisie = le palier nv.6\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Cero → choix de variante\u003c/td>\u003ctd>nœud de CHOIX, pas un niveau : Ultra Power (K225 ✓) pour le burst, Speed Variant pour la fiabilité\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Dragon Lash · Psycho Crash · Bala Blaster\u003c/td>\u003ctd>propriétés NATIVES (gros stun, ignore les i-frames, charge) : bas niveau OK\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>LE Hōgyoku\u003c/td>\u003ctd>aucun palier nv.7–8 documenté côté Hollow : ne le dépense PAS sur une promesse non vérifiée (ou mets-le sur Ripcord pour les stats brutes)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict :\u003c/b> la v10-A est le plafond réel du Hollow sous 400 points : entrée imparable (Ripcord), re-stun médian (+49 % d'espérance), triple porte d'exécution, 82 SP — et seulement DEUX paliers de niveau à financer, tous deux sous le plafond nv.6 du jeu. La variante B existe pour le style pression — au prix des DEUX exécutions.\u003c/p>","en":"\u003ch3 class=\"h3\">🧪 Lab — mathematical &amp; mechanical proof \u003cspan class=\"mono text-xs goldc\">computed Jul 10, 2026 · hub data (trees/traits)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict: \u003cb class=\"warnc\">the old sequence (with Suplex) was mathematically IMPOSSIBLE\u003c/b> — replaced above by the proven 400/400 version.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legality (400-point cap) — where v9 falls\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Skill (v9)\u003c/th>\u003cth>Gates\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr>\u003ctd>Psycho Crash\u003c/td>\u003ctd class=\"mono\">Kido 325\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Zero Clutch\u003c/td>\u003ctd class=\"mono\">Kido 260\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Bala Ripcord\u003c/td>\u003ctd class=\"mono\">Kido 182\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd>Suplex\u003c/td>\u003ctd class=\"mono warnc\">Hakuda 115 + Strength 28\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Dragon Lash\u003c/td>\u003ctd class=\"mono\">Hakuda 56\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">v9 minimal need: \u003cb class=\"mono warnc\">K325 + H115 + S28 = 468/400 — IMPOSSIBLE (68 over)\u003c/b>. Even sacrificing Psycho Crash: 403/400, missed by 3 points. Two legal builds:\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>\u003cb class=\"goldc\">A (recommended, execution): Kido 325 / Hakuda 56 / Speed 19 = 400\u003c/b> — Ripcord · Dragon Lash · Zero Clutch · Cero · Psycho Crash. Loses Suplex (heal + theme shutdown). A detail showing how tight the cap is: adding Hard Pressure (H76) would make 401 — missed by ONE point.\u003c/li>\n\u003cli>\u003cb>B (Hakuda pressure): Hakuda 115 / Strength 28 / Kido 182 = 325 (75 spare → Speed)\u003c/b> — Ripcord · Suplex · Dragon Lash · Cero. Loses BOTH executions (Zero Clutch AND Psycho Crash).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 2 · Tree cost (prerequisites included)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Build A: \u003cb class=\"mono goldc\">92 SP\u003c/b> (17 nodes — computed on the real graph: race chain + Hakuda path to Dragon Lash) — the cheapest combo of the three races in SP.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Economy\u003c/p>\n\u003cp class=\"text-sm mt-1\">The chain runs on stamina/posture (hub scorecard: “low Reiatsu”); Bala Blaster, Ripcord, Cero and Zero Clutch's Finger Cero all scale on K325 — the build's attribute IS the skills' damage attribute. Cero: Ultra Power (K225 ✓) available for burst if you accept the startup.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · The re-stun theorem (why Dragon Lash sits mid-string)\u003c/p>\n\u003cp class=\"text-sm mt-1\">A 6-M1 parryable string (q = 0.7 per hit): E = Σ w·qᵏ = \u003cb class=\"mono\">2.06·w\u003c/b>, and P(6 straight) = q⁶ = 11.8%. Split 3+3 by Dragon Lash's guaranteed stun (the parry counter resets): E = 2×Σ₁³ w·qᵏ = \u003cb class=\"mono\">3.07·w → +49% expected damage\u003c/b> — w = damage per claw hit (fist stats unpublished on Trello: the RATIO is independent of w). Low-HP state coverage: standing → Zero Clutch (grab, unparryable) · at range → Cero (executes) · ragdoll → Psycho Crash (ignores i-frames): \u003cb>no state is safe\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Level rule: lv.6 cap — no Hōgyoku needed\u003c/p>\n\u003cp class=\"text-sm mt-1\">Game limit: every skill caps at lv.6; only THE Hōgyoku skill reaches lv.7–8. Both founding tiers of this sequence (Ripcord lv.6, Zero Clutch lv.6) stay WITHIN the cap: unlike the Shinigami, NO Hōgyoku is required ✓.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Limited upgrade budget — the level order\u003c/p>\n\u003cp class=\"text-sm mt-1\">You can't max everything: only TWO investments are mandatory, the rest is native. Priorities:\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → tier\u003c/th>\u003cth>Unlocked passive / why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Bala Ripcord → lv.6\u003c/b>\u003c/td>\u003ctd>PIERCES block + yanks the target to you — the unparryable opener ONLY exists at this tier\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">2\u003c/td>\u003ctd>\u003cb>Zero Clutch → lv.6\u003c/b>\u003c/td>\u003ctd>the grab auto-execute = the lv.6 tier\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Cero → variant choice\u003c/td>\u003ctd>a CHOICE node, not a level: Ultra Power (K225 ✓) for burst, Speed Variant for reliability\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Dragon Lash · Psycho Crash · Bala Blaster\u003c/td>\u003ctd>NATIVE properties (big stun, i-frame ignore, charge): low level is fine\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>THE Hōgyoku\u003c/td>\u003ctd>no documented lv.7–8 tier on the Hollow side: do NOT spend it on an unverified promise (or put it on Ripcord for raw stats)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict:\u003c/b> v10-A is the Hollow's real ceiling under 400 points: unparryable entry (Ripcord), mid-string re-stun (+49% expectation), triple execution gate, 82 SP — and only TWO level tiers to fund, both within the game's lv.6 cap. Variant B exists for the pressure style — at the price of BOTH executions.\u003c/p>","es":"\u003ch3 class=\"h3\">🧪 Labo — prueba matemática y mecánica \u003cspan class=\"mono text-xs goldc\">calculado 10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Veredicto: \u003cb class=\"warnc\">la secuencia antigua (con Suplex) era matemáticamente IMPOSIBLE\u003c/b> — sustituida por la versión probada 400/400.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legalidad (tope 400)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Psycho Crash K325 · Zero Clutch K260 · Ripcord K182 · \u003cb class=\"warnc\">Suplex H115+S28\u003c/b> · Dragon Lash H56 → necesidad v9: \u003cb class=\"mono warnc\">468/400 — IMPOSIBLE (+68)\u003c/b>; incluso sin Psycho Crash: 403/400 (falla por 3). Builds legales: \u003cb class=\"goldc\">A (recomendado): K325/H56/Sp19 = 400\u003c/b> (Ripcord · Dragon Lash · Zero Clutch · Cero · Psycho Crash) · \u003cb>B: H115/S28/K182\u003c/b> (conserva Suplex, pierde AMBAS ejecuciones).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coste de árbol\u003c/p>\n\u003cp class=\"text-sm mt-1\">Build A: \u003cb class=\"mono goldc\">92 SP\u003c/b> (17 nodos, grafo real) — el combo más barato de las tres razas.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3-4 · Economía y teorema del re-stun\u003c/p>\n\u003cp class=\"text-sm mt-1\">La cadena vive de stamina/postura; Bala/Cero/Finger Cero escalan con K325. String de 6 M1 (q=0,7): E = \u003cb class=\"mono\">2,06·w\u003c/b>; cortada 3+3 por el stun garantizado de Dragon Lash: E = \u003cb class=\"mono\">3,07·w → +49%\u003c/b>. Cobertura a bajos PV: de pie → Zero Clutch · lejos → Cero · ragdoll → Psycho Crash: \u003cb>ningún estado es seguro\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Regla de niveles: tope nv.6 — sin Hōgyoku\u003c/p>\n\u003cp class=\"text-sm mt-1\">Límite del juego: cada skill llega a nv.6; solo EL skill Hōgyoku sube a nv.7–8. Ripcord nv.6 y Zero Clutch nv.6 quedan BAJO el tope: no se requiere ningún Hōgyoku ✓.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Presupuesto de mejora limitado\u003c/p>\n\u003cp class=\"text-sm mt-1\">Solo DOS inversiones obligatorias: \u003cb>1. Bala Ripcord → nv.6\u003c/b> (el opener imparable SOLO existe en ese palier) · \u003cb>2. Zero Clutch → nv.6\u003c/b> (auto-ejecución). Cero = nodo de ELECCIÓN (Ultra Power K225 ✓). Dragon Lash/Psycho Crash/Bala Blaster: propiedades nativas, nivel bajo OK. EL Hōgyoku: sin palier documentado en Hollow — no lo gastes en una promesa sin verificar.\u003c/p>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Veredicto:\u003c/b> la v10-A es el techo real del Hollow bajo 400 puntos — y solo DOS paliers que financiar, ambos bajo el tope nv.6 del juego.\u003c/p>"}}},"startGuides":{"shinigami":{"title":{"fr":"Farmer ton Shikai — pas à pas","en":"Farming your Shikai — step by step","es":"Farmear tu Shikai — paso a paso"},"steps":[{"fr":"1 · Atteins le nv.25, puis médite (touche L) aux endroits où tu entends des Spirit Whispers.","en":"1 · Reach lv.25, then meditate (L key) where you hear Spirit Whispers.","es":"1 · Nivel 25 → medita (L) donde oigas Spirit Whispers."},{"fr":"2 · Énigme des cloches — réponses exactes : « An Echo », « A Promise », « The Future ».","en":"2 · Bells riddle — exact answers: “An Echo”, “A Promise”, “The Future”.","es":"2 · Campanas — respuestas: “An Echo”, “A Promise”, “The Future”."},{"fr":"3 · Nv.35 : boss du Monde Intérieur en 3 phases — la phase finale régénère 4 barres de vie : c’est un test de DPS, viens avec tes skills montés.","en":"3 · Lv.35: 3-phase Inner-World boss — the final phase regenerates 4 health bars: it’s a DPS check, come with leveled skills.","es":"3 · Nv.35: jefe de 3 fases — la final regenera 4 barras: es un test de DPS."},{"fr":"4 · Victoire = Shikai aléatoire. Reroll avec les Ability Rerolls (code UPD2 = 20) : jette Waypoint immédiatement ; garde Ice/Red Ice, Senbonzakura (KATANA uniquement) ou Blooming Madness (Leg. ~1%).","en":"4 · Win = random Shikai. Reroll with Ability Rerolls (UPD2 = 20): dump Waypoint instantly; keep Ice/Red Ice, Senbonzakura (KATANA only) or Blooming Madness (Leg. ~1%).","es":"4 · Victoria = Shikai aleatorio. Rerollea: tira Waypoint; guarda Ice, Senbonzakura (KATANA) o Blooming Madness."},{"fr":"5 · Monte-le : paliers Ice vérifiés — Dégâts nv.4/6 · Reiatsu nv.9/10 · Rate nv.5/6. Le Sanctuaire d’Amélioration (chaîne Pratz/Rose/Lord Nivis, Arctic Plains) offre +2 niveaux gratuits, une fois.","en":"5 · Level it: verified Ice breakpoints — Damage lv.4/6 · Reiatsu lv.9/10 · Rate lv.5/6. The Upgrade Shrine (Pratz/Rose/Lord Nivis chain, Arctic Plains) grants +2 free levels, once.","es":"5 · Súbelo: hitos de Ice — Daño 4/6 · Reiatsu 9/10 · Rate 5/6. El Santuario de Mejora da +2 niveles, una vez."},{"fr":"6 · Bankai : annoncé (Blade Realm), pas encore observé en jeu — surveille le Discord officiel.","en":"6 · Bankai: announced (Blade Realm), not yet observed in game — watch the official Discord.","es":"6 · Bankai: anunciado, aún no observado en el juego."}]},"quincy":{"title":{"fr":"Farmer ton Schrift (+ maîtriser le Blut) — pas à pas","en":"Farming your Schrift (+ mastering Blut) — step by step","es":"Farmear tu Schrift (+ dominar el Blut)"},"steps":[{"fr":"1 · Nv.25 : obtiens le grade Soldat Cap auprès du commandement Wandenreich.","en":"1 · Lv.25: earn the Soldat Cap rank from Wandenreich command.","es":"1 · Nv.25: rango Soldat Cap."},{"fr":"2 · Enchaîne les missions du Lieutenant (3★ prioritaires) jusqu’à 300 Soul Tokens.","en":"2 · Chain Lieutenant missions (3★ first) until 300 Soul Tokens.","es":"2 · Misiones del Lieutenant hasta 300 Soul Tokens."},{"fr":"3 · Craft la Sanrei Glove : 300 Soul Tokens + matériaux vendus par le PNJ Wandenreich.","en":"3 · Craft the Sanrei Glove: 300 Soul Tokens + materials from the Wandenreich NPC.","es":"3 · Craftea la Sanrei Glove: 300 Tokens + materiales."},{"fr":"4 · Bats le boss Securis avec le gant → tu reçois un Schrift + le Letzt Stil. Pas de Vollständig en jeu à ce jour.","en":"4 · Beat the Securis boss with the glove → you receive a Schrift + Letzt Stil. No Vollständig in game.","es":"4 · Vence a Securis → Schrift + Letzt Stil. Sin Vollständig."},{"fr":"5 · Reroll aux Ability Rerolls jusqu’à une cible : The Superstar (~1%, revive de James — le meilleur), sinon Thunderbolt (dégâts) ou Necromancer (utilité).","en":"5 · Reroll with Ability Rerolls toward a target: The Superstar (~1%, James revive — the best), else Thunderbolt (damage) or Necromancer (utility).","es":"5 · Rerollea hacia: Superstar (~1%), Thunderbolt o Necromancer."},{"fr":"6 · Le Blut au quotidien : Blut Arterie AVANT d’engager une volée (offense), bascule Blut Vene quand tu encaisses ou temporises — deux skills de l’arbre, pas des drops.","en":"6 · Daily Blut: Blut Arterie BEFORE committing a volley (offense), swap to Blut Vene when tanking or stalling — tree skills, not drops.","es":"6 · Blut Arterie antes de atacar; Blut Vene al aguantar — skills del árbol."}]},"hollow":{"title":{"fr":"Farmer ta Resurrección — pas à pas","en":"Farming your Resurrección — step by step","es":"Farmear tu Resurrección — paso a paso"},"steps":[{"fr":"1 · Grimpe l’échelle : Fishbone → Menos → Adjuchas → VASTO LORDE. Ne retire jamais le masque avant Vasto (slots de traits : 2/3/4 — perdus à jamais sinon).","en":"1 · Climb the ladder: Fishbone → Menos → Adjuchas → VASTO LORDE. Never unmask before Vasto (trait slots: 2/3/4 — lost forever otherwise).","es":"1 · Sube: Fishbone → Menos → Adjuchas → VASTO LORDE. Nunca antes."},{"fr":"2 · Vasto Lorde atteint : retire le masque (touche L) → tu deviens Arrancar et tu choisis une ARME (Spear conseillée pour débuter).","en":"2 · At Vasto Lorde: remove the mask (L key) → you become Arrancar and pick a WEAPON (Spear suggested to start).","es":"2 · En Vasto Lorde: máscara fuera (L) → Arrancar + ARMA (Spear)."},{"fr":"3 · Équipe l’arme puis médite (L) : dans le Monde Intérieur, suis les yeux rouges jusqu’à ton double.","en":"3 · Equip the weapon then meditate (L): in the Inner World, follow the red eyes to your double.","es":"3 · Equipa el arma y medita (L): sigue los ojos rojos."},{"fr":"4 · Bats ton Monde Intérieur → Resurrección aléatoire. Reroll aux Ability Rerolls : cible Shark (le moins situationnel), sinon Praying Mantis (barrière 360°) ou Luminosity (hybride Hakuda+Kidō).","en":"4 · Beat your Inner World → random Resurrección. Reroll with Ability Rerolls: target Shark (least situational), else Praying Mantis (360° barrier) or Luminosity (Hakuda+Kido hybrid).","es":"4 · Vence tu Mundo Interior → Resurrección. Objetivo: Shark."},{"fr":"5 · Tes 4 traits Vasto (Iron Skin · Deadly Claws · Wings · Dense Muscles) restent actifs en Arrancar — c’est tout l’intérêt d’avoir attendu.","en":"5 · Your 4 Vasto traits (Iron Skin · Deadly Claws · Wings · Dense Muscles) stay active as Arrancar — that’s the whole point of waiting.","es":"5 · Tus 4 rasgos Vasto siguen activos como Arrancar."},{"fr":"6 · ATTENTION : les essences consommées (ex. Gran Ray Cero, Kurikara) ne reviennent JAMAIS, même après un reset complet — n’en consomme qu’en toute certitude.","en":"6 · WARNING: consumed essences (e.g. Gran Ray Cero, Kurikara) NEVER come back, even after a full reset — consume only when certain.","es":"6 · OJO: las esencias consumidas NUNCA vuelven."}]}},"startUniversal":[{"fr":"1 · Fais le tutoriel en entier (le boss Gelum drop un Hōgyoku Fragment) et termine « Humble Beginnings » pour débloquer la Boutique.","en":"1 · Complete the tutorial fully (Gelum drops a Hōgyoku Fragment) and finish “Humble Beginnings” to unlock the Shop.","es":"1 · Completa el tutorial y “Humble Beginnings” para desbloquear la Tienda."},{"fr":"2 · Rejoins le groupe Roblox Midnight Continent → Boutique → Codes : entre les 12 codes actifs (Accueil). Priorité : UPD2 (20 Ability Rerolls — c’est TA monnaie de reroll de forme) puis MINIUPDATE et day1.","en":"2 · Join the Roblox group → Shop → Codes: redeem the 12 active codes (Home). Priority: UPD2 (20 Ability Rerolls — your form-reroll currency) then MINIUPDATE and day1.","es":"2 · Únete al grupo → canjea los 12 códigos. Prioridad: UPD2 (20 Ability Rerolls) y MINIUPDATE."},{"fr":"3 · Apprends les inputs (onglet Combos) : M1, M2 molette (heavy d’arme), parade des attaques vertes, F counter, Q dash, Shift+Q rushdown. Le combat est basé parade.","en":"3 · Learn the inputs (Combos tab): M1, middle-click heavy, green-attack parry, F counter, Q dash, Shift+Q rushdown. Combat is parry-based.","es":"3 · Aprende los inputs (pestaña Combos). El combate se basa en la parada."},{"fr":"4 · Garde tes Clan Rerolls tant que ta race n’est pas fixée (bonus liés à la race) et tes Ability Rerolls tant que ta forme n’est pas débloquée.","en":"4 · Hold Clan Rerolls until your race is locked, and Ability Rerolls until your form is unlocked.","es":"4 · Guarda Clan Rerolls y Ability Rerolls hasta fijar raza y forma."},{"fr":"5 · Ne disperse JAMAIS tes SP : 2 arbres focalisés (ta branche de dégâts + Speed) battent 4 arbres survolés. Le Misc s’achète en Cash, 0 SP — prends tout.","en":"5 · NEVER spread SP: 2 focused trees beat 4 shallow ones. Misc is Cash-only, 0 SP — buy it all.","es":"5 · NUNCA disperses SP. Misc va con Cash: cómpralo todo."},{"fr":"6 · Fais tôt « Statue Mystery » (Clint, Sweetwater Pass, ~nv.15 ; 3 extraits : Intelligence = tutoriel · Strength = King Crocodile au Swamp · Masked Hollow Man = raid boss des Soul Society Outskirts) → Sanctuaire de Remboursement (1 skill, 1 fois, gratuit).","en":"6 · Do “Statue Mystery” early (Clint, Sweetwater Pass, ~lv.15; 3 extracts: Intelligence = tutorial · Strength = King Crocodile in the Swamp · Masked Hollow Man = Soul Society Outskirts raid boss) → free one-time Refund Shrine.","es":"6 · Haz pronto “Statue Mystery” → Santuario de Reembolso (1 skill, 1 vez, gratis)."}],"sn":["The Superstar","The Heat","The Necromancer","The Dimensional","The Thunderbolt","The Blademaster","Monster"],"sa":["Conjure Weapon","Heilig Pfeil","Blut Arterie","Blut Vene","Impaling Arrows","Holy Arrows","Fallzwang"],"startRaceQuick":{"shinigami":[{"fr":"Nv.1–25 : quêtes Soul Society + missions Soul Pager · achète tout le Misc en Cash (Aerial Fighter 75, Rushdown 75, Drop Cancel 100, Manual Rushdown 125, Spiritual Potential 250, Spiritual Pressure 450).","en":"Lv.1–25: Soul Society quests + Soul Pager missions · buy the whole Misc tree with Cash.","es":"Nv.1–25: misiones · compra todo Misc con Cash."},{"fr":"Commence à investir la branche Kidō dans l’ordre du cœur (onglet Arbre) — Sai d’abord, toujours.","en":"Start the Kido branch in core order (Tree tab) — Sai first, always.","es":"Empieza la rama Kido en el orden del núcleo — Sai primero."},{"fr":"Nv.25+ : débloque la méditation (L) — c’est la porte du Shikai (détail dans la carte ci-contre).","en":"Lv.25+: unlock meditation (L) — the gate to Shikai (details in the card beside).","es":"Nv.25+: medita (L) — la puerta al Shikai."},{"fr":"Endgame : Caster Kidō-Contrôle (onglet Shinigami) — attributs 360/40/0, cœur 96 SP + Radiant Edge = 100, Hōgyoku n°1 sur Sai nv.7, fragments d’Ascension (max 6/skill) sur Sai puis Hōrin.","en":"Endgame: Control-Kido Caster — 360/40/0, 96 SP core + Radiant Edge = 100, Hōgyoku #1 on Sai lv.7, Ascension Fragments (max 6/skill) on Sai then Hōrin.","es":"Endgame: caster de control — 360/40/0, núcleo 96+4=100 SP."}],"quincy":[{"fr":"Nv.1–25 : missions du Lieutenant (privilégie les 3★) · économise 300 Soul Tokens dès le début — n’en dépense AUCUN.","en":"Lv.1–25: Lieutenant missions (favor 3★) · bank 300 Soul Tokens — spend NONE.","es":"Nv.1–25: misiones 3★ · ahorra 300 Soul Tokens."},{"fr":"Dans l’arbre Quincy, prends tôt Blut Arterie (offense) et Blut Vene (défense) : ce sont des skills de la branche (seuils Kidō), deux postures à alterner selon que tu attaques ou encaisses.","en":"In the Quincy tree, take Blut Arterie (offense) and Blut Vene (defense) early: branch skills (Kido gates), two stances <script>
/* VV:U HUB v11 — reconstruction fidèle (vanilla JS, aucune dépendance) */
(function () {
  const D = window.VVU_DATA;
  let LANG = localStorage.getItem('vvu-lang') || 'fr';
  const T = k => (D.iY[LANG] && D.iY[LANG][k]) != null ? D.iY[LANG][k] : k;
  const iX = o => o ? (o[LANG] != null ? o[LANG] : o.fr) : '';
  const tri = (fr, en, es) => LANG === 'fr' ? fr : LANG === 'en' ? en : es;
  const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  /* ---------- état ---------- */
  let PAGE = (location.hash || '#home').slice(1);
  const VALID = ['home', 'start', 'shini', 'quincy', 'hollow', 'tree', 'combos', 'db', 'gear'];
  if (!VALID.includes(PAGE)) PAGE = 'home';
  let comboRace = 'shinigami', startRace = 'shinigami', charmTier = 0, gearSlot = 'all';
  const SIM = {
    budget: 100, attrs: { H: 0, K: 360, S: 0, V: 40 },
    owned: new Set(), levels: {}, hogyoku: null, bar: [],
    kuro: false, radiant: false, race: 'Shinigami', sel: null, view: null, search: ''
  };

  /* ---------- index des nodes ---------- */
  const NODE = new Map(); // id -> {node, src:'kido'|'branch'|'race'}
  for (const s of D.iJ) NODE.set(s.id, { n: s, src: 'kido' });
  for (const t of D.su) for (const n of (t.nodes || [])) NODE.set(n.id, { n, src: 'branch' });
  for (const r of ['quincy', 'hollow']) for (const n of D.sl[r].nodes) NODE.set(n.id, { n, src: 'race' });
  const nName = id => { const e = NODE.get(id); return e ? (e.n.name || e.n.n || id) : id; };
  const nSp = id => { const e = NODE.get(id); return e ? (e.n.sp || 0) : 0; };
  const nKind = id => { const e = NODE.get(id); return e ? (e.n.kind || 'active') : 'active'; };
  const parentOf = n => n.par != null ? n.par : (n.parent != null ? n.parent : null);

  /* ---------- simulateur v13 : le graphe RÉEL (tree2) ---------- */
  const T2 = new Map(D.tree2.nodes.map(n => [n.id, n]));
  const SPOKE_COLOR = { hakuda: '255,130,20', sense: '255,235,210', strength: '255,60,80', speed: '50,180,255', misc: '230,235,255', race: '255,85,178' };
  const ATTR_KEY = { hakuda: 'H', kido: 'K', strength: 'S', speed: 'V' };
  const ATTR_COLOR = { hakuda: '255,130,20', kido: '255,80,180', strength: '255,60,80', speed: '50,180,255' };
  const nColor = n => n.accent || SPOKE_COLOR[n.spoke] || '230,235,255';
  const visible2 = n => n.spoke !== 'race' || n.race === SIM.race;
  const gate2 = n => Object.entries(n.req || {}).every(([k, v]) => (SIM.attrs[ATTR_KEY[k]] || 0) >= v);
  const mutexBlocked = n => {
    if (n.mutex && SIM.owned.has(n.mutex)) return true;
    for (const oid of SIM.owned) { const o = T2.get(oid); if (o && o.mutex === n.id) return true; }
    return false;
  };
  const canBuy = n => n && !SIM.owned.has(n.id) && visible2(n) && gate2(n) && !mutexBlocked(n) && (!n.parent || SIM.owned.has(n.parent));
  const hasOwnedChild = id => { for (const oid of SIM.owned) { const o = T2.get(oid); if (o && o.parent === id) return true; } return false; };
  const lvlMax = id => SIM.hogyoku === id ? 8 : 6;
  const spSpent = () => [...SIM.owned].reduce((a, id) => a + ((T2.get(id) || {}).sp || 0), 0) + (SIM.kuro ? 9 : 0) + (SIM.radiant ? 4 : 0);
  const cashSpent = () => [...SIM.owned].reduce((a, id) => a + ((T2.get(id) || {}).cash || 0), 0);
  const t2Name = id => (T2.get(id) || {}).name || nName(id);

  const exportText = () => {
    const a = SIM.attrs, tot = a.H + a.K + a.S + a.V;
    const lines = [...SIM.owned].map(id => {
      const n = T2.get(id) || {};
      const cost = (n.sp ? n.sp + ' SP' : '') + (n.sp && n.cash ? ' + ' : '') + (n.cash ? n.cash + ' Cash' : '') || '0';
      return '- ' + t2Name(id) + ' (' + cost + ')' + (SIM.hogyoku === id ? ' <- Hogyoku nv.' + (SIM.levels[id] || 1) : (SIM.levels[id] > 1 ? ' nv.' + SIM.levels[id] : ''));
    });
    return 'VV:U - Mon build (' + SIM.race + ')\nAttributs  H:' + a.H + ' K:' + a.K + ' S:' + a.S + ' Speed:' + a.V + ' (total ' + tot + '/400)\n'
      + 'Budget SP: ' + SIM.budget + ' | Depense: ' + spSpent() + ' SP | Cash: ' + cashSpent() + '\n'
      + 'Essences: ' + ([SIM.kuro ? 'Kurohitsugi (9 SP, K360)' : null, SIM.radiant ? 'Radiant Edge (4 SP, K125)' : null].filter(Boolean).join(' + ') || 'aucune') + '\n'
      + 'Barre 1-9: ' + (SIM.bar.map(t2Name).join(' | ') || '-') + '\n'
      + 'Nodes (' + SIM.owned.size + '):\n' + (lines.join('\n') || '-');
  };

  /* ---------- morceaux d'UI ---------- */
  const badge = s => '<span class="badge">' + esc(s) + '</span>';
  const badge2 = s => '<span class="badge2">' + esc(s) + '</span>';
  const kindLbl = k => ({ active: tri('Actif', 'Active', 'Activo'), passive: tri('Passif', 'Passive', 'Pasivo'), node: 'Node', special: 'Special', ultimate: 'Ultimate', disabled: tri('Désactivé', 'Disabled', 'Desactivado'), unknown: '?' })[k] || k;
  const buildFinal = (rows, note) =>
    '<div class="card gold-edge"><h3 class="h3">' + tri('Build final — chaque skill, SON niveau (aucune alternative)', 'Final build — each skill, ITS level (no alternatives)', 'Build final — cada skill, SU nivel') + '</h3>'
    + '<p class="text-xs opacity-70 mt-1">' + tri('L’ordre d’investissement = l’ordre des lignes. Ressources de montée : fragments d’Ascension (max 6/skill) + vœux Hōgyoku (1er fragment garanti : boss Gelum, fin du tutoriel).', 'Investment order = row order. Leveling resources: Ascension Fragments (max 6/skill) + Hōgyoku wishes (1st fragment guaranteed: Gelum, tutorial).', 'El orden de inversión = el orden de las filas.') + '</p>'
    + '<div class="tblwrap mt-2"><table class="tbl"><thead><tr><th>#</th><th>Skill</th><th>' + tri('Niveau cible', 'Target level', 'Nivel objetivo') + '</th><th>' + tri('Pourquoi', 'Why', 'Por qué') + '</th></tr></thead><tbody>'
    + rows.map((r, i) => '<tr class="' + (r[3] ? 'hl' : '') + '"><td class="mono">' + (i + 1) + '</td><td><b>' + esc(r[0]) + '</b></td><td class="mono goldc">' + esc(r[1]) + '</td><td class="text-xs">' + esc(r[2]) + '</td></tr>').join('')
    + '</tbody></table></div>' + (note ? '<p class="text-xs warnc mt-2">' + esc(note) + '</p>' : '') + '</div>';

  const formsCard = (title, badgeTxt, steps) =>
    '<div class="card"><h3 class="h3">' + esc(title) + ' ' + badge(badgeTxt) + '</h3><ol class="startol mt-2">'
    + steps.map(s => '<li class="text-sm">' + esc(s) + '</li>').join('') + '</ol></div>';

  const barRow = (label, val, note) =>
    '<div class="mt-3"><div style="display:flex;justify-content:space-between" class="mono text-sm"><b>' + esc(label) + '</b><span class="goldc">' + val + '</span></div>'
    + '<div class="bar"><div class="fill" style="width:' + (val / 4) + '%"></div></div>'
    + '<p class="text-xs opacity-70 mt-1">' + esc(note) + '</p></div>';

  /* ---------- pages ---------- */
  function pageHome() {
    const verd = [['shini', 'v_shini', '縛'], ['quincy', 'v_quincy', '弓'], ['hollow', 'v_hollow', '虚']].map(([id, key, kj]) =>
      '<div class="card clickable" data-act="nav" data-page="' + id + '"><div class="kanji">' + kj + '</div><h3 class="h3 goldc mt-2">' + esc(T('nav_' + id)) + '</h3><p class="text-sm mt-2">' + esc(T(key)) + '</p></div>').join('');
    const treeRows = D.i2.map(e =>
      '<tr class="' + (e.id === 'shini' || e.id === 'speed' ? 'hl' : '') + '"><td><b>' + esc(e.name) + '</b></td><td class="mono goldc">' + e.sp + '</td><td class="mono">' + e.skills + '</td><td class="mono">' + esc(e.tier) + '</td><td class="mono text-xs">' + esc(e.gates) + (e.gatesMenuM ? ' ' + badge2('menu M') : '') + '</td></tr>').join('');
    const news = D.se.map(n => '<li class="text-sm mt-2"><span class="mono goldc">' + n.date + '</span> — ' + esc(iX(n)) + '</li>').join('');
    const codes = D.i7.map(c => '<tr><td class="mono goldc">' + esc(c.code) + '</td><td class="text-xs">' + esc(c.reward) + '</td></tr>').join('');
    return '<div class="space-y">'
      + '<div class="hero card"><div class="rods"><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="herokanji">魂</div>'

      + '<div class="card"><p class="text-sm">' + badge2('SP') + ' ' + esc(T('b_sp')) + '</p><p class="text-sm mt-3">' + badge('ATTR 400') + ' ' + esc(T('b_attr')) + '</p></div>'

      + '<div class="card"><h3 class="h3">' + tri('Coût des arbres', 'Tree costs', 'Coste de los árboles') + '</h3><div class="tblwrap mt-2"><table class="tbl"><thead><tr><th>' + esc(T('th_tree')) + '</th><th>' + esc(T('th_total')) + '</th><th>' + esc(T('th_count')) + '</th><th>' + esc(T('th_tier')) + '</th><th>' + esc(T('th_gates')) + '</th></tr></thead><tbody>' + treeRows + '</tbody></table></div></div>'
      + '<div class="grid2"><div class="card"><h3 class="h3">' + esc(T('news')) + '</h3><ul class="plain mt-2">' + news + '</ul></div>'
      + '<div class="card"><h3 class="h3">' + esc(T('codes')) + ' ' + badge('10/07') + '</h3><p class="text-xs opacity-70 mt-1 mb-2">' + esc(T('code_hint')) + '</p><div class="tblwrap maxh"><table class="tbl"><thead><tr><th>' + esc(T('th_code')) + '</th><th>' + esc(T('th_reward')) + '</th></tr></thead><tbody>' + codes + '</tbody></table></div></div></div>'
      + '</div>';
  }

  function pageStart() {
    const uni = D.startUniversal.map(s => '<li class="text-sm liok mt-2">' + esc(iX(s)) + '</li>').join('');
    const tabs = ['shinigami', 'quincy', 'hollow'].map(r => '<button class="tabbtn ' + (startRace === r ? 'on' : '') + '" data-act="stab" data-r="' + r + '">' + (r === 'shinigami' ? 'Shinigami' : r === 'quincy' ? 'Quincy' : 'Hollow') + '</button>').join('');
    const quick = D.startRaceQuick[startRace].map(s => '<li class="text-sm">' + esc(iX(s)) + '</li>').join('');

    const steps = g.steps.map(s => '<li class="text-sm">' + esc(iX(s)) + '</li>').join('');
    const rlbl = startRace === 'shinigami' ? 'Shinigami' : startRace === 'quincy' ? 'Quincy' : 'Hollow';
    return '<div class="space-y">'
      + '<div class="card"><h3 class="h3">' + tri('Le tronc commun — pour toute nouvelle recrue', 'The common trunk — for every new player', 'El tronco común — para todo nuevo jugador') + '</h3><ul class="plain mt-2">' + uni + '</ul></div>'
      + '<div class="flexwrap">' + tabs + '</div>'
      + '<div class="grid2 page">'
      + '<div class="card gold-edge"><h3 class="h3 goldc">' + tri('Route ', 'Route ', 'Ruta ') + rlbl + ' — A→Z</h3><ol class="startol mt-2">' + quick + '</ol></div>'
      + '<div class="card"><h3 class="h3">' + esc(iX(g.title)) + '</h3><ol class="startol mt-2">' + steps + '</ol></div></div>'
      + '<p class="text-xs opacity-70">' + tri('Suivi des mises à jour & codes toujours actifs : onglet Accueil (liste au 10/07/2026 — les codes expirent, re-check le Discord officiel discord.com/invite/vvgame).', 'Update tracker & active codes: Home tab (as of 2026-07-10 — codes expire, re-check the official Discord).', 'Seguimiento y códigos: pestaña Inicio (10/07/2026).') + '</p>'
      + '</div>';

  function pageShini() {
    const iZ = D.iJ.reduce((a, s) => a + (s.sp || 0), 0);
    const attrCard = '<div class="card"><h3 class="h3">' + esc(T('attr_split')) + '</h3>'
      + barRow('KIDŌ', 360, tri('100% du contenu utilisable (théorème du 360) + scaling max', '100% of usable content (360 theorem) + max scaling', '100% del contenido usable + scaling'))
      + barRow('SPEED', 40, tri('Pourquoi 40 ici : K360 = plafond utilisable (Prism Seal 370 désactivé) → il RESTE 40 points. Hakuda/Strength ne débloqueraient rien qu’on achète ; l’attribut Speed accélère déplacement + Shunpo (donnée du jeu) = le kite à ~10 m du caster, et débloque Aerial Ace (Sp10 : counter aérien, 2 SP + 75 Cash). Seule affectation rentable du reliquat.', 'Why 40 here: K360 = usable ceiling (Prism Seal 370 disabled) → 40 points REMAIN. Hakuda/Strength would gate nothing we buy; the Speed attribute speeds movement + Shunpo (game data) = the caster’s ~10 m kite, and unlocks Aerial Ace (Sp10: aerial counter, 2 SP + 75 Cash). The only profitable home for the remainder.', 'Por qué 40: K360 = techo usable → sobran 40. Speed acelera el kiteo y abre Aerial Ace (Sp10).'))
