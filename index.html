/* VV:U HUB — thème sombre & or (reconstruction fidèle v11) */
@import url("https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap");

:root {
  --bg: #0a0d12;
  --bg2: #0e1218;
  --card: #12161f;
  --card2: #161b26;
  --line: #232a38;
  --gold: #e8c15a;
  --gold-dim: #b8963f;
  --warn: #ff7a6b;
  --txt: #e7e4da;
  --muted: #9aa1ad;
  --serif: "Shippori Mincho", serif;
  --sans: "IBM Plex Sans", system-ui, sans-serif;
  --mono: "IBM Plex Mono", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: radial-gradient(1200px 600px at 80% -10%, #141b2a 0%, var(--bg) 55%); color: var(--txt); font-family: var(--sans); font-size: 15px; line-height: 1.55; min-height: 100vh; }
.wrap { max-width: 1120px; margin: 0 auto; padding: 0 18px 60px; }

/* ---- topbar ---- */
.topbar { position: sticky; top: 0; z-index: 50; background: rgba(10,13,18,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); margin: 0 -18px; padding: 0 18px; }
.topline { display: flex; align-items: center; gap: 14px; padding: 12px 0 8px; flex-wrap: wrap; }
.brand { font-family: var(--serif); font-weight: 800; font-size: 20px; letter-spacing: .04em; }
.brand em { font-style: normal; color: var(--gold); }

.langbtn.on { color: var(--bg); background: var(--gold); border-color: var(--gold); font-weight: 600; }

.socials svg { width: 15px; height: 15px; fill: currentColor; }
.nav { display: flex; gap: 2px; overflow-x: auto; padding: 4px 0 0; }
.navbtn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: var(--sans); font-size: 13.5px; padding: 8px 12px 10px; cursor: pointer; white-space: nowrap; }
.navbtn:hover { color: var(--txt); }
.navbtn.on { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }

/* ---- typographie ---- */
.h1 { font-family: var(--serif); font-size: clamp(30px, 5vw, 44px); font-weight: 800; line-height: 1.15; }
.h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; margin: 26px 0 14px; }
.h3 { font-family: var(--serif); font-size: 17.5px; font-weight: 700; }
.h4 { font-family: var(--serif); font-size: 15.5px; font-weight: 700; }
.eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.lab { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
.mono { font-family: var(--mono); }
.goldc { color: var(--gold); }
.warnc { color: var(--warn); }
.text-sm { font-size: 13.8px; }
.text-xs { font-size: 12px; }
.opacity-60 { opacity: .6; } .opacity-70 { opacity: .7; } .opacity-80 { opacity: .8; } .opacity-90 { opacity: .9; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; } .mt-6 { margin-top: 24px; } .mb-2 { margin-bottom: 8px; } .mb-4 { margin-bottom: 16px; }
.max-w-2xl { max-width: 42rem; } .max-w-3xl { max-width: 48rem; }

/* ---- cartes & grilles ---- */
.card { background: linear-gradient(180deg, var(--card2), var(--card)); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; }
.card.clickable { cursor: pointer; transition: border-color .2s, transform .2s; }
.card.clickable:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
.gold-edge { border-color: rgba(232,193,90,.45); box-shadow: 0 0 0 1px rgba(232,193,90,.12) inset; }
.grid2 { display: grid; gap: 16px; } .grid3 { display: grid; gap: 16px; } .grid5 { display: grid; gap: 12px; }
@media (min-width: 768px) { .grid2 { grid-template-columns: 1fr 1fr; } .grid3 { grid-template-columns: 1fr 1fr 1fr; } .grid5 { grid-template-columns: repeat(5, 1fr); } }
.space-y > * + * { margin-top: 22px; }
.flexwrap { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.ml-auto { margin-left: auto; }

/* ---- hero ---- */
.hero { position: relative; overflow: hidden; padding: 44px 26px; }
.herokanji { position: absolute; right: 14px; top: -30px; font-size: 190px; font-family: var(--serif); color: rgba(232,193,90,.07); user-select: none; pointer-events: none; }
.rods { position: absolute; inset: 0; pointer-events: none; }
.rods i { position: absolute; top: -20%; width: 1px; height: 140%; background: linear-gradient(180deg, transparent, rgba(232,193,90,.16), transparent); animation: rod 7s ease-in-out infinite; }
.rods i:nth-child(1){left:8%} .rods i:nth-child(2){left:24%} .rods i:nth-child(3){left:41%} .rods i:nth-child(4){left:58%} .rods i:nth-child(5){left:74%} .rods i:nth-child(6){left:90%}
@keyframes rod { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
.kanji { font-family: var(--serif); font-size: 34px; color: rgba(232,193,90,.5); }

/* ---- tables ---- */
.tblwrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--line); background: rgba(0,0,0,.25); position: sticky; top: 0; }
.tbl td { padding: 8px 12px; border-bottom: 1px solid rgba(35,42,56,.55); vertical-align: top; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr.hl td { background: rgba(232,193,90,.06); }
.tbl tr.hl td:first-child { border-left: 2px solid var(--gold); }
.maxh { max-height: 300px; overflow-y: auto; }

/* ---- badges & chips ---- */
.badge { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: .06em; color: var(--gold); border: 1px solid rgba(232,193,90,.4); border-radius: 999px; padding: 2px 8px; vertical-align: 2px; }
.badge2 { display: inline-block; font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; vertical-align: 2px; }
.chipbtn { background: none; border: 1px solid var(--line); color: var(--muted); font-family: var(--mono); font-size: 11.5px; padding: 4px 11px; border-radius: 999px; cursor: pointer; }
.chipbtn.on { color: var(--bg); background: var(--gold); border-color: var(--gold); font-weight: 600; }
.chippas { display: inline-block; font-size: 11.5px; border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; color: var(--muted); }
.tabbtn { background: none; border: 1px solid var(--line); color: var(--muted); font-family: var(--serif); font-weight: 700; font-size: 14px; padding: 7px 16px; border-radius: 10px; cursor: pointer; }
.tabbtn.on { color: var(--gold); border-color: var(--gold-dim); background: rgba(232,193,90,.07); }
.btn { background: var(--gold); color: var(--bg); border: none; font-family: var(--sans); font-weight: 600; font-size: 13px; padding: 7px 14px; border-radius: 8px; cursor: pointer; }

.btn-ghost:hover { border-color: var(--gold-dim); }

/* ---- combos ---- */
.cstep { display: inline-block; background: var(--card2); border: 1px solid var(--line); border-radius: 999px; padding: 5px 13px; font-size: 12.8px; }
.cstep.gold { border-color: rgba(232,193,90,.55); color: var(--gold); background: rgba(232,193,90,.06); }
.arrow { color: var(--gold); font-family: var(--mono); }
.scorebar { height: 6px; background: rgba(255,255,255,.07); border-radius: 999px; overflow: hidden; margin-top: 4px; }
.scorefill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 999px; transition: width .7s ease; }
.bar { height: 8px; background: rgba(255,255,255,.07); border-radius: 999px; overflow: hidden; margin-top: 6px; }
.fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 999px; transition: width .9s ease; }
.mtch { border-left: 2px solid var(--line); padding-left: 12px; }

.startol { counter-reset: st; list-style: none; }

.startol li::before { content: counter(st); position: absolute; left: 0; top: 1px; width: 20px; height: 20px; border: 1px solid var(--gold-dim); border-radius: 50%; color: var(--gold); font-family: var(--mono); font-size: 11px; display: flex; align-items: center; justify-content: center; }
.disc { list-style: disc; padding-left: 1.2em; }

details.branch[open] > summary::before { transform: rotate(90deg); }

.node.locked { opacity: .55; }

.node .nname { font-weight: 600; font-size: 13.5px; }
.node .nmeta { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
.node .ndesc { font-size: 12px; color: var(--muted); margin-top: 4px; }

.lvl button { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 13px; padding: 0 4px; }
.kmap { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: var(--bg2); }
.kmap circle { cursor: pointer; }

.t2wrap { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; position: relative; }
.t2map {
  display: block; width: 100%; height: 620px; touch-action: none; cursor: grab;
  background:

.t2map:active { cursor: grabbing; }
.t2map text { user-select: none; pointer-events: none; }

.exportbox { background: var(--bg2); border: 1px dashed var(--line); border-radius: 10px; padding: 10px 12px; font-family: var(--mono); font-size: 11px; white-space: pre-wrap; max-height: 210px; overflow-y: auto; }

.page { animation: pagein .32s ease; }

i corta el dash, Sekienton aturde, Geki castiga. A quemarropa la lógica se invierte: el caster no tiene ventana y qⁿ juega PARA el Hollow."},{"pair":"Quincy ↔ Hollow","fr":"Course vitesse contre sustain : le Quincy gagne au spacing (volées avant contact), le Hollow gagne s’il colle — Wings recolle la distance, Hierro + Iron Skin (+35% régén posture) encaissent les punish moyens. L’over-commit Quincy dans l’hyperarmor est l’erreur décisive documentée.","en":"Speed race vs sustain: Quincy wins at spacing (volleys before contact), Hollow wins on top of you — Wings re-closes, Hierro + Iron Skin (+35% posture regen) soak average punishes. Quincy over-commit into hyperarmor is the documented decisive mistake.","es":"Velocidad contra aguante: el Quincy gana al espaciar, el Hollow si se pega — Wings recorta, Hierro + Iron Skin absorben. El exceso del Quincy contra hyperarmor es el error decisivo."}],"sv":{"shinigami":[{"k":"Vitesse d’exécution","v":2,"fr":"2 casts de setup avant les dégâts","en":"2 setup casts before damage","es":"2 casteos antes del daño"},{"k":"Dégâts","v":5,"fr":"HCS « extrêmes » + Goryū multi-charges","en":"“Extreme” HCS + multi-charge Goryū","es":"HCS extremo + Goryū"},{"k":"Efficience Reiatsu","v":2,"fr":"coûts très élevés vs base 55 → Reserves 200 obligatoires","en":"very high costs vs base 55 → Reserves 200 mandatory","es":"costes altísimos vs base 55"},{"k":"Facilité","v":4,"fr":"exécution simple, discipline de fenêtres","en":"simple execution, window discipline","es":"ejecución simple, disciplina"},{"k":"Ouvertures créées","v":5,"fr":"binds p≈1 + Geki = ouvertures garanties","en":"p≈1 binds + Geki = guaranteed openings","es":"ataduras p≈1 + Geki"}],"quincy":[{"k":"Vitesse d’exécution","v":5,"fr":"volée immédiate depuis Shunpo","en":"instant volley off Shunpo","es":"ráfaga inmediata"},{"k":"Dégâts","v":4,"fr":"« 2–3 volées tuent » (sourcé)","en":"“2–3 volleys kill” (sourced)","es":"«2–3 ráfagas matan»"},{"k":"Efficience Reiatsu","v":3,"fr":"coûts moyens, rotation dense","en":"medium costs, dense rotation","es":"costes medios"},{"k":"Facilité","v":3,"fr":"exige le parry-confirm systématique","en":"demands systematic parry-confirms","es":"exige parry-confirm"},{"k":"Ouvertures créées","v":4,"fr":"pression continue + slow (Standstill)","en":"constant pressure + Standstill slow","es":"presión continua + slow"}],"hollow":[{"k":"Vitesse d’exécution","v":4,"fr":"instantané… une fois au contact","en":"instant… once in range","es":"instantáneo… al contacto"},{"k":"Dégâts","v":5,"fr":"chaîne complète → Death Fist exécute","en":"full string → Death Fist executes","es":"cadena → ejecución"},{"k":"Efficience Reiatsu","v":4,"fr":"peu de Reiatsu, surtout stamina/posture","en":"low Reiatsu, mostly stamina/posture","es":"poco Reiatsu"},{"k":"Facilité","v":2,"fr":"qⁿ : chaque coup est parable","en":"qⁿ: every hit is parryable","es":"qⁿ: todo parable"},{"k":"Ouvertures créées","v":3,"fr":"oki saisie (Zero Clutch) + wall-carry, mais à mériter","en":"grab oki (Zero Clutch) + wall-carry, but earned","es":"oki de agarre (Zero Clutch), pero ganado"}]},"sy":[{"name":"Heavenly Restriction (charme)","fr":"« Désactive des capacités » sonne fort — mais te bride TOI aussi : buffé récemment et toujours jugé piège pour caster à haut niveau. Le texte séduisant ≠ la valeur.","en":"“Disables abilities” sounds strong — but it shackles YOU too: recently buffed and still judged a caster trap at high level. Seductive text ≠ value.","es":"«Desactiva capacidades» suena fuerte — pero TE limita a ti también: sigue siendo una trampa para casters."},{"name":"Hainawa (vol de Reiatsu)","fr":"Voler du Rei n’est pas ce qui le paie : 10 SP se justifient parce qu’il OUVRE la ligne vers Goryū et contrôle à distance. Pris seul pour « le vol », il serait surpayé.","en":"The Reiatsu steal isn’t what pays for it: 10 SP is justified because it OPENS the Goryū line and controls at range. Taken alone “for the steal”, it would be overpriced.","es":"El robo de Rei no es lo que lo paga: sus 10 SP se justifican porque ABRE la línea a Goryū."},{"name":"Sai — « faible contre plus fort »","fr":"Mention officielle du jeu : elle vise la DURÉE du bind vs cibles à stats supérieures, pas la probabilité de toucher. À stats égales (PvP nv.100), p≈1 tient.","en":"Official game note: it concerns bind DURATION vs higher-stat targets, not hit probability. At equal stats (lv.100 PvP), p≈1 holds.","es":"La nota oficial habla de la DURACIÓN contra stats superiores, no de la probabilidad. A stats iguales, p≈1 se mantiene."},{"name":"Waypoint (Shikai)","fr":"Zéro dégât, zéro combo — le reroll est mathématiquement gratuit en valeur. Ne pas s’attacher au 1er drop.","en":"Zero damage, zero combo — the reroll is mathematically free in value. Don’t get attached to the first drop.","es":"Cero daño, cero combo — el reroll sale gratis en valor."}],"sb":{"shinigami":{"used":8,"fr":"8/9 slots — Sai·Hōrin·Goryū·Sekienton·Rikujōkōrō·Shō·Hainawa·Byakurai ; slot 9 libre pour Fushibi (anti-Hakuda) ou Tsuzuri. Passifs hors barre : rien d’utile ne dort à l’inventaire.","en":"8/9 slots — slot 9 free for Fushibi (anti-Hakuda) or Tsuzuri. Passives are off-bar: nothing useful sleeps in the inventory.","es":"8/9 — ranura 9 libre para Fushibi. Nada útil duerme en el inventario."},"quincy":{"used":9,"fr":"9/9 slots (Flash Surprise · Clone Strike · Kumo Kiri · Vortex Edge · Fireworks · False Cutter · Flying Cyclone · Afterimage Clones · Flash Execute) — le Blut est une posture (Z), hors barre. Barre PLEINE : c’est le kit le plus dense des trois races.","en":"9/9 slots (Flash Surprise · Clone Strike · Kumo Kiri · Vortex Edge · Fireworks · False Cutter · Flying Cyclone · Afterimage Clones · Flash Execute) — Blut is a stance (Z), off-bar. FULL bar: the densest kit of the three races.","es":"9/9 — el Blut es una postura (Z), fuera de la barra. Barra LLENA."},"hollow":{"used":8,"fr":"≈8/9 slots (Ripcord · Dragon Lash · Zero Clutch · Psycho Crash · Cero + actives du chemin : Bala Blaster · Finger Cero · Hollow Cutter) — traits et Hierro sont passifs, hors barre.","en":"≈8/9 slots (Ripcord · Dragon Lash · Zero Clutch · Psycho Crash · Cero + path actives: Bala Blaster · Finger Cero · Hollow Cutter) — traits and Hierro are off-bar passives.","es":"≈8/9 — rasgos y Hierro son pasivos."}},"sk":{"fr":"Équilibrage au 10/07/2026 : AUCUN des skills de ces combos n’a été nerfé depuis la sortie (binds/Kidō intacts ; seul nerf : hitbox du Giant Dragonfly, PvE). Update 2 ajoute des skills « Sincerity » non documentés : à réévaluer dès publication.","en":"Balance as of 2026-07-08: NONE of these combo skills has been nerfed since launch (binds/Kido intact; only nerf: Giant Dragonfly hitbox, PvE). Update 2 adds undocumented “Sincerity” skills: to re-evaluate once published.","es":"Balance al 10/07/2026: NINGUNO de estos skills ha sido nerfeado (solo la hitbox del Dragonfly, PvE). Los skills «Sincerity» del Update 2 quedan por evaluar."},"sx":{"Speed Quincy (méta actuelle)":{"fr":"Force MÉCANIQUE, transférable : le slow de Standstill fabrique des fenêtres garanties pour les volées. Casse chez qui ne parry-confirme pas — le combo n’excuse aucune impatience.","en":"MECHANICAL strength, transferable: the Standstill slow manufactures guaranteed volley windows. Breaks for players who don’t parry-confirm — the combo forgives no impatience.","es":"Fuerza MECÁNICA, transferible: el slow fabrica ventanas garantizadas. Se rompe sin parry-confirm."},"Stark / Superstar burst":{"fr":"La vraie force est la REVIVE (filet de sécurité), pas la séquence : dépend d’un drop ~1%. Transférable seulement si tu as le Schrift.","en":"The real strength is the REVIVE (safety net), not the sequence: depends on a ~1% drop. Transferable only if you own the Schrift.","es":"La fuerza real es la REANIMACIÓN, no la secuencia: depende de un drop ~1%."},"Byakuya — Senbonzakura Capitaine":{"fr":"Moitié mécanique (le stacking de pétales est réel), moitié maîtrise : exige Katana + gestion de jauge. Fort chez son auteur ; moyen sans discipline de stacks.","en":"Half mechanics (petal stacking is real), half mastery: demands Katana + gauge management. Strong for its author; average without stack discipline.","es":"Mitad mecánica, mitad maestría: exige Katana y gestión de acumulación."},"Hakuda glass-cannon 335/65":{"fr":"DPS brut maximal sur le papier — mais qⁿ fait que sa force vient de la MAÎTRISE du joueur (parrys, spacing), pas du build. À copier seulement si ton Hakuda est déjà propre.","en":"Max paper DPS — but qⁿ means its strength comes from player MASTERY (parries, spacing), not the build. Copy only if your Hakuda is already clean.","es":"DPS máximo en papel — su fuerza viene de la MAESTRÍA, no del build."},"Template Hollow endgame":{"fr":"Force STRUCTURELLE, transférable à 100% : les 4 slots de traits Vasto sont un avantage permanent qui n’exige aucune exécution.","en":"STRUCTURAL strength, 100% transferable: the 4 Vasto trait slots are a permanent edge requiring zero execution.","es":"Fuerza ESTRUCTURAL, 100% transferible: 4 ranuras de rasgos permanentes."}},"sS":[{"n":"Savior’s Cape","slot":"Body","rar":"Legendary","stats":"+2,3% arme · +3 Reiatsu · +10 PV","src":"Coffres Hueco Mundo","role":"weapon"},{"n":"Conqueror’s Trophy","slot":"Body","rar":"Legendary","stats":"+3 Posture · +12 PV","role":"defense"},{"n":"Gunslinger’s Tunic","slot":"Body","rar":"Rare","stats":"+2% Kidō · +4 Reiatsu · +7 PV","role":"kido"},{"n":"Battle-Damaged Haori","slot":"Body","rar":"Rare","stats":"+1,5% arme · +4% régén posture · +13 PV","src":"Junichiro (Hueco Mundo)","role":"weapon"},{"n":"Arctic Explorer’s Cape","slot":"Body","rar":"Rare","stats":"+2% Kidō · +4 PV","role":"kido"},{"n":"Frosted Steel Pauldrons","slot":"Body","rar":"Rare","stats":"+1% Kidō · +1% DÉF mêlée · +6 PV","src":"Lord Nivis","role":"defense"},{"n":"Snowhunter’s Hide Tunic","slot":"Body","rar":"Rare","stats":"+2% arme · +2% Hakuda · +1% DÉF mêlée · +2 Load","src":"Craft (Bear/Panther Parts)","role" :"hakuda"},{"n":"Monkey Head","slot":"Misc","rar":"Legendary","stats":"+1,5% arme · +4 PV · +2,5 Reiatsu · +5% régén posture (meilleur hybride)","src":"Argus The Sharp","role":"weapon"},{"n":"Pendant of Youth","slot":"Misc","rar":"Legendary","stats":"+10 Posture · +12,5 stam Shunpo (seul gros bonus Shunpo)","src":"Raids & Calamitas (rare)","role":"shunpo"},{"n":"Gunslinger’s Scarf","slot":"Misc","rar":"Rare","stats":"+1% Kidō · +3 Reiatsu · +3 PV","src":"Coffres Hueco/Human World","role":"kido"},{"n":"Ashen Pendant","slot":"Misc","rar":"Rare","stats":"+5 PV · +4,5% dégâts de Flamme","src":"Calamitas (Hueco Mundo)","role":"kido"},{"n":"Drinking Gourd","slot":"Misc","rar":"Rare","stats":"+8 Reiatsu · +2% DÉF Kidō","src":"Junichiro (Hueco Mundo)","role":"reiatsu"},{"n":"Electrified Arm Chains (×2)","slot":"Misc","rar":"Common","stats":"+1,5% régén posture · +1,5% DÉF Kidō · +4% dégâts de Foudre","src":"Craft (Arm Chains + Electric Cores)","role":"kido"},{"n":"Engineer’s Cape Issue No. 7","slot":"Misc","rar":"Rare","stats":"+4 Reiatsu · +3% DÉF Kidō","role":"reiatsu"},{"n":"Village Guard’s Gauntlets","slot":"Misc","rar":"Common","stats":"+2,5% Hakuda","src":"Village Guards (Soul Society Outskirts)","role":"hakuda"}],"sw":{"kido":{"fr":"Caster Kidō : Chaos Halo (tête) · Arctic Explorer’s Goggles (visage) · Gunslinger’s Tunic (corps) · Electrified Arm Chains ou Gunslinger’s Scarf (misc) · Utility Backpack (utilité) — modificateurs Precise (dégâts Kidō ; ~5 % de chance par roll). Les Electrified Chains ajoutent +4% Foudre, en synergie directe avec notre build foudre.","en":"Kido caster: Chaos Halo · Arctic Explorer’s Goggles · Gunslinger’s Tunic · Electrified Arm Chains or Gunslinger’s Scarf · Utility Backpack — Precise modifiers (Kido damage; ~5% roll chance). Electrified Chains add +4% Lightning, direct synergy with our lightning build.","es":"Caster Kido: Chaos Halo · Arctic Explorer’s Goggles · Gunslinger’s Tunic · Electrified Arm Chains · Utility Backpack — modificadores Precise."},"weapon":{"fr":"Arme (Quincy/Shinigami épée) : The King’s Crown (tête) · Wraith Mask (visage) · Savior’s Cape ou Battle-Damaged Haori (corps) · Monkey Head (misc) · Utility Backpack — modificateur Deadly (Vibrant = PV max, pas un modificateur d’arme — corrigé v11).","en":"Weapon (Quincy/Shinigami sword): The King’s Crown · Wraith Mask · Savior’s Cape or Battle-Damaged Haori · Monkey Head · Utility Backpack — Deadly modifier (Vibrant = max HP, not a weapon modifier — fixed in v11).","es":"Arma: The King’s Crown · Wraith Mask · Savior’s Cape · Monkey Head · Utility Backpack — Deadly."},"hakuda":{"fr":"Hakuda (Hollow Vasto) : War-Torn Bandana (tête) · Marsh Stalker Headwrap (visage) · Gravewood Warset (corps) · Demon’s Red Gauntlets + Pendant of Youth (misc) · Utility Backpack — modificateurs Menacing. Le Pendant de Youth alimente ta stamina de Shunpo pour recoller la distance.","en":"Hakuda (Vasto Hollow): War-Torn Bandana · Marsh Stalker Headwrap · Gravewood Warset · Demon’s Red Gauntlets + Pendant of Youth · Utility Backpack — Menacing modifiers.","es":"Hakuda (Hollow Vasto): War-Torn Bandana · Marsh Stalker Headwrap · Gravewood Warset · Demon’s Red Gauntlets + Pendant of Youth · Utility Backpack — Menacing."},"stones":{"fr":"\u003ch3 class=\"h3\">💎 Pierres de modification — la pierre à mettre sur CHAQUE pièce, par build \u003cspan class=\"mono text-xs goldc\">maths du 10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Mécanique : chaque pièce porte UN modificateur, re-rollé aux Tailors (Modifier Stones · 400–500 Soul Tokens le roll). Le roll est aléatoire : \u003cb>E[rolls pour toucher la cible] = 1/p\u003c/b>, et il faut \u003cb>n₉₀ = ln(0,1)/ln(1−p)\u003c/b> rolls pour 90 % de chances. Les 13 modificateurs :\u003c/p>\n\u003cdiv class=\"tblwrap mt-2\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Modificateur\u003c/th>\u003cth>Effet\u003c/th>\u003cth>Chance\u003c/th>\u003cth>E[rolls]\u003c/th>\u003cth>n₉₀ (90 %)\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr class=\"hl\">\u003ctd>\u003cb>Celestial\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Rei max · PV max · DÉF Kidō · DÉF mêlée · régén posture (multi-stat)\u003c/td>\u003ctd class=\"mono\">2 %\u003c/td>\u003ctd class=\"mono\">50\u003c/td>\u003ctd class=\"mono\">114\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Deadly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Dégâts d’arme\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Precise\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Dégâts Kidō\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Menacing\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Dégâts Hakuda\u003c/td>\u003ctd class=\"mono\">3 %\u003c/td>\u003ctd class=\"mono\">33\u003c/td>\u003ctd class=\"mono\">76\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Vibrant\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">PV max (PAS un modificateur d’arme — erreur corrigée en v10)\u003c/td>\u003ctd class=\"mono\">4 %\u003c/td>\u003ctd class=\"mono\">25\u003c/td>\u003ctd class=\"mono\">57\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Voluminous\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Reiatsu max\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Swift\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Vitesse de Shunpo\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Quick\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Régén de posture\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Tireless\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Stamina de Shunpo\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Sturdy\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">DÉF mêlée\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Steadfast\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Posture max\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Ghostly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">DÉF Kidō\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Spacious\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Equipment Load\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-xs opacity-70 mt-1\">E[rolls] ≈ coût moyen : Precise/Deadly ≈ 8 000–10 000 Soul Tokens par pièce ; Menacing ≈ 13 300–16 700 ; Celestial ≈ 20 000–25 000. Le n₉₀ dit le budget « sûr » (90 %) : ×2,25 le coût moyen.\u003c/p>\n\u003cp class=\"lab mt-4\">Shinigami — caster 360 Kidō / 40 Speed (combo prouvé)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>Chaos Halo\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3% Kidō · +7 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">dégâts 100 % Kidō : chaque pièce Precise multiplie TOUT le kit\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Arctic Explorer’s Goggles\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,5% Kidō)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">seul slot Visage avec bonus Kidō direct — même logique\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gunslinger’s Tunic\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2% Kidō · +4 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">les M1 Katana pèsent \u003c10 % des dégâts : Deadly ne multiplierait que cette part\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (repli : Voluminous)\u003c/td>\u003ctd class=\"text-xs\">Voluminous (Rei max, E[rolls]=14 : moitié prix) si la rotation HCS t’assèche malgré Reserves 200\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Electrified Arm Chains\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+4% Foudre)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">synergie foudre (Song of Fire and Thunder exige l’AP) — jamais Vibrant : piège à caster\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Preuve d'arbitrage : basculer 1 pièce en Deadly ne bat Precise que si part_arme × val_Deadly &gt; part_Kidō × val_Precise ; avec ~90 % des dégâts en Kidō, il faudrait un Deadly ~9× plus fort — inexistant. \u003cb class=\"goldc\">Precise ×5.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Quincy — Speed 300 / Kidō 100 (combo v10)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>The King’s Crown\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,1% arme · +2,1% Hakuda)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">volées Sword + skills d’épée = dégâts d’ARME : Deadly multiplie tout, et se cumule ×1,15 avec Blut Arterie\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Wraith Mask\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1,25% arme · +5 PV)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">même logique — l’opener ×2,5 est aussi un coup d’arme : 32,5 → encore plus haut\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Savior’s Cape\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,3% arme · +3 Rei · +10 PV)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">la meilleure pièce arme du jeu porte la même pierre que son bonus de base\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Swift (option : Deadly)\u003c/td>\u003ctd class=\"text-xs\">Swift (E[rolls]=14, moitié prix) nourrit l’identité tempo : Shunpo plus rapide = plus d’openers ; full Deadly ×5 si tu veux le burst pur\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Monkey Head\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1,5% arme · hybride)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">meilleur Misc hybride ; Vibrant N’EST PAS un modificateur d’arme (erreur v9 corrigée)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"lab mt-4\">Hollow — build A : Kidō 325 / Hakuda 56 / Speed 19 (combo v10)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>War-Torn Bandana\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,5% Hakuda · +3,5 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">K325 scale Bala Blaster, Ripcord, Cero (Ultra) et le Finger Cero de Zero Clutch : la part skills domine\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Marsh Stalker Headwrap\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1% Hakuda · +5 vit. Shunpo)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">même logique : Menacing multiplierait une base Hakuda construite sur 56 points seulement\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gravewood Warset\u003c/b> \u003cspan class=\"text-xs opacity-70\">(set Hakuda)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">idem — et Precise coûte 20 rolls vs 33 pour Menacing : le build A est aussi le moins cher à équiper\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (repli : Quick)\u003c/td>\u003ctd class=\"text-xs\">Quick (régén posture, E=14) si tu trades beaucoup en mêlée\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Demon’s Red Gauntlets\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3,6% Hakuda · +8 PV)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Menacing\u003c/td>\u003ctd class=\"text-xs\">l’exception : la pièce porte déjà +3,6 % Hakuda — Menacing y multiplie les M1 Deadly Claws (la moitié du volume de coups de la chaîne)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Variante B (Suplex, H115/S28/K182) : inverse la logique — \u003cb>Menacing ×4 + Quick ×1\u003c/b> : les dégâts redeviennent majoritairement des M1 Hakuda (c'est le set du build « glass-cannon 335/65 » sourcé, qui joue « accessoires Menacing complets »).\u003c/p>\n\u003cp class=\"text-xs warnc mt-2\">Anti-pièges : Vibrant = PV max, PAS l'arme (la v9 le rangeait côté arme — corrigé) · Celestial est fort mais E[rolls] = 50 (≈ 20 000–25 000 tokens PAR pièce) : luxe de fin de progression, à ne viser que sur l'Utility (la pièce sans bonus offensif de base) · les % de chance viennent des guides communautaires (grindnstrat, 07/2026) — le Trello ne publie pas les taux.\u003c/p>","en":"\u003ch3 class=\"h3\">💎 Modifier Stones — which stone on EACH piece, per build \u003cspan class=\"mono text-xs goldc\">math from Jul 10, 2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Mechanics: each piece carries ONE modifier, re-rolled at the Tailors (Modifier Stones · 400–500 Soul Tokens per roll). The roll is random: \u003cb>E[rolls to hit target] = 1/p\u003c/b>, and you need \u003cb>n₉₀ = ln(0.1)/ln(1−p)\u003c/b> rolls for a 90% chance. The 13 modifiers:\u003c/p>\n\u003cdiv class=\"tblwrap mt-2\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Modifier\u003c/th>\u003cth>Effect\u003c/th>\u003cth>Chance\u003c/th>\u003cth>E[rolls]\u003c/th>\u003cth>n₉₀ (90%)\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr class=\"hl\">\u003ctd>\u003cb>Celestial\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max Rei · max HP · Kido DEF · melee DEF · posture regen (multi-stat)\u003c/td>\u003ctd class=\"mono\">2 %\u003c/td>\u003ctd class=\"mono\">50\u003c/td>\u003ctd class=\"mono\">114\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Deadly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Weapon damage\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Precise\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Kido damage\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Menacing\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Hakuda damage\u003c/td>\u003ctd class=\"mono\">3 %\u003c/td>\u003ctd class=\"mono\">33\u003c/td>\u003ctd class=\"mono\">76\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Vibrant\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max HP (NOT a weapon modifier — error fixed in v10)\u003c/td>\u003ctd class=\"mono\">4 %\u003c/td>\u003ctd class=\"mono\">25\u003c/td>\u003ctd class=\"mono\">57\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Voluminous\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max Reiatsu\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Swift\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Shunpo speed\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Quick\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Posture regen\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Tireless\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Shunpo stamina\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Sturdy\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Melee DEF\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Steadfast\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Max posture\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Ghostly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Kido DEF\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Spacious\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Equipment Load\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-xs opacity-70 mt-1\">E[rolls] ≈ average cost: Precise/Deadly ≈ 8,000–10,000 Soul Tokens per piece; Menacing ≈ 13,300–16,700; Celestial ≈ 20,000–25,000. n₉₀ is the “safe” budget (90%): ×2.25 the average.\u003c/p>\n\u003cp class=\"lab mt-4\">Shinigami — 360 Kido / 40 Speed caster (proven combo)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>Chaos Halo\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3% Kido · +7 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">100% Kido damage: every Precise piece multiplies the WHOLE kit\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Arctic Explorer’s Goggles\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.5% Kido)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">only Face slot with a direct Kido bonus — same logic\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gunslinger’s Tunic\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2% Kido · +4 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">Katana M1s are \u003c10% of damage: Deadly would only multiply that share\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (fallback: Voluminous)\u003c/td>\u003ctd class=\"text-xs\">Voluminous (max Rei, E=14: half price) if HCS rotations drain you despite Reserves 200\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Electrified Arm Chains\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+4% Lightning)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">lightning synergy (Song of Fire and Thunder needs AP) — never Vibrant: caster trap\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Arbitrage proof: switching 1 piece to Deadly only beats Precise if weapon_share × Deadly_value &gt; Kido_share × Precise_value; with ~90% of damage in Kido you'd need a ~9× stronger Deadly — doesn't exist. \u003cb class=\"goldc\">Precise ×5.\u003c/b>\u003c/p>\n\u003cp class=\"lab mt-4\">Quincy — Speed 300 / Kido 100 (v10 combo)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>The King’s Crown\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.1% weapon · +2.1% Hakuda)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">Sword volleys + blade skills = WEAPON damage: Deadly multiplies everything, and stacks with Blut Arterie ×1.15\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Wraith Mask\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1.25% weapon · +5 HP)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">same logic — the ×2.5 opener is a weapon hit too: 32.5 → higher still\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Savior’s Cape\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.3% weapon · +3 Rei · +10 HP)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">the game’s best weapon piece carries the same stone as its base bonus\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Swift (option: Deadly)\u003c/td>\u003ctd class=\"text-xs\">Swift (E=14, half price) feeds the tempo identity: faster Shunpo = more openers; full Deadly ×5 for pure burst\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Monkey Head\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1.5% weapon · hybrid)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Deadly\u003c/td>\u003ctd class=\"text-xs\">best hybrid Misc; Vibrant is NOT a weapon modifier (v9 error fixed)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"lab mt-4\">Hollow — build A: Kido 325 / Hakuda 56 / Speed 19 (v10 combo)\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>War-Torn Bandana\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2.5% Hakuda · +3.5 Rei)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">K325 scales Bala Blaster, Ripcord, Cero (Ultra) and Zero Clutch’s Finger Cero: the skill share dominates\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Marsh Stalker Headwrap\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+1% Hakuda · +5 Shunpo spd)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">same logic: Menacing would multiply a Hakuda base built on only 56 points\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gravewood Warset\u003c/b> \u003cspan class=\"text-xs opacity-70\">(Hakuda set)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">ditto — and Precise costs 20 rolls vs 33 for Menacing: build A is also the cheapest to gear\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load · +2 Posture)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (fallback: Quick)\u003c/td>\u003ctd class=\"text-xs\">Quick (posture regen, E=14) if you trade a lot in melee\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Misc\u003c/td>\u003ctd>\u003cb>Demon’s Red Gauntlets\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3.6% Hakuda · +8 HP)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Menacing\u003c/td>\u003ctd class=\"text-xs\">the exception: the piece already carries +3.6% Hakuda — Menacing multiplies the Deadly Claws M1s there (half the chain’s hit volume)\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-1\">Variant B (Suplex, H115/S28/K182): inverts the logic — \u003cb>Menacing ×4 + Quick ×1\u003c/b>: damage becomes mostly Hakuda M1s (that's the sourced “335/65 glass-cannon” set, which runs “full Menacing accessories”).\u003c/p>\n\u003cp class=\"text-xs warnc mt-2\">Anti-traps: Vibrant = max HP, NOT weapon (v9 filed it under weapon — fixed) · Celestial is strong but E[rolls] = 50 (≈ 20,000–25,000 tokens PER piece): endgame luxury, only worth targeting on Utility (the piece with no offensive base stat) · roll chances come from community guides (grindnstrat, 07/2026) — the Trello doesn't publish rates.\u003c/p>","es":"\u003ch3 class=\"h3\">💎 Piedras de modificación — qué piedra en CADA pieza, por build \u003cspan class=\"mono text-xs goldc\">10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Cada pieza lleva UN modificador, re-rolleado en los Tailors (Modifier Stones · 400–500 Soul Tokens). \u003cb>E[rolls] = 1/p\u003c/b>; n₉₀ = rolls para 90% de acierto. Los 13 modificadores:\u003c/p>\n\u003cdiv class=\"tblwrap mt-2\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Modificador\u003c/th>\u003cth>Efecto\u003c/th>\u003cth>Prob.\u003c/th>\u003cth>E[rolls]\u003c/th>\u003cth>n₉₀\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr class=\"hl\">\u003ctd>\u003cb>Celestial\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Rei máx · PV máx · DEF Kido · DEF melé · regen postura (multi-stat)\u003c/td>\u003ctd class=\"mono\">2 %\u003c/td>\u003ctd class=\"mono\">50\u003c/td>\u003ctd class=\"mono\">114\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Deadly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Daño de arma\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Precise\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Daño Kido\u003c/td>\u003ctd class=\"mono\">5 %\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003ctd class=\"mono\">45\u003c/td>\u003c/tr>\u003ctr class=\"hl\">\u003ctd>\u003cb>Menacing\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Daño Hakuda\u003c/td>\u003ctd class=\"mono\">3 %\u003c/td>\u003ctd class=\"mono\">33\u003c/td>\u003ctd class=\"mono\">76\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Vibrant\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">PV máx (NO es modificador de arma — error corregido en v10)\u003c/td>\u003ctd class=\"mono\">4 %\u003c/td>\u003ctd class=\"mono\">25\u003c/td>\u003ctd class=\"mono\">57\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Voluminous\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Reiatsu máx\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Swift\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Velocidad de Shunpo\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Quick\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Regen de postura\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Tireless\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Stamina de Shunpo\u003c/td>\u003ctd class=\"mono\">7 %\u003c/td>\u003ctd class=\"mono\">14\u003c/td>\u003ctd class=\"mono\">32\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Sturdy\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">DEF melé\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Steadfast\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Postura máx\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Ghostly\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">DEF Kido\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003ctr class=\"\">\u003ctd>\u003cb>Spacious\u003c/b>\u003c/td>\u003ctd class=\"text-xs\">Equipment Load\u003c/td>\u003ctd class=\"mono\">11 %\u003c/td>\u003ctd class=\"mono\">9\u003c/td>\u003ctd class=\"mono\">20\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"lab mt-4\">Shinigami — caster 360 Kido / 40 Speed\u003c/p>\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Slot\u003c/th>\u003cth>Pièce / Piece\u003c/th>\u003cth>Pierre / Stone\u003c/th>\u003cth>Pourquoi / Why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd class=\"mono text-xs\">Head\u003c/td>\u003ctd>\u003cb>Chaos Halo\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+3% Kido)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">daño 100% Kido: cada pieza Precise multiplica TODO el kit\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Face\u003c/td>\u003ctd>\u003cb>Arctic Explorer’s Goggles\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2,5% Kido)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">único Face con bono Kido directo\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Body\u003c/td>\u003ctd>\u003cb>Gunslinger’s Tunic\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+2% Kido)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise\u003c/td>\u003ctd class=\"text-xs\">los M1 son \u003c10% del daño\u003c/td>\u003c/tr>\u003ctr>\u003ctd class=\"mono text-xs\">Utility\u003c/td>\u003ctd>\u003cb>Utility Backpack\u003c/b> \u003cspan class=\"text-xs opacity-70\">(+8 Load)\u003c/span>\u003c/td>\u003ctd class=\"mono goldc\">Precise (o Voluminous)\u003c/td>\u003ctd class=\"text-xs\">Voluminous (E=14, mitad de precio) si HCS te seca\u003c/t
