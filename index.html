with the Sp300 essence → their gates are ≤ 300, consistent.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · The opener sits OUTSIDE the cap (charm mechanics)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Perfect Flash is a T2 CHARM: “1st melee hit out of combat ×2.5 — even on a full-HP target (60s CD)” — no attribute gate. First Sword hit (13, Trello table): \u003cb class=\"mono\">13 → 32.5\u003c/b>. Blut Arterie (+15% weapon, no drain): 4-M1 volley: \u003cb class=\"mono\">52 → 59.8\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilities\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>p(opener) = 1 by definition: “out of combat” = before any possible reaction.\u003c/li>\n\u003cli>4-M1 string: E = Σ 13·qᵏ = \u003cb class=\"mono\">23.1 at q = 0.7\u003c/b>. Standstill's slow shrinks dodge windows → q rises: at q = 0.85, E = \u003cb class=\"mono\">33.4 (+45%)\u003c/b> — the essence's exact mathematical role.\u003c/li>\n\u003cli>Superstar = a 2nd attempt: P(≥1 full sequence) goes from 1−ε to \u003cb class=\"mono\">1−ε²\u003c/b> (ε = 0.5: 50% → 75%).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 5 · Functional replacements (mechanics)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Fallzwang's “must-parry” window cannot exist in a legal build. Its v10 replacements: Reishi Flash (area blind: the volley goes unread) + the slow (shrunk dodge windows). Reishi Gather (+7.5% Reiatsu regen) funds volley cadence.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Limited upgrade budget — the level order\u003c/p>\n\u003cp class=\"text-sm mt-1\">Game rule: lv.6 cap per skill, ONE Hōgyoku only (lv.7–8) — you can't max everything. This sequence's strength: NO step requires a tier above the cap (Reishi Flash blinds from its first levels, the slow comes from the essence, the ×2.5 opener comes from a charm). Priorities:\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → tier\u003c/th>\u003cth>Unlocked passive / why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Blut Arterie → lv.8\u003c/b> (THE Hōgyoku)\u003c/td>\u003ctd>“+15% weapon, NO drain” — the tier that carries the whole burst; until then run it lv.≤6 in short windows and swap to Blut Vene when the gauge drains\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">2\u003c/td>\u003ctd>Blade Flow · Flash Execute\u003c/td>\u003ctd>your finishers — Ascension Fragments there first (already in the sheet)\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Reishi Flash → mid tiers\u003c/td>\u003ctd>blind comfort; no documented mandatory tier\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Variant B: Stille Silber → lv.5 EXACTLY\u003c/td>\u003ctd>the “disables transformation” tier is lv.5 — every level beyond is a point lost elsewhere\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict:\u003c/b> v10 is the strongest LEGAL sequence: guaranteed opener (charm, outside the cap), +15% burst (Hōgyoku on Blut Arterie), essence kept, the two impossible skills replaced by the two best equivalents under K100 — and NO tier above the game's level limits. Variant B vs form-reliant opponents.\u003c/p>","es":"\u003ch3 class=\"h3\">🧪 Labo — prueba matemática y mecánica \u003cspan class=\"mono text-xs goldc\">calculado 10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Veredicto: \u003cb class=\"warnc\">la secuencia antigua (Fallzwang + Stille Silber + esencia) era matemáticamente IMPOSIBLE\u003c/b> — sustituida por la versión probada 400/400.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legalidad (tope 400)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Esencia = Speed 300 · Fallzwang = Kido 300 · Stille Silber = K124 · Blut Arterie = K60 → necesidad v9: \u003cb class=\"mono warnc\">600/400 — IMPOSIBLE (+200)\u003c/b>. El «full Speed» literal (K0) ni siquiera permite Blut Arterie. Dos builds legales: \u003cb class=\"goldc\">A (recomendado): Sp300/K100\u003c/b> (esencia + Blut + Reishi Flash + Reishi Gather + Luftpfeile) · \u003cb>B: Sp276/K124\u003c/b> (Stille Silber, sin esencia).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coste de árbol\u003c/p>\n\u003cp class=\"text-sm mt-1\">\u003cb class=\"mono goldc\">34 SP\u003c/b> del árbol Quincy; árbol Speed: costes no publicados (menú M), hipótesis controlada: la meta juega esos 6 skills con la esencia Sp300 → umbrales ≤ 300.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · El opener queda FUERA del tope\u003c/p>\n\u003cp class=\"text-sm mt-1\">Perfect Flash es un AMULETO T2 («1er golpe fuera de combate ×2,5, CD 60 s») — sin umbral. Sword 13 → \u003cb class=\"mono\">32,5\u003c/b>. Blut Arterie (+15%): 4 M1: \u003cb class=\"mono\">52 → 59,8\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Probabilidades\u003c/p>\n\u003cp class=\"text-sm mt-1\">p(opener)=1 por definición · 4 M1: E = 23,1 (q=0,7); con el slow (q=0,85): \u003cb class=\"mono\">33,4 (+45%)\u003c/b> — el papel matemático de la esencia · Superstar: P pasa de 1−ε a \u003cb class=\"mono\">1−ε²\u003c/b> (ε=0,5: 50%→75%).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Presupuesto de mejora limitado\u003c/p>\n\u003cp class=\"text-sm mt-1\">Regla del juego: tope nv.6 por skill, UN solo Hōgyoku (nv.7–8). NINGÚN paso exige un nivel por encima del tope. Prioridades: \u003cb>1. Blut Arterie → nv.8 (EL Hōgyoku: +15% sin drenaje ; mientras tanto, nv.≤6 en ventanas cortas)\u003c/b> · 2. Blade Flow/Flash Execute (fragmentos de Ascensión) · 3. Reishi Flash · Variante B: Stille Silber → nv.5 EXACTO (el palier anti-transformación).\u003c/p>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Veredicto:\u003c/b> la v10 es la secuencia LEGAL más fuerte: opener garantizado, burst +15% (Hōgyoku en Blut Arterie), esencia conservada, y NINGÚN nivel por encima de los límites del juego. Variante B contra kits dependientes de su forma.\u003c/p>"}},"hollow":{"steps":["Wings — recolle la distance","Bala Ripcord nv.6 — TRAVERSE le block et TIRE la cible à toi","M1 Deadly Claws (cadence maximale)","Dragon Lash (H56) — re-stun : la string repart de zéro","Zero Clutch nv.6 — saisie → auto-exécution à bas PV","Sinon : Cero (exécute à distance) / Psycho Crash (ignore les i-frames de ragdoll)"],"counter":{"fr":"Étape par étape : l’opener n’est PAS un M1 parable — Bala Ripcord nv.6 traverse le block et supprime l’out « reculer/bloquer » en ramenant la cible au corps-à-corps. Dragon Lash re-stun au milieu de la string : le compteur de parade repart de zéro (+49% d’espérance de dégâts, calcul au Labo). La sortie est triple et sans réponse à bas PV : Zero Clutch saisit (les saisies ne se parent pas) et auto-exécute, Cero exécute à distance, Psycho Crash ferme l’out « i-frames de ragdoll » — debout, loin ou au sol : AUCUN état n’est sûr. Résiduel nommé : l’esquive latérale sur le trajet du Ripcord (projectile) et les M1 intermédiaires parables — qⁿ est contourné aux deux bouts. Pourquoi Suplex a disparu : Suplex (H115 + S28) + Zero Clutch (K260) = 403 points, et avec Psycho Crash (K325) 468 — pour un plafond de 400. L’ancienne séquence était impossible ; les deux builds légaux sont au Labo.","en":"Step by step: the opener is NOT a parryable M1 — Bala Ripcord lv.6 pierces block and deletes the “back off/block” out by yanking the target into melee. Dragon Lash re-stuns mid-string: the parry counter resets (+49% expected damage, math in the Lab). The exit is triple and answerless at low HP: Zero Clutch grabs (grabs can’t be parried) and auto-executes, Cero executes at range, Psycho Crash closes the “ragdoll i-frames” out — standing, far or downed: NO state is safe. Named residual: the sideways dodge on the Ripcord’s travel (projectile), and the mid-string M1s that remain parryable — qⁿ is bypassed at both ends. Why Suplex is gone: Suplex (H115 + S28) + Zero Clutch (K260) = 403 points, and 468 with Psycho Crash (K325) — against a 400 cap. The old sequence was impossible; both legal builds are in the Lab.","es":"Paso a paso: el opener NO es un M1 parable — Bala Ripcord nv.6 atraviesa el bloqueo y arrastra al rival al cuerpo a cuerpo. Dragon Lash re-aturde a mitad de cadena: el contador de parada vuelve a cero (+49% de daño esperado, cálculo en el Labo). La salida es triple a bajos PV: Zero Clutch agarra (imparable) y auto-ejecuta, Cero ejecuta a distancia, Psycho Crash cierra los i-frames de ragdoll — de pie, lejos o en el suelo: NINGÚN estado es seguro. ¿Por qué ya no está Suplex?: Suplex (H115+S28) + Zero Clutch (K260) = 403 puntos, y 468 con Psycho Crash — tope 400. La secuencia antigua era imposible (Labo)."},"risk":{"fr":"Répartition PROUVÉE : Kidō 325 / Hakuda 56 / Speed 19 (= 400) · 82 SP d’arbres seulement. Vasto Lorde obligatoire (4 traits : Iron Skin · Deadly Claws · Wings · Dense Muscles) · clan Cifer · Resurrección Shark · charmes Raid Boss (solo) + Adrenaline Junkie. Variante pression : Hakuda 115 / Strength 28 / Kidō 182 (garde Suplex : heal first-frame + coupe le thème adverse ; marge 75 → Speed) — mais elle abandonne Zero Clutch ET Psycho Crash. Hierro + Iron Skin absorbent le chip pendant l’approche.","en":"PROVEN split: Kido 325 / Hakuda 56 / Speed 19 (= 400) · only 82 tree SP. Vasto Lorde mandatory (4 traits: Iron Skin · Deadly Claws · Wings · Dense Muscles) · Cifer clan · Shark Resurrección · Raid Boss (solo) + Adrenaline Junkie charms. Pressure variant: Hakuda 115 / Strength 28 / Kido 182 (keeps Suplex: first-frame heal + theme shutdown; 75 spare → Speed) — but it gives up BOTH Zero Clutch and Psycho Crash. Hierro + Iron Skin soak chip damage on approach.","es":"Reparto PROBADO: Kido 325 / Hakuda 56 / Speed 19 (= 400) · solo 82 SP. Vasto Lorde obligatorio (4 rasgos) · clan Cifer · Shark · Raid Boss + Adrenaline Junkie. Variante presión: Hakuda 115 / Strength 28 / Kido 182 (conserva Suplex) — pero renuncia a Zero Clutch Y Psycho Crash. Hierro absorbe el daño de aproximación."},"lab":{"fr":"\u003ch3 class=\"h3\">🧪 Labo — preuve mathématique &amp; mécanique \u003cspan class=\"mono text-xs goldc\">calculs du 10/07/2026 · données du hub (arbres/traits)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict : \u003cb class=\"warnc\">l'ancienne séquence (avec Suplex) était mathématiquement IMPOSSIBLE\u003c/b> — remplacée ci-dessus par la version prouvée 400/400.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Légalité (plafond 400 pts) — là où la v9 tombe\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Skill (v9)\u003c/th>\u003cth>Seuils\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr>\u003ctd>Psycho Crash\u003c/td>\u003ctd class=\"mono\">Kidō 325\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Zero Clutch\u003c/td>\u003ctd class=\"mono\">Kidō 260\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Bala Ripcord\u003c/td>\u003ctd class=\"mono\">Kidō 182\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd>Suplex\u003c/td>\u003ctd class=\"mono warnc\">Hakuda 115 + Strength 28\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Dragon Lash\u003c/td>\u003ctd class=\"mono\">Hakuda 56\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">Besoin minimal v9 : \u003cb class=\"mono warnc\">K325 + H115 + S28 = 468/400 — IMPOSSIBLE (dépassement 68)\u003c/b>. Même en sacrifiant Psycho Crash : 403/400, raté à 3 points. Deux builds légaux :\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>\u003cb class=\"goldc\">A (recommandé, exécution) : Kidō 325 / Hakuda 56 / Speed 19 = 400\u003c/b> — Ripcord · Dragon Lash · Zero Clutch · Cero · Psycho Crash. Perd Suplex (heal + coupe-thème). Détail qui montre la finesse du plafond : ajouter Hard Pressure (H76) donnerait 401 — raté à UN point.\u003c/li>\n\u003cli>\u003cb>B (pression Hakuda) : Hakuda 115 / Strength 28 / Kidō 182 = 325 (marge 75 → Speed)\u003c/b> — Ripcord · Suplex · Dragon Lash · Cero. Perd Zero Clutch ET Psycho Crash : les DEUX exécutions.\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 2 · Coût d'arbre (prérequis inclus)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Build A : \u003cb class=\"mono goldc\">82 SP\u003c/b> seulement (12 nodes Kidō-race 71 SP + Dragon Lash 9 SP + Hakuda Basics 2 SP) — le combo le moins cher des trois races en SP.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Économie\u003c/p>\n\u003cp class=\"text-sm mt-1\">La chaîne vit sur la stamina/posture (fiche du hub : « peu de Reiatsu ») ; Bala Blaster, Ripcord, Cero et le Finger Cero de Zero Clutch scalent tous sur K325 — l'attribut du build EST l'attribut des dégâts skills. Cero : Ultra Power (K225 ✓) disponible pour le burst si tu assumes le startup.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · Le théorème du re-stun (pourquoi Dragon Lash est au milieu)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Une string de 6 M1 parables (q = 0,7 par hit) : E = Σ w·qᵏ = \u003cb class=\"mono\">2,06·w\u003c/b>, et P(6 d'affilée) = q⁶ = 11,8 %. Coupée en 3+3 par le stun garanti de Dragon Lash (le compteur de parade repart de zéro) : E = 2×Σ₁³ w·qᵏ = \u003cb class=\"mono\">3,07·w → +49 % d'espérance de dégâts\u003c/b> — w = dégâts par coup de griffe (stats des poings non publiées sur le Trello : le RATIO est indépendant de w). Couverture d'états à bas PV : debout → Zero Clutch (saisie, imparable) · à distance → Cero (exécute) · ragdoll → Psycho Crash (ignore les i-frames) : \u003cb>aucun état n'est sûr\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Règle des niveaux : plafond nv.6 — pas de Hōgyoku nécessaire\u003c/p>\n\u003cp class=\"text-sm mt-1\">Limite du jeu : chaque skill plafonne à nv.6, seul LE skill Hōgyoku monte à nv.7–8. Les deux paliers fondateurs de cette séquence (Ripcord nv.6, Zero Clutch nv.6) restent SOUS le plafond : contrairement au Shinigami, AUCUN Hōgyoku n'est requis ✓.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Budget d'amélioration limité — l'ordre des niveaux\u003c/p>\n\u003cp class=\"text-sm mt-1\">On ne monte pas tout : seuls DEUX investissements sont obligatoires, le reste est natif. Priorités :\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → palier\u003c/th>\u003cth>Passif débloqué / pourquoi\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Bala Ripcord → nv.6\u003c/b>\u003c/td>\u003ctd>TRAVERSE le block + tire la cible à toi — l'opener imparable N'EXISTE qu'à ce palier\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">2\u003c/td>\u003ctd>\u003cb>Zero Clutch → nv.6\u003c/b>\u003c/td>\u003ctd>l'auto-exécution en saisie = le palier nv.6\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Cero → choix de variante\u003c/td>\u003ctd>nœud de CHOIX, pas un niveau : Ultra Power (K225 ✓) pour le burst, Speed Variant pour la fiabilité\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Dragon Lash · Psycho Crash · Bala Blaster\u003c/td>\u003ctd>propriétés NATIVES (gros stun, ignore les i-frames, charge) : bas niveau OK\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>LE Hōgyoku\u003c/td>\u003ctd>aucun palier nv.7–8 documenté côté Hollow : ne le dépense PAS sur une promesse non vérifiée (ou mets-le sur Ripcord pour les stats brutes)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict :\u003c/b> la v10-A est le plafond réel du Hollow sous 400 points : entrée imparable (Ripcord), re-stun médian (+49 % d'espérance), triple porte d'exécution, 82 SP — et seulement DEUX paliers de niveau à financer, tous deux sous le plafond nv.6 du jeu. La variante B existe pour le style pression — au prix des DEUX exécutions.\u003c/p>","en":"\u003ch3 class=\"h3\">🧪 Lab — mathematical &amp; mechanical proof \u003cspan class=\"mono text-xs goldc\">computed Jul 10, 2026 · hub data (trees/traits)\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Verdict: \u003cb class=\"warnc\">the old sequence (with Suplex) was mathematically IMPOSSIBLE\u003c/b> — replaced above by the proven 400/400 version.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legality (400-point cap) — where v9 falls\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>Skill (v9)\u003c/th>\u003cth>Gates\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr>\u003ctd>Psycho Crash\u003c/td>\u003ctd class=\"mono\">Kido 325\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Zero Clutch\u003c/td>\u003ctd class=\"mono\">Kido 260\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Bala Ripcord\u003c/td>\u003ctd class=\"mono\">Kido 182\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd>Suplex\u003c/td>\u003ctd class=\"mono warnc\">Hakuda 115 + Strength 28\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd>Dragon Lash\u003c/td>\u003ctd class=\"mono\">Hakuda 56\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-2\">v9 minimal need: \u003cb class=\"mono warnc\">K325 + H115 + S28 = 468/400 — IMPOSSIBLE (68 over)\u003c/b>. Even sacrificing Psycho Crash: 403/400, missed by 3 points. Two legal builds:\u003c/p>\n\u003cul class=\"text-sm mt-1\" style=\"list-style:disc;padding-left:1.2em\">\n\u003cli>\u003cb class=\"goldc\">A (recommended, execution): Kido 325 / Hakuda 56 / Speed 19 = 400\u003c/b> — Ripcord · Dragon Lash · Zero Clutch · Cero · Psycho Crash. Loses Suplex (heal + theme shutdown). A detail showing how tight the cap is: adding Hard Pressure (H76) would make 401 — missed by ONE point.\u003c/li>\n\u003cli>\u003cb>B (Hakuda pressure): Hakuda 115 / Strength 28 / Kido 182 = 325 (75 spare → Speed)\u003c/b> — Ripcord · Suplex · Dragon Lash · Cero. Loses BOTH executions (Zero Clutch AND Psycho Crash).\u003c/li>\n\u003c/ul>\n\u003cp class=\"lab mt-4\">Test 2 · Tree cost (prerequisites included)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Build A: only \u003cb class=\"mono goldc\">82 SP\u003c/b> (12 race-tree nodes 71 SP + Dragon Lash 9 SP + Hakuda Basics 2 SP) — the cheapest combo of the three races in SP.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3 · Economy\u003c/p>\n\u003cp class=\"text-sm mt-1\">The chain runs on stamina/posture (hub scorecard: “low Reiatsu”); Bala Blaster, Ripcord, Cero and Zero Clutch's Finger Cero all scale on K325 — the build's attribute IS the skills' damage attribute. Cero: Ultra Power (K225 ✓) available for burst if you accept the startup.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 4 · The re-stun theorem (why Dragon Lash sits mid-string)\u003c/p>\n\u003cp class=\"text-sm mt-1\">A 6-M1 parryable string (q = 0.7 per hit): E = Σ w·qᵏ = \u003cb class=\"mono\">2.06·w\u003c/b>, and P(6 straight) = q⁶ = 11.8%. Split 3+3 by Dragon Lash's guaranteed stun (the parry counter resets): E = 2×Σ₁³ w·qᵏ = \u003cb class=\"mono\">3.07·w → +49% expected damage\u003c/b> — w = damage per claw hit (fist stats unpublished on Trello: the RATIO is independent of w). Low-HP state coverage: standing → Zero Clutch (grab, unparryable) · at range → Cero (executes) · ragdoll → Psycho Crash (ignores i-frames): \u003cb>no state is safe\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Level rule: lv.6 cap — no Hōgyoku needed\u003c/p>\n\u003cp class=\"text-sm mt-1\">Game limit: every skill caps at lv.6; only THE Hōgyoku skill reaches lv.7–8. Both founding tiers of this sequence (Ripcord lv.6, Zero Clutch lv.6) stay WITHIN the cap: unlike the Shinigami, NO Hōgyoku is required ✓.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Limited upgrade budget — the level order\u003c/p>\n\u003cp class=\"text-sm mt-1\">You can't max everything: only TWO investments are mandatory, the rest is native. Priorities:\u003c/p>\n\u003cdiv class=\"tblwrap mt-1\">\u003ctable class=\"tbl\">\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>Skill → tier\u003c/th>\u003cth>Unlocked passive / why\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">1\u003c/td>\u003ctd>\u003cb>Bala Ripcord → lv.6\u003c/b>\u003c/td>\u003ctd>PIERCES block + yanks the target to you — the unparryable opener ONLY exists at this tier\u003c/td>\u003c/tr>\n\u003ctr class=\"hl\">\u003ctd class=\"mono\">2\u003c/td>\u003ctd>\u003cb>Zero Clutch → lv.6\u003c/b>\u003c/td>\u003ctd>the grab auto-execute = the lv.6 tier\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">3\u003c/td>\u003ctd>Cero → variant choice\u003c/td>\u003ctd>a CHOICE node, not a level: Ultra Power (K225 ✓) for burst, Speed Variant for reliability\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>Dragon Lash · Psycho Crash · Bala Blaster\u003c/td>\u003ctd>NATIVE properties (big stun, i-frame ignore, charge): low level is fine\u003c/td>\u003c/tr>\n\u003ctr>\u003ctd class=\"mono\">—\u003c/td>\u003ctd>THE Hōgyoku\u003c/td>\u003ctd>no documented lv.7–8 tier on the Hollow side: do NOT spend it on an unverified promise (or put it on Ripcord for raw stats)\u003c/td>\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Verdict:\u003c/b> v10-A is the Hollow's real ceiling under 400 points: unparryable entry (Ripcord), mid-string re-stun (+49% expectation), triple execution gate, 82 SP — and only TWO level tiers to fund, both within the game's lv.6 cap. Variant B exists for the pressure style — at the price of BOTH executions.\u003c/p>","es":"\u003ch3 class=\"h3\">🧪 Labo — prueba matemática y mecánica \u003cspan class=\"mono text-xs goldc\">calculado 10/07/2026\u003c/span>\u003c/h3>\n\u003cp class=\"text-sm mt-2\">Veredicto: \u003cb class=\"warnc\">la secuencia antigua (con Suplex) era matemáticamente IMPOSIBLE\u003c/b> — sustituida por la versión probada 400/400.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 1 · Legalidad (tope 400)\u003c/p>\n\u003cp class=\"text-sm mt-1\">Psycho Crash K325 · Zero Clutch K260 · Ripcord K182 · \u003cb class=\"warnc\">Suplex H115+S28\u003c/b> · Dragon Lash H56 → necesidad v9: \u003cb class=\"mono warnc\">468/400 — IMPOSIBLE (+68)\u003c/b>; incluso sin Psycho Crash: 403/400 (falla por 3). Builds legales: \u003cb class=\"goldc\">A (recomendado): K325/H56/Sp19 = 400\u003c/b> (Ripcord · Dragon Lash · Zero Clutch · Cero · Psycho Crash) · \u003cb>B: H115/S28/K182\u003c/b> (conserva Suplex, pierde AMBAS ejecuciones).\u003c/p>\n\u003cp class=\"lab mt-4\">Test 2 · Coste de árbol\u003c/p>\n\u003cp class=\"text-sm mt-1\">Build A: solo \u003cb class=\"mono goldc\">82 SP\u003c/b> — el combo más barato de las tres razas.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 3-4 · Economía y teorema del re-stun\u003c/p>\n\u003cp class=\"text-sm mt-1\">La cadena vive de stamina/postura; Bala/Cero/Finger Cero escalan con K325. String de 6 M1 (q=0,7): E = \u003cb class=\"mono\">2,06·w\u003c/b>; cortada 3+3 por el stun garantizado de Dragon Lash: E = \u003cb class=\"mono\">3,07·w → +49%\u003c/b>. Cobertura a bajos PV: de pie → Zero Clutch · lejos → Cero · ragdoll → Psycho Crash: \u003cb>ningún estado es seguro\u003c/b>.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 5 · Regla de niveles: tope nv.6 — sin Hōgyoku\u003c/p>\n\u003cp class=\"text-sm mt-1\">Límite del juego: cada skill llega a nv.6; solo EL skill Hōgyoku sube a nv.7–8. Ripcord nv.6 y Zero Clutch nv.6 quedan BAJO el tope: no se requiere ningún Hōgyoku ✓.\u003c/p>\n\u003cp class=\"lab mt-4\">Test 6 · Presupuesto de mejora limitado\u003c/p>\n\u003cp class=\"text-sm mt-1\">Solo DOS inversiones obligatorias: \u003cb>1. Bala Ripcord → nv.6\u003c/b> (el opener imparable SOLO existe en ese palier) · \u003cb>2. Zero Clutch → nv.6\u003c/b> (auto-ejecución). Cero = nodo de ELECCIÓN (Ultra Power K225 ✓). Dragon Lash/Psycho Crash/Bala Blaster: propiedades nativas, nivel bajo OK. EL Hōgyoku: sin palier documentado en Hollow — no lo gastes en una promesa sin verificar.\u003c/p>\n\u003cp class=\"text-sm mt-4\">\u003cb class=\"goldc\">Veredicto:\u003c/b> la v10-A es el techo real del Hollow bajo 400 puntos — y solo DOS paliers que financiar, ambos bajo el tope nv.6 del juego.\u003c/p>"}}},"startGuides":{"shinigami":{"title":{"fr":"Farmer ton Shikai — pas à pas","en":"Farming your Shikai — step by step","es":"Farmear tu Shikai — paso a paso"},"steps":[{"fr":"1 · Atteins le nv.25, puis médite (touche L) aux endroits où tu entends des Spirit Whispers.","en":"1 · Reach lv.25, then meditate (L key) where you hear Spirit Whispers.","es":"1 · Nivel 25 → medita (L) donde oigas Spirit Whispers."},{"fr":"2 · Énigme des cloches — réponses exactes : « An Echo », « A Promise », « The Future ».","en":"2 · Bells riddle — exact answers: “An Echo”, “A Promise”, “The Future”.","es":"2 · Campanas — respuestas: “An Echo”, “A Promise”, “The Future”."},{"fr":"3 · Nv.35 : boss du Monde Intérieur en 3 phases — la phase finale régénère 4 barres de vie : c’est un test de DPS, viens avec tes skills montés.","en":"3 · Lv.35: 3-phase Inner-World boss — the final phase regenerates 4 health bars: it’s a DPS check, come with leveled skills.","es":"3 · Nv.35: jefe de 3 fases — la final regenera 4 barras: es un test de DPS."},{"fr":"4 · Victoire = Shikai aléatoire. Reroll avec les Ability Rerolls (code UPD2 = 20) : jette Waypoint immédiatement ; garde Ice/Red Ice, Senbonzakura (KATANA uniquement) ou Blooming Madness (Leg. ~1%).","en":"4 · Win = random Shikai. Reroll with Ability Rerolls (UPD2 = 20): dump Waypoint instantly; keep Ice/Red Ice, Senbonzakura (KATANA only) or Blooming Madness (Leg. ~1%).","es":"4 · Victoria = Shikai aleatorio. Rerollea: tira Waypoint; guarda Ice, Senbonzakura (KATANA) o Blooming Madness."},{"fr":"5 · Monte-le : paliers Ice vérifiés — Dégâts nv.4/6 · Reiatsu nv.9/10 · Rate nv.5/6. Le Sanctuaire d’Amélioration (chaîne Pratz/Rose/Lord Nivis, Arctic Plains) offre +2 niveaux gratuits, une fois.","en":"5 · Level it: verified Ice breakpoints — Damage lv.4/6 · Reiatsu lv.9/10 · Rate lv.5/6. The Upgrade Shrine (Pratz/Rose/Lord Nivis chain, Arctic Plains) grants +2 free levels, once.","es":"5 · Súbelo: hitos de Ice — Daño 4/6 · Reiatsu 9/10 · Rate 5/6. El Santuario de Mejora da +2 niveles, una vez."},{"fr":"6 · Bankai : annoncé (Blade Realm), pas encore observé en jeu — surveille le Discord officiel.","en":"6 · Bankai: announced (Blade Realm), not yet observed in game — watch the official Discord.","es":"6 · Bankai: anunciado, aún no observado en el juego."}]},"quincy":{"title":{"fr":"Farmer ton Schrift (+ maîtriser le Blut) — pas à pas","en":"Farming your Schrift (+ mastering Blut) — step by step","es":"Farmear tu Schrift (+ dominar el Blut)"},"steps":[{"fr":"1 · Nv.25 : obtiens le grade Soldat Cap auprès du commandement Wandenreich.","en":"1 · Lv.25: earn the Soldat Cap rank from Wandenreich command.","es":"1 · Nv.25: rango Soldat Cap."},{"fr":"2 · Enchaîne les missions du Lieutenant (3★ prioritaires) jusqu’à 300 Soul Tokens.","en":"2 · Chain Lieutenant missions (3★ first) until 300 Soul Tokens.","es":"2 · Misiones del Lieutenant hasta 300 Soul Tokens."},{"fr":"3 · Craft la Sanrei Glove : 300 Soul Tokens + matériaux vendus par le PNJ Wandenreich.","en":"3 · Craft the Sanrei Glove: 300 Soul Tokens + materials from the Wandenreich NPC.","es":"3 · Craftea la Sanrei Glove: 300 Tokens + materiales."},{"fr":"4 · Bats le boss Securis avec le gant → tu reçois un Schrift + le Letzt Stil. Pas de Vollständig en jeu à ce jour.","en":"4 · Beat the Securis boss with the glove → you receive a Schrift + Letzt Stil. No Vollständig in game.","es":"4 · Vence a Securis → Schrift + Letzt Stil. Sin Vollständig."},{"fr":"5 · Reroll aux Ability Rerolls jusqu’à une cible : The Superstar (~1%, revive de James — le meilleur), sinon Thunderbolt (dégâts) ou Necromancer (utilité).","en":"5 · Reroll with Ability Rerolls toward a target: The Superstar (~1%, James revive — the best), else Thunderbolt (damage) or Necromancer (utility).","es":"5 · Rerollea hacia: Superstar (~1%), Thunderbolt o Necromancer."},{"fr":"6 · Le Blut au quotidien : Blut Arterie AVANT d’engager une volée (offense), bascule Blut Vene quand tu encaisses ou temporises — deux skills de l’arbre, pas des drops.","en":"6 · Daily Blut: Blut Arterie BEFORE committing a volley (offense), swap to Blut Vene when tanking or stalling — tree skills, not drops.","es":"6 · Blut Arterie antes de atacar; Blut Vene al aguantar — skills del árbol."}]},"hollow":{"title":{"fr":"Farmer ta Resurrección — pas à pas","en":"Farming your Resurrección — step by step","es":"Farmear tu Resurrección — paso a paso"},"steps":[{"fr":"1 · Grimpe l’échelle : Fishbone → Menos → Adjuchas → VASTO LORDE. Ne retire jamais le masque avant Vasto (slots de traits : 2/3/4 — perdus à jamais sinon).","en":"1 · Climb the ladder: Fishbone → Menos → Adjuchas → VASTO LORDE. Never unmask before Vasto (trait slots: 2/3/4 — lost forever otherwise).","es":"1 · Sube: Fishbone → Menos → Adjuchas → VASTO LORDE. Nunca antes."},{"fr":"2 · Vasto Lorde atteint : retire le masque (touche L) → tu deviens Arrancar et tu choisis une ARME (Spear conseillée pour débuter).","en":"2 · At Vasto Lorde: remove the mask (L key) → you become Arrancar and pick a WEAPON (Spear suggested to start).","es":"2 · En Vasto Lorde: máscara fuera (L) → Arrancar + ARMA (Spear)."},{"fr":"3 · Équipe l’arme puis médite (L) : dans le Monde Intérieur, suis les yeux rouges jusqu’à ton double.","en":"3 · Equip the weapon then meditate (L): in the Inner World, follow the red eyes to your double.","es":"3 · Equipa el arma y medita (L): sigue los ojos rojos."},{"fr":"4 · Bats ton Monde Intérieur → Resurrección aléatoire. Reroll aux Ability Rerolls : cible Shark (le moins situationnel), sinon Praying Mantis (barrière 360°) ou Luminosity (hybride Hakuda+Kidō).","en":"4 · Beat your Inner World → random Resurrección. Reroll with Ability Rerolls: target Shark (least situational), else Praying Mantis (360° barrier) or Luminosity (Hakuda+Kido hybrid).","es":"4 · Vence tu Mundo Interior → Resurrección. Objetivo: Shark."},{"fr":"5 · Tes 4 traits Vasto (Iron Skin · Deadly Claws · Wings · Dense Muscles) restent actifs en Arrancar — c’est tout l’intérêt d’avoir attendu.","en":"5 · Your 4 Vasto traits (Iron Skin · Deadly Claws · Wings · Dense Muscles) stay active as Arrancar — that’s the whole point of waiting.","es":"5 · Tus 4 rasgos Vasto siguen activos como Arrancar."},{"fr":"6 · ATTENTION : les essences consommées (ex. Gran Ray Cero, Kurikara) ne reviennent JAMAIS, même après un reset complet — n’en consomme qu’en toute certitude.","en":"6 · WARNING: consumed essences (e.g. Gran Ray Cero, Kurikara) NEVER come back, even after a full reset — consume only when certain.","es":"6 · OJO: las esencias consumidas NUNCA vuelven."}]}},"startUniversal":[{"fr":"1 · Fais le tutoriel en entier (le boss Gelum drop un Hōgyoku Fragment) et termine « Humble Beginnings » pour débloquer la Boutique.","en":"1 · Complete the tutorial fully (Gelum drops a Hōgyoku Fragment) and finish “Humble Beginnings” to unlock the Shop.","es":"1 · Completa el tutorial y “Humble Beginnings” para desbloquear la Tienda."},{"fr":"2 · Rejoins le groupe Roblox Midnight Continent → Boutique → Codes : entre les 12 codes actifs (Accueil). Priorité : UPD2 (20 Ability Rerolls — c’est TA monnaie de reroll de forme) puis MINIUPDATE et day1.","en":"2 · Join the Roblox group → Shop → Codes: redeem the 12 active codes (Home). Priority: UPD2 (20 Ability Rerolls — your form-reroll currency) then MINIUPDATE and day1.","es":"2 · Únete al grupo → canjea los 12 códigos. Prioridad: UPD2 (20 Ability Rerolls) y MINIUPDATE."},{"fr":"3 · Apprends les inputs (onglet Combos) : M1, M2 molette (heavy d’arme), parade des attaques vertes, F counter, Q dash, Shift+Q rushdown. Le combat est basé parade.","en":"3 · Learn the inputs (Combos tab): M1, middle-click heavy, green-attack parry, F counter, Q dash, Shift+Q rushdown. Combat is parry-based.","es":"3 · Aprende los inputs (pestaña Combos). El combate se basa en la parada."},{"fr":"4 · Garde tes Clan Rerolls tant que ta race n’est pas fixée (bonus liés à la race) et tes Ability Rerolls tant que ta forme n’est pas débloquée.","en":"4 · Hold Clan Rerolls until your race is locked, and Ability Rerolls until your form is unlocked.","es":"4 · Guarda Clan Rerolls y Ability Rerolls hasta fijar raza y forma."},{"fr":"5 · Ne disperse JAMAIS tes SP : 2 arbres focalisés (ta branche de dégâts + Speed) battent 4 arbres survolés. Le Misc s’achète en Cash, 0 SP — prends tout.","en":"5 · NEVER spread SP: 2 focused trees beat 4 shallow ones. Misc is Cash-only, 0 SP — buy it all.","es":"5 · NUNCA disperses SP. Misc va con Cash: cómpralo todo."},{"fr":"6 · Fais tôt « Statue Mystery » (Clint, Sweetwater Pass, ~nv.15 ; 3 extraits : Intelligence = tutoriel · Strength = King Crocodile au Swamp · Masked Hollow Man = raid boss des Soul Society Outskirts) → Sanctuaire de Remboursement (1 skill, 1 fois, gratuit).","en":"6 · Do “Statue Mystery” early (Clint, Sweetwater Pass, ~lv.15; 3 extracts: Intelligence = tutorial · Strength = King Crocodile in the Swamp · Masked Hollow Man = Soul Society Outskirts raid boss) → free one-time Refund Shrine.","es":"6 · Haz pronto “Statue Mystery” → Santuario de Reembolso (1 skill, 1 vez, gratis)."}],"sn":["The Superstar","The Heat","The Necromancer","The Dimensional","The Thunderbolt","The Blademaster","Monster"],"sa":["Conjure Weapon","Heilig Pfeil","Blut Arterie","Blut Vene","Impaling Arrows","Holy Arrows","Fallzwang"],"startRaceQuick":{"shinigami":[{"fr":"Nv.1–25 : quêtes Soul Society + missions Soul Pager · achète tout le Misc en Cash (Aerial Fighter 75, Rushdown 75, Drop Cancel 100, Manual Rushdown 125, Spiritual Potential 250, Spiritual Pressure 450).","en":"Lv.1–25: Soul Society quests + Soul Pager missions · buy the whole Misc tree with Cash.","es":"Nv.1–25: misiones · compra todo Misc con Cash."},{"fr":"Commence à investir la branche Kidō dans l’ordre du cœur (onglet Arbre) — Sai d’abord, toujours.","en":"Start the Kido branch in core order (Tree tab) — Sai first, always.","es":"Empieza la rama Kido en el orden del núcleo — Sai primero."},{"fr":"Nv.25+ : débloque la méditation (L) — c’est la porte du Shikai (détail dans la carte ci-contre).","en":"Lv.25+: unlock meditation (L) — the gate to Shikai (details in the card beside).","es":"Nv.25+: medita (L) — la puerta al Shikai."},{"fr":"Endgame : Caster Kidō-Contrôle (onglet Shinigami) — attributs 360/40/0, cœur 96 SP + Radiant Edge = 100, Hōgyoku n°1 sur Sai nv.7, fragments d’Ascension (max 6/skill) sur Sai puis Hōrin.","en":"Endgame: Control-Kido Caster — 360/40/0, 96 SP core + Radiant Edge = 100, Hōgyoku #1 on Sai lv.7, Ascension Fragments (max 6/skill) on Sai then Hōrin.","es":"Endgame: caster de control — 360/40/0, núcleo 96+4=100 SP."}],"quincy":[{"fr":"Nv.1–25 : missions du Lieutenant (privilégie les 3★) · économise 300 Soul Tokens dès le début — n’en dépense AUCUN.","en":"Lv.1–25: Lieutenant missions (favor 3★) · bank 300 Soul Tokens — spend NONE.","es":"Nv.1–25: misiones 3★ · ahorra 300 Soul Tokens."},{"fr":"Dans l’arbre Quincy, prends tôt Blut Arterie (offense) et Blut Vene (défense) : ce sont des skills de la branche (seuils Kidō), deux postures à alterner selon que tu attaques ou encaisses.","en":"In the Quincy tree, take Blut Arterie (offense) and Blut Vene (defense) early: branch skills (Kido gates), two stances to swap between attacking and tanking.","es":"Toma pronto Blut Arterie (ofensa) y Blut Vene (defensa): dos posturas de la rama."},{"fr":"Nv.25 : grade Soldat Cap → la chaîne Schrift s’ouvre (carte ci-contre).","en":"Lv.25: Soldat Cap rank → the Schrift chain opens (card beside).","es":"Nv.25: Soldat Cap → se abre la cadena del Schrift."},{"fr":"Endgame : Speed Quincy (onglet Quincy) — Speed 300 / Kidō 100, Sword, clan Kurosaki, essence Splitting Standstill (4 SP · Speed 300) ; Blade Flow / Flash Execute via fragments.","en":"Endgame: Speed Quincy — Speed 300 / Kido 100, Sword, Kurosaki, Splitting Standstill (4 SP · Speed 300); Blade Flow / Flash Execute via fragments.","es":"Endgame: Speed Quincy — Speed 300 / Kido 100, Sword, Kurosaki."}],"hollow":[{"fr":"Fishbone → Menos : objectifs de destruction et de kills · NE deviens PAS Menoscar (2 slots de traits seulement — piège classique).","en":"Fishbone → Menos: destruction/kill objectives · do NOT go Menoscar (2 trait slots only — classic trap).","es":"Fishbone → Menos: NO te hagas Menoscar (2 ranuras)."},{"fr":"Adjuchas : Cero + Roar + 3e slot · farm les missions (les Shinigami/Quincy comptent pour la progression, pas les Arrancars) · dévore pour tes traits.","en":"Adjuchas: Cero + Roar + 3rd slot · farm missions (Shinigami/Quincy count, Arrancars don’t) · consume for your traits.","es":"Adjuchas: Cero + Roar + 3.ª ranura · devora para tus rasgos."},{"fr":"Vasto Lorde OBLIGATOIRE avant le masque : 4 slots — Iron Skin, Deadly Claws, Wings, Dense Muscles. Arme conseillée ensuite : Spear.","en":"Vasto Lorde MANDATORY before unmasking: 4 slots — Iron Skin, Deadly Claws, Wings, Dense Muscles. Suggested weapon after: Spear.","es":"Vasto Lorde OBLIGATORIO antes de la máscara: 4 ranuras."},{"fr":"Endgame : Vasto Hakuda (onglet Hollow) — clan Cifer, Resurrección Shark, plus tard l’essence Gran Ray Cero (9 SP · Kidō 360) si tu pars hybride Kidō.","en":"Endgame: Vasto Hakuda — Cifer clan, Shark Resurrección, later the Gran Ray Cero essence (9 SP · Kido 360) if you go Kido-hybrid.","es":"Endgame: Vasto Hakuda — Cifer, Shark."}]},"sr":["Cero (Speed/Power variants)","Finger Cero","Bala Swarm","Hierro","Cero Armor","High Speed Regeneration"]};</script>
<script>
/* VV:U HUB v11 — reconstruction fidèle (vanilla JS, aucune dépendance) */
(function () {
  const D = window.VVU_DATA;
  let LANG = localStorage.getItem('vvu-lang') || 'fr';
  const T = k => (D.iY[LANG] && D.iY[LANG][k]) != null ? D.iY[LANG][k] : k;
  const iX = o => o ? (o[LANG] != null ? o[LANG] : o.fr) : '';
  const tri = (fr, en, es) => LANG === 'fr' ? fr : LANG === 'en' ? en : es;
  const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  /* ---------- état ---------- */
  let PAGE = (location.hash || '#home').slice(1);
  const VALID = ['home', 'start', 'shini', 'quincy', 'hollow', 'tree', 'combos', 'db', 'gear'];
  if (!VALID.includes(PAGE)) PAGE = 'home';
  let comboRace = 'shinigami', startRace = 'shinigami', charmTier = 0, gearSlot = 'all';
  const SIM = {
    budget: 100, attrs: { H: 0, K: 360, S: 0, V: 40 },
    owned: new Set(), levels: {}, hogyoku: null, bar: [],
    kuro: false, radiant: false, tree: 'kido', sel: null
  };

  /* ---------- index des nodes ---------- */
  const NODE = new Map(); // id -> {node, src:'kido'|'branch'|'race'}
  for (const s of D.iJ) NODE.set(s.id, { n: s, src: 'kido' });
  for (const t of D.su) for (const n of (t.nodes || [])) NODE.set(n.id, { n, src: 'branch' });
  for (const r of ['quincy', 'hollow']) for (const n of D.sl[r].nodes) NODE.set(n.id, { n, src: 'race' });
  const nName = id => { const e = NODE.get(id); return e ? (e.n.name || e.n.n || id) : id; };
  const nSp = id => { const e = NODE.get(id); return e ? (e.n.sp || 0) : 0; };
  const nKind = id => { const e = NODE.get(id); return e ? (e.n.kind || 'active') : 'active'; };
  const parentOf = n => n.par != null ? n.par : (n.parent != null ? n.parent : null);

  /* ---------- helpers simulateur ---------- */
  const spSpent = () => [...SIM.owned].reduce((a, id) => a + nSp(id), 0) + (SIM.kuro ? 9 : 0) + (SIM.radiant ? 4 : 0);
  const cashSpent = () => [...SIM.owned].reduce((a, id) => { const e = NODE.get(id); return a + ((e && e.n.cash) || 0); }, 0);
  const gateOk = n => {
    if (n.gate != null) return n.gate <= SIM.attrs.K; // arbre Kidō (iJ)
    return (n.H || 0) <= SIM.attrs.H && (n.K || 0) <= SIM.attrs.K && (n.S || 0) <= SIM.attrs.S && (n.V || 0) <= SIM.attrs.V;
  };
  const choiceOf = n => (n.fl || []).find(f => f.startsWith('choice:'));
  const choiceFree = n => {
    const ch = choiceOf(n);
    if (!ch) return true;
    for (const [id, e] of NODE) if (id !== n.id && (e.n.fl || []).includes(ch) && SIM.owned.has(id)) return false;
    return true;
  };
  const canBuy = n => !SIM.owned.has(n.id) && n.kind !== 'unknown' && n.kind !== 'disabled'
    && (n.sp !== undefined || n.cash !== undefined || n.gate !== undefined)
    && (!parentOf(n) || SIM.owned.has(parentOf(n))) && gateOk(n) && choiceFree(n);
  const hasOwnedChild = id => { for (const oid of SIM.owned) { const e = NODE.get(oid); if (e && parentOf(e.n) === id) return true; } return false; };
  const lvlMax = id => SIM.hogyoku === id ? 8 : 6;
  const isActive = id => ['active', 'special', 'ultimate'].includes(nKind(id));

  const exportText = () => {
    const a = SIM.attrs, tot = a.H + a.K + a.S + a.V;
    const lines = [...SIM.owned].map(id => {
      const e = NODE.get(id);
      const cost = e.n.sp != null ? e.n.sp + ' SP' : (e.n.cash || 0) + ' Cash';
      return '- ' + nName(id) + ' (' + cost + ')' + (SIM.hogyoku === id ? ' <- Hogyoku nv.' + (SIM.levels[id] || 1) : (SIM.levels[id] > 1 ? ' nv.' + SIM.levels[id] : ''));
    });
    return 'VV:U - Mon build\nAttributs  H:' + a.H + ' K:' + a.K + ' S:' + a.S + ' Speed:' + a.V + ' (total ' + tot + '/400)\n'
      + 'Budget SP: ' + SIM.budget + ' | Depense: ' + spSpent() + ' SP | Cash: ' + cashSpent() + '\n'
      + 'Essences: ' + ([SIM.kuro ? 'Kurohitsugi (9 SP, K360)' : null, SIM.radiant ? 'Radiant Edge (4 SP, K125)' : null].filter(Boolean).join(' + ') || 'aucune') + '\n'
      + 'Barre 1-9: ' + (SIM.bar.map(nName).join(' | ') || '-') + '\n'
      + 'Nodes (' + SIM.owned.size + '):\n' + (lines.join('\n') || '-');
  };

  /* ---------- morceaux d'UI ---------- */
  const badge = s => '<span class="badge">' + esc(s) + '</span>';
  const badge2 = s => '<span class="badge2">' + esc(s) + '</span>';
  const kindLbl = k => ({ active: tri('Actif', 'Active', 'Activo'), passive: tri('Passif', 'Passive', 'Pasivo'), node: 'Node', special: 'Special', ultimate: 'Ultimate', disabled: tri('Désactivé', 'Disabled', 'Desactivado'), unknown: '?' })[k] || k;
  const buildFinal = (rows, note) =>
    '<div class="card gold-edge"><h3 class="h3">' + tri('Build final — chaque skill, SON niveau (aucune alternative)', 'Final build — each skill, ITS level (no alternatives)', 'Build final — cada skill, SU nivel') + '</h3>'
    + '<p class="text-xs opacity-70 mt-1">' + tri('L’ordre d’investissement = l’ordre des lignes. Ressources de montée : fragments d’Ascension (max 6/skill) + vœux Hōgyoku (1er fragment garanti : boss Gelum, fin du tutoriel).', 'Investment order = row order. Leveling resources: Ascension Fragments (max 6/skill) + Hōgyoku wishes (1st fragment guaranteed: Gelum, tutorial).', 'El orden de inversión = el orden de las filas.') + '</p>'
    + '<div class="tblwrap mt-2"><table class="tbl"><thead><tr><th>#</th><th>Skill</th><th>' + tri('Niveau cible', 'Target level', 'Nivel objetivo') + '</th><th>' + tri('Pourquoi', 'Why', 'Por qué') + '</th></tr></thead><tbody>'
    + rows.map((r, i) => '<tr class="' + (r[3] ? 'hl' : '') + '"><td class="mono">' + (i + 1) + '</td><td><b>' + esc(r[0]) + '</b></td><td class="mono goldc">' + esc(r[1]) + '</td><td class="text-xs">' + esc(r[2]) + '</td></tr>').join('')
    + '</tbody></table></div>' + (note ? '<p class="text-xs warnc mt-2">' + esc(note) + '</p>' : '') + '</div>';

  const formsCard = (title, badgeTxt, steps) =>
    '<div class="card"><h3 class="h3">' + esc(title) + ' ' + badge(badgeTxt) + '</h3><ol class="startol mt-2">'
    + steps.map(s => '<li class="text-sm">' + esc(s) + '</li>').join('') + '</ol></div>';

  const barRow = (label, val, note) =>
    '<div class="mt-3"><div style="display:flex;justify-content:space-between" class="mono text-sm"><b>' + esc(label) + '</b><span class="goldc">' + val + '</span></div>'
    + '<div class="bar"><div class="fill" style="width:' + (val / 4) + '%"></div></div>'
    + '<p class="text-xs opacity-70 mt-1">' + esc(note) + '</p></div>';

  /* ---------- pages ---------- */
  function pageHome() {
    const verd = [['shini', 'v_shini', '縛'], ['quincy', 'v_quincy', '弓'], ['hollow', 'v_hollow', '虚']].map(([id, key, kj]) =>
      '<div class="card clickable" data-act="nav" data-page="' + id + '"><div class="kanji">' + kj + '</div><h3 class="h3 goldc mt-2">' + esc(T('nav_' + id)) + '</h3><p class="text-sm mt-2">' + esc(T(key)) + '</p></div>').join('');
    const treeRows = D.i2.map(e =>
      '<tr class="' + (e.id === 'shini' || e.id === 'speed' ? 'hl' : '') + '"><td><b>' + esc(e.name) + '</b></td><td class="mono goldc">' + e.sp + '</td><td class="mono">' + e.skills + '</td><td class="mono">' + esc(e.tier) + '</td><td class="mono text-xs">' + esc(e.gates) + (e.gatesMenuM ? ' ' + badge2('menu M') : '') + '</td></tr>').join('');
    const news = D.se.map(n => '<li class="text-sm mt-2"><span class="mono goldc">' + n.date + '</span> — ' + esc(iX(n)) + '</li>').join('');
    const codes = D.i7.map(c => '<tr><td class="mono goldc">' + esc(c.code) + '</td><td class="text-xs">' + esc(c.reward) + '</td></tr>').join('');
    return '<div class="space-y">'
      + '<div class="hero card"><div class="rods"><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="herokanji">魂</div>'
      + '<p class="eyebrow">' + esc(T('updated')) + '</p><h1 class="h1">' + esc(T('hero_title')) + '</h1><p class="max-w-2xl mt-3 opacity-90">' + esc(T('hero_sub')) + '</p></div>'
      + '<h2 class="h2">' + esc(T('verdicts')) + '</h2><div class="grid3">' + verd + '</div>'
      + '<h2 class="h2">' + esc(T('budgets')) + '</h2><div class="grid2">'
      + '<div class="card"><p class="text-sm">' + badge2('SP') + ' ' + esc(T('b_sp')) + '</p><p class="text-sm mt-3">' + badge('ATTR 400') + ' ' + esc(T('b_attr')) + '</p></div>'
      + '<div class="card"><p class="text-sm">' + badge('BUILD 400') + ' ' + esc(T('b_build')) + '</p><p class="text-sm mt-3">' + badge('1–9') + ' ' + esc(T('b_bar')) + '</p></div></div>'
      + '<div class="card"><h3 class="h3">' + tri('Coût des arbres', 'Tree costs', 'Coste de los árboles') + '</h3><div class="tblwrap mt-2"><table class="tbl"><thead><tr><th>' + esc(T('th_tree')) + '</th><th>' + esc(T('th_total')) + '</th><th>' + esc(T('th_count')) + '</th><th>' + esc(T('th_tier')) + '</th><th>' + esc(T('th_gates')) + '</th></tr></thead><tbody>' + treeRows + '</tbody></table></div></div>'
      + '<div class="grid2"><div class="card"><h3 class="h3">' + esc(T('news')) + '</h3><ul class="plain mt-2">' + news + '</ul></div>'
      + '<div class="card"><h3 class="h3">' + esc(T('codes')) + ' ' + badge('10/07') + '</h3><p class="text-xs opacity-70 mt-1 mb-2">' + esc(T('code_hint')) + '</p><div class="tblwrap maxh"><table class="tbl"><thead><tr><th>' + esc(T('th_code')) + '</th><th>' + esc(T('th_reward')) + '</th></tr></thead><tbody>' + codes + '</tbody></table></div></div></div>'
      + '</div>';
  }

  function pageStart() {
    const uni = D.startUniversal.map(s => '<li class="text-sm liok mt-2">' + esc(iX(s)) + '</li>').join('');
    const tabs = ['shinigami', 'quincy', 'hollow'].map(r => '<button class="tabbtn ' + (startRace === r ? 'on' : '') + '" data-act="stab" data-r="' + r + '">' + (r === 'shinigami' ? 'Shinigami' : r === 'quincy' ? 'Quincy' : 'Hollow') + '</button>').join('');
    const quick = D.startRaceQuick[startRace].map(s => '<li class="text-sm">' + esc(iX(s)) + '</li>').join('');
    const g = D.startGuides[startRace];
    const steps = g.steps.map(s => '<li class="text-sm">' + esc(iX(s)) + '</li>').join('');
    const rlbl = startRace === 'shinigami' ? 'Shinigami' : startRace === 'quincy' ? 'Quincy' : 'Hollow';
    return '<div class="space-y">'
      + '<div class="card"><h3 class="h3">' + tri('Le tronc commun — pour toute nouvelle recrue', 'The common trunk — for every new player', 'El tronco común — para todo nuevo jugador') + '</h3><ul class="plain mt-2">' + uni + '</ul></div>'
      + '<div class="flexwrap">' + tabs + '</div>'
      + '<div class="grid2 page">'
      + '<div class="card gold-edge"><h3 class="h3 goldc">' + tri('Route ', 'Route ', 'Ruta ') + rlbl + ' — A→Z</h3><ol class="startol mt-2">' + quick + '</ol></div>'
      + '<div class="card"><h3 class="h3">' + esc(iX(g.title)) + '</h3><ol class="startol mt-2">' + steps + '</ol></div></div>'
      + '<p class="text-xs opacity-70">' + tri('Suivi des mises à jour & codes toujours actifs : onglet Accueil (liste au 10/07/2026 — les codes expirent, re-check le Discord officiel discord.com/invite/vvgame).', 'Update tracker & active codes: Home tab (as of 2026-07-10 — codes expire, re-check the official Discord).', 'Seguimiento y códigos: pestaña Inicio (10/07/2026).') + '</p>'
      + '</div>';
  }

  function pageShini() {
    const iZ = D.iJ.reduce((a, s) => a + (s.sp || 0), 0);
    const attrCard = '<div class="card"><h3 class="h3">' + esc(T('attr_split')) + '</h3>'
      + barRow('KIDŌ', 360, tri('100% du contenu utilisable (théorème du 360) + scaling max', '100% of usable content (360 theorem) + max scaling', '100% del contenido usable + scaling'))
      + barRow('SPEED', 40, tri('Pourquoi 40 ici : K360 = plafond utilisable (Prism Seal 370 désactivé) → il RESTE 40 points. Hakuda/Strength ne débloqueraient rien qu’on achète ; l’attribut Speed accélère déplacement + Shunpo (donnée du jeu) = le kite à ~10 m du caster. Seule affectation rentable du reliquat.', 'Why 40 here: K360 = usable ceiling (Prism Seal 370 disabled) → 40 points REMAIN. Hakuda/Strength would gate nothing we buy; the Speed attribute speeds movement + Shunpo (game data) = the caster’s ~10 m kite. The only profitable home for the remainder.', 'Por qué 40: K360 = techo usable → sobran 40 puntos. Speed acelera movimiento + Shunpo = el kiteo del caster.'))
      + barRow('STRENGTH / HAKUDA', 0, tri('Chaque point ici est volé au 360', 'Every point here is stolen from 360', 'Cada punto aquí se roba al 360'))
      + '<p class="text-sm mt-3 opacity-90">' + esc(T('theorem')) + '</p>'
      + '<p class="text-xs mt-2 warnc">' + tri('Replis : 350/50/0 (garde Goryū, perd HCS + essence) · 300/50/50 (méta Sportskeeda, perd les deux nukes gated).', 'Fallbacks: 350/50/0 (keeps Goryū, loses HCS + essence) · 300/50/50 (Sportskeeda meta, loses both gated nukes).', 'Alternativas: 350/50/0 · 300/50/50.') + '</p></div>';
    const buildCard = '<div class="card"><h3 class="h3">' + esc(T('build_split')) + '</h3>'
      + barRow('RESERVES', 200, tri('HCS a un coût Reiatsu « très élevé » (donnée du jeu)', 'HCS has a “very high” Reiatsu cost (game data)', 'HCS tiene un coste «muy alto»'))
      + barRow('HASTE', 100, tri('Sai : CD 40s de base — Haste comble la rotation', 'Sai: 40s base CD — Haste fills the rotation', 'Sai: CD 40s — Haste llena la rotación'))
      + barRow('POTENCY', 100, tri('Scaling des stats — multiplie le 360', 'Stat scaling — multiplies the 360', 'Scaling — multiplica el 360'))
      + barRow('METTLE / SHUNPO', 0, tri('Posture faible assumée : Reactive Barrier + distance', 'Low posture accepted: Reactive Barrier + range', 'Postura baja asumida'))
      + '<p class="text-sm mt-3"><b class="goldc">Katana</b> · <b class="goldc">Kuchiki</b> (+3% Kidō) / Shihoin · Shikai <b class="goldc">Ice / Senbonzakura-Katana</b> · Hōgyoku n°1 → <b class="goldc">Sai nv.7</b> · n°2 → Hōrin nv.8.</p></div>';
    const loadout = '<div class="card gold-edge"><h3 class="h3">' + esc(T('loadout_reco')) + '</h3>'
      + '<div class="flexwrap mt-2">' + D.i1.map((id, i) => '<span class="cstep ' + (i < 3 ? 'gold' : '') + '">' + (i + 1) + ' · ' + esc(nName(id)) + '</span>').join('') + '</div>'
      + '<p class="text-sm mt-3">' + esc(T('quickfire')) + '</p></div>';
    const rows = D.iJ.filter(s => s.kind !== 'node').map(s => {

    const lvlCtl = owned && isActive(n.id)
      ? '<span class="lvl">nv.<b class="goldc">' + lvl + '</b>/' + lvlMax(n.id) + ' <button data-act="lvldn" data-id="' + n.id + '">−</button><button data-act="lvlup" data-id="' + n.id + '">+</button></span>'
      + '<button class="chipbtn ' + (SIM.hogyoku === n.id ? 'on' : '') + '" data-act="hogy" data-id="' + n.id + '" title="Hōgyoku">宝</button>'
      + '<button class="chipbtn ' + (SIM.bar.includes(n.id) ? 'on' : '') + '" data-act="tobar" data-id="' + n.id + '">' + tri('Barre', 'Bar', 'Barra') + '</button>'
      : '';
    const btn = owned
      ? '<button class="btn-ghost" data-act="refund" data-id="' + n.id + '">' + tri('Rendre', 'Refund', 'Devolver') + '</button>'
      : buyable ? '<button class="btn" data-act="buy" data-id="' + n.id + '">+ ' + tri('Acheter', 'Buy', 'Comprar') + '</button>'
        : '<span class="mono text-xs opacity-60">🔒</span>';
    return '<div class="node ' + (owned ? 'owned' : (buyable ? '' : 'locked')) + '">'
      + '<div class="nhead"><span class="nname">' + esc(n.name || n.n || n.id) + '</span>' + badge2(kindLbl(n.kind)) + '<span class="nmeta">' + cost + (gates ? ' · ' + gates : '') + '</span></div>'
      + (n.d ? '<p class="ndesc">' + esc(typeof n.d === 'object' ? iX(n.d) : n.d) + '</p>' : '')
      + (n.lvlNotes ? '<p class="ndesc goldc">' + esc(n.lvlNotes.map(x => 'nv.' + x.lvl + ': ' + iX(x)).join(' · ')) + '</p>' : '')
      + '<div class="nact">' + btn + lvlCtl + '</div></div>';
  }

  /* Les 8 arbres du simulateur */
  const TREES = [
    { id: 'kido', label: 'Shinigami (Kidō)', nodes: D.iJ, own: true, meta: '208 SP · 34 skills · Kidō 28→370' },
    { id: 'quincy', label: 'Quincy', nodes: D.sl.quincy.nodes, meta: D.sl.quincy.totalSp + ' SP · ' + D.sl.quincy.count + ' skills · ' + D.sl.quincy.gates },
    { id: 'hollow', label: 'Hollow', nodes: D.sl.hollow.nodes, meta: D.sl.hollow.totalSp + ' SP · ' + D.sl.hollow.count + ' skills · ' + D.sl.hollow.gates },
  ].concat(D.su.map(t => ({ id: t.id, label: t.label, nodes: t.nodes, meta: (t.totalSp != null ? t.totalSp + ' SP · ' : '') + t.count + ' skills' + (t.gates ? ' · ' + t.gates : '') })));

  // layout automatique (arbres sans coordonnées) : x = profondeur, y = rangée de feuille
  function treeLayout(nodes) {
    const byId = new Map(nodes.map(n => [n.id, n]));
    const kids = new Map(), roots = [];
    for (const n of nodes) {
      const p = parentOf(n);
      if (p && byId.has(p)) { if (!kids.has(p)) kids.set(p, []); kids.get(p).push(n.id); }
      else roots.push(n.id);
    }
    const pos = new Map(); let row = 0;
    (function place(ids, d) {
      for (const id of ids) {
        const ks = kids.get(id) || [];
        if (!ks.length) { pos.set(id, { x: d, y: row++ }); }
        else {
          place(ks, d + 1);
          const ys = ks.map(k => pos.get(k).y);
          pos.set(id, { x: d, y: (Math.min(...ys) + Math.max(...ys)) / 2 });
        }
      }
    })(roots, 0);
    return pos;
  }

  function treeSvg(tree) {
    const nodes = tree.nodes.filter(n => n.kind !== 'unknown');
    let coord;
    if (tree.own) coord = id => { const n = nodes.find(x => x.id === id); return { px: n.x, py: n.y }; };
    else {
      const pos = treeLayout(nodes);
      coord = id => { const p = pos.get(id) || { x: 0, y: 0 }; return { px: 70 + p.x * 170, py: 30 + p.y * 48 }; };
    }
    let maxX = 0, maxY = 0, minX = 1e9, minY = 1e9;
    for (const n of nodes) { const c = coord(n.id); maxX = Math.max(maxX, c.px); maxY = Math.max(maxY, c.py); minX = Math.min(minX, c.px); minY = Math.min(minY, c.py); }
    let lines = '', dots = '';
    for (const n of nodes) {
      const p = parentOf(n);
      if (p && nodes.some(x => x.id === p)) {
        const a = coord(p), b = coord(n.id);
        lines += '<line x1="' + a.px + '" y1="' + a.py + '" x2="' + b.px + '" y2="' + b.py + '" stroke="' + (SIM.owned.has(n.id) && SIM.owned.has(p) ? 'rgba(232,193,90,.7)' : '#232a38') + '" stroke-width="1.5"/>';
      }
    }
    for (const n of nodes) {
      const c = coord(n.id);
      const owned = SIM.owned.has(n.id), sel = SIM.sel === n.id;
      const r = n.kind === 'ultimate' ? 11 : n.kind === 'special' ? 9 : n.kind === 'node' ? 4.5 : 7;
      const fill = n.kind === 'disabled' ? '#3a2b2b' : owned ? '#e8c15a' : canBuy(n) ? '#2b3446' : '#161b26';
      const stroke = sel ? '#fff' : owned ? '#e8c15a' : '#3a4356';
      const label = n.name || n.n || '';
      dots += '<circle data-act="knode" data-id="' + n.id + '" cx="' + c.px + '" cy="' + c.py + '" r="' + r + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.6"/>'
        + (n.kind !== 'node' ? '<text x="' + (c.px + 12) + '" y="' + (c.py + 4) + '" font-size="9.5" fill="' + (owned ? '#e8c15a' : '#9aa1ad') + '" font-family="IBM Plex Mono">' + esc(label) + '</text>' : '');
    }
    const pad = 60;
    return '<div style="overflow:auto"><svg class="kmap" viewBox="' + (minX - pad) + ' ' + (minY - 40) + ' ' + (maxX - minX + 2 * pad + 130) + ' ' + (maxY - minY + 80) + '" style="min-width:' + Math.max(700, (maxX - minX) + 260) + 'px" height="' + Math.max(300, Math.min(720, maxY - minY + 90)) + '">' + lines + dots + '</svg></div>';
  }

  function pageTree() {
    const a = SIM.attrs, tot = a.H + a.K + a.S + a.V, sp = spSpent();
    const head = '<div class="card"><div class="simhead">'
      + '<label class="ctl"><span>' + esc(T('sp_budget')) + '</span><input type="number" min="50" max="250" value="' + SIM.budget + '" data-input="budget"></label>'
      + '<div class="attrgrid">' + [['H', 'HAKUDA'], ['K', 'KIDŌ'], ['S', 'STRENGTH'], ['V', 'SPEED']].map(([k, l]) =>
        '<label class="ctl"><span>' + l + '</span><input type="number" min="0" max="400" value="' + a[k] + '" data-input="attr-' + k + '"></label>').join('') + '</div>'
      + '<div class="counter"><div>SP <b>' + sp + '</b> / ' + SIM.budget + (sp > SIM.budget ? ' <span class="over">▲</span>' : '') + ' · Cash <b>' + cashSpent() + '</b></div>'
      + '<div>ATTR <b class="' + (tot > 400 ? 'over' : '') + '">' + tot + '</b>/400 · ' + tri('Barre', 'Bar', 'Barra') + ' <b>' + SIM.bar.length + '</b>/9</div></div>'
      + '<div class="flexwrap"><button class="chipbtn ' + (SIM.kuro ? 'on' : '') + '" data-act="kuro">Kurohitsugi 9 SP · K360</button>'
      + '<button class="chipbtn ' + (SIM.radiant ? 'on' : '') + '" data-act="radiant">Radiant Edge 4 SP · K125</button>'
      + '<button class="btn-ghost" data-act="export">' + tri('Copier le build', 'Copy build', 'Copiar build') + '</button></div>'
      + '</div>'
      + (SIM.bar.length ? '<div class="card mt-3"><p class="lab">' + tri('Barre 1–9', 'Bar 1–9', 'Barra 1–9') + '</p><div class="flexwrap mt-2">' + SIM.bar.map((id, i) => '<span class="cstep gold">' + (i + 1) + ' · ' + esc(nName(id)) + '</span>').join('') + '</div></div>' : '');
    const treeTabs = TREES.map(t => '<button class="tabbtn ' + (SIM.tree === t.id ? 'on' : '') + '" data-act="stree" data-t="' + t.id + '">' + esc(t.label) + '</button>').join('');
    const tree = TREES.find(t => t.id === SIM.tree) || TREES[0];
    const selEntry = SIM.sel ? NODE.get(SIM.sel) : null;
    const selPanel = selEntry && tree.nodes.some(n => n.id === SIM.sel)
      ? '<div class="mt-3">' + nodeCard(selEntry.n) + '</div>'
      : '<p class="text-xs opacity-60 mt-2">' + tri('Clique un node de la carte pour le lire, l’acheter, monter son niveau, le mettre en barre ou lui donner le Hōgyoku.', 'Click a map node to read it, buy it, level it, slot it on the bar or give it the Hōgyoku.', 'Haz clic en un nodo del mapa para leerlo y comprarlo.') + '</p>';
    const unknownCount = tree.nodes.filter(n => n.kind === 'unknown').length;
    const speedNote = tree.id === 'speed'
      ? '<p class="text-xs warnc mt-2">' + tri('Coûts et seuils de l’arbre Speed NON publiés — ils se lisent en jeu (menu M). Les 12 skills nommés sont affichés en lecture seule' + (unknownCount ? ' ; ' + unknownCount + ' nodes non documentés masqués' : '') + '.', 'Speed tree costs/gates are unpublished — read them in game (M menu). The 12 named skills are read-only' + (unknownCount ? '; ' + unknownCount + ' undocumented nodes hidden' : '') + '.', 'Costes del árbol Speed sin publicar (menú M).') + '</p>'
      : (unknownCount ? '<p class="text-xs opacity-60 mt-2">' + unknownCount + ' ' + tri('nodes non documentés masqués (données non publiées).', 'undocumented nodes hidden (unpublished data).', 'nodos sin documentar ocultos.') + '</p>' : '');
    const raceCard = '<div class="card mt-3"><div class="flexwrap">' + treeTabs + '</div>'
      + '<p class="text-sm opacity-80 mt-3 mono">' + esc(tree.label) + ' · ' + esc(tree.meta) + '</p>'
      + '<div class="mt-2">' + treeSvg(tree) + '</div>' + speedNote + selPanel + '</div>';
    const essences = '<div class="card mt-3"><h3 class="h3">' + tri('Skill Essences — les 10, chiffrées', 'Skill Essences — all 10, with numbers', 'Skill Essences — las 10') + ' ' + badge('planner 07/2026') + ' <span class="mono text-xs opacity-70">· 2 slots</span></h3>'
      + '<div class="tblwrap mt-2"><table class="tbl"><thead><tr><th>Essence</th><th>SP</th><th>' + tri('Requiert', 'Requires', 'Requiere') + '</th></tr></thead><tbody>'
      + D.sf.map(e => '<tr class="' + (e.name === 'Kurohitsugi' || e.name === 'Splitting Standstill' ? 'hl' : '') + '"><td><b>' + esc(e.name) + '</b>' + (e.who ? ' <span class="text-xs opacity-60">· ' + esc(e.who) + '</span>' : '') + '</td><td class="mono goldc">' + e.sp + '</td><td class="mono text-xs">' + esc(e.req) + '</td></tr>').join('')
      + '</tbody></table></div>'
      + '<p class="text-xs opacity-70 mt-2">' + tri('Kurohitsugi est le vrai nom de l’« essence pinacle K360 » du build — et les seuils DOUBLES existent (Slicing Dropkick, One Inch Punch, Blood Tax côté Strength). Cœur : 87 + 9 + 4 = 100 SP pile.', 'Kurohitsugi is the true name of the build’s “K360 pinnacle essence” — and DUAL gates exist. Core: 87 + 9 + 4 = exactly 100 SP.', 'Kurohitsugi es la esencia pináculo K360. Núcleo: 87+9+4 = 100 SP.') + '</p></div>';
    return head + raceCard + essences;
  }

  /* ---------- chrome ---------- */
  const NAVKEYS = [['home', 'nav_home'], ['start', 'nav_start'], ['shini', 'nav_shini'], ['quincy', 'nav_quincy'], ['hollow', 'nav_hollow'], ['tree', 'nav_tree'], ['combos', 'nav_combos'], ['db', 'nav_db'], ['gear', 'nav_gear']];
  const socialsHtml = big => '<div class="socials">' + D.sm.map(s => '<a href="' + esc(s.url) + '" target="_blank" rel="noopener" title="' + esc(s.label) + '"><svg viewBox="0 0 24 24"><path d="' + s.d + '"/></svg></a>').join('') + '</div>';

  function pageTitle() {
    switch (PAGE) {
      case 'shini': return T('shini_title'); case 'quincy': return T('quincy_title'); case 'hollow': return T('hollow_title');
      case 'tree': return T('tree_title'); case 'combos': return T('combos_title');
      case 'db': return tri('Base de données du jeu', 'Game database', 'Base de datos del juego');
      case 'gear': return tri('Équipement', 'Equipment', 'Equipamiento');
      case 'start': return T('nav_start'); default: return '';
    }
  }
  function pageSub() {
    if (PAGE === 'tree') return tri('Un tronc, 6 branches. Clique une branche et remonte-la du skill le plus proche au plus lointain : chaque node se lit, s’achète et se rend. Plus tu montes, plus les seuils et les coûts grimpent — le budget te force à choisir.', 'One trunk, 6 branches. Click a branch and climb it from the nearest skill to the farthest: every node can be read, bought and refunded. The higher you go, the steeper the gates and costs — the budget forces choices.', 'Un tronco, 6 ramas. El presupuesto obliga a elegir.');
    if (PAGE === 'combos') return T('combos_sub');
    return '';
  }

  function render() {
    const nav = NAVKEYS.map(([p, k]) => '<button class="navbtn ' + (PAGE === p ? 'on' : '') + '" data-act="nav" data-page="' + p + '">' + esc(T(k)) + '</button>').join('');
    const langs = ['fr', 'en', 'es'].map(l => '<button class="langbtn ' + (LANG === l ? 'on' : '') + '" data-act="lang" data-l="' + l + '">' + l.toUpperCase() + '</button>').join('');
    let body = '';
    try {
      body = { home: pageHome, start: pageStart, shini: pageShini, quincy: pageQuincy, hollow: pageHollow, tree: pageTree, combos: pageCombos, db: pageDb, gear: pageGear }[PAGE]();
    } catch (e) {
      body = '<div class="card"><h3 class="h3 warnc">Erreur de rendu</h3><p class="mono text-sm mt-2">' + esc(e.message) + '</p></div>';
      console.error(e);
    }
    const title = pageTitle(), sub = pageSub();
    document.getElementById('root').innerHTML =
      '<div class="wrap">'
      + '<header class="topbar"><div class="topline"><div class="brand"><em>VV:U</em> HUB <span class="opacity-60 tagline">· ' + esc(T('tagline')) + '</span></div><div class="langs">' + langs + '</div>' + socialsHtml() + '</div>'
      + '<nav class="nav">' + nav + '</nav></header>'
      + '<main class="page" id="main">'
      + (title ? '<h2 class="h2">' + esc(title) + '</h2>' : '')
      + (sub ? '<p class="opacity-80 max-w-3xl mb-4">' + esc(sub) + '</p>' : '')
      + body + '</main>'
      + '<footer class="foot"><span>' + esc(T('footer')) + ' · v11 — 10/07/2026</span>' + socialsHtml(true) + '</footer>'
      + '</div>';
  }

  /* ---------- événements ---------- */
  document.addEventListener('click', ev => {
    const el = ev.target.closest('[data-act]');
    if (!el) return;
    const act = el.dataset.act, id = el.dataset.id;
    const getNode = () => NODE.get(id) && NODE.get(id).n;
    switch (act) {
      case 'nav': PAGE = el.dataset.page; location.hash = PAGE; window.scrollTo(0, 0); break;
      case 'lang': LANG = el.dataset.l; localStorage.setItem('vvu-lang', LANG); break;
      case 'ctab': comboRace = el.dataset.r; break;
      case 'stab': startRace = el.dataset.r; break;
      case 'tier': charmTier = +el.dataset.t; break;
      case 'gslot': gearSlot = el.dataset.s; break;
      case 'stree': SIM.tree = el.dataset.t; SIM.sel = null; break;
      case 'knode': SIM.sel = id; break;
      case 'buy': {
        const n = getNode(); if (!n || !canBuy(n)) break;
        if ((n.sp || 0) > 0 && spSpent() + (n.sp || 0) > SIM.budget) { alert(T('over')); break; }
        SIM.owned.add(n.id); break;
      }
      case 'refund': {
        const n = getNode(); if (!n) break;
        if (hasOwnedChild(n.id)) { alert(tri('Rends d’abord les skills qui en dépendent.', 'Refund dependent skills first.', 'Devuelve antes los skills dependientes.')); break; }
        SIM.owned.delete(n.id); delete SIM.levels[n.id];
        if (SIM.hogyoku === n.id) SIM.hogyoku = null;
        SIM.bar = SIM.bar.filter(x => x !== n.id);
        if (SIM.sel === n.id) SIM.sel = n.id; // garde la sélection
        break;
      }
      case 'lvlup': { const m = lvlMax(id); SIM.levels[id] = Math.min((SIM.levels[id] || 1) + 1, m); break; }
      case 'lvldn': SIM.levels[id] = Math.max((SIM.levels[id] || 1) - 1, 1); break;
      case 'hogy': {
        if (SIM.hogyoku === id) { SIM.hogyoku = null; if ((SIM.levels[id] || 1) > 6) SIM.levels[id] = 6; }
        else {
          if (SIM.hogyoku && (SIM.levels[SIM.hogyoku] || 1) > 6) SIM.levels[SIM.hogyoku] = 6;
          SIM.hogyoku = id;
        }
        break;
      }
      case 'tobar': {
        if (SIM.bar.includes(id)) SIM.bar = SIM.bar.filter(x => x !== id);
        else { if (SIM.bar.length >= 9) { alert(T('bar_full')); break; } SIM.bar.push(id); }
        break;
      }
      case 'kuro': SIM.kuro = !SIM.kuro; break;
      case 'radiant': SIM.radiant = !SIM.radiant; break;
      case 'export': {
        const txt = exportText();
        (navigator.clipboard ? navigator.clipboard.writeText(txt) : Promise.reject()).then(
          () => alert(tri('Build copié ✓', 'Build copied ✓', 'Build copiado ✓')),
          () => prompt(tri('Copie ce texte :', 'Copy this text:', 'Copia este texto:'), txt));
        break;
      }
      default: return;
    }
    render();
  });
  document.addEventListener('change', ev => {
    const el = ev.target.closest('[data-input]');
    if (!el) return;
    const k = el.dataset.input;
    if (k === 'budget') SIM.budget = Math.max(50, Math.min(250, +el.value || 100));
    else if (k.startsWith('attr-')) SIM.attrs[k.slice(5)] = Math.max(0, Math.min(400, +el.value || 0));
    render();
  });
  window.addEventListener('hashchange', () => {
    const p = location.hash.slice(1);
    if (VALID.includes(p) && p !== PAGE) { PAGE = p; render(); window.scrollTo(0, 0); }
  });

  render();
})();

</script>
</body>
</html>
